<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FYPU - Offer Comparison</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,900&family=Great+Vibes&family=Montserrat:wght@400;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#080808;color:#d0d0d8;font-family:sans-serif;}
    input,select{color:#f0f0f0!important;background:#111;}
    input::placeholder{color:#555!important;}
    input:focus,select:focus{outline:none;border-color:rgba(90,186,106,0.7)!important;}
    ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#080808;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
    .fade-up{animation:fadeUp 0.4s ease both;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
var useState = React.useState;

var LOGO_URI = "./logo.webp";
var IS_LOCAL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:";
var HOME_URL = IS_LOCAL ? "./index.html" : "/";
var API_URL  = IS_LOCAL ? "https://api.anthropic.com/v1/messages" : "/api/claude";

var MAJORS = ["Computer Science","Software Engineering","Data Science","Electrical Engineering","Mechanical Engineering","Civil Engineering","Chemical Engineering","Biomedical Engineering","Biology","Biochemistry","Neuroscience","Pre-Med / Health Sciences","Nursing","Public Health","Psychology","Business Administration","Finance","Accounting","Economics","Marketing","Management","Entrepreneurship","International Business","Political Science","International Relations","Law (Pre-Law)","English Literature","History","Philosophy","Communications","Journalism","Mathematics","Statistics","Physics","Chemistry","Environmental Science","Architecture","Graphic Design","Fine Arts","Music","Education","Social Work","Other"];

var GRAD_PATHS = [
  {key:"none",    label:"Career after undergrad"},
  {key:"med",     label:"Medical School (MD/DO)"},
  {key:"dental",  label:"Dental School (DDS/DMD)"},
  {key:"law",     label:"Law School (JD)"},
  {key:"mba",     label:"MBA / Business School"},
  {key:"ms",      label:"Master's Degree (MS/MA)"},
  {key:"phd",     label:"PhD / Research Doctorate"},
  {key:"pharmd",  label:"Pharmacy School (PharmD)"},
  {key:"nursing", label:"Nurse Practitioner (NP/DNP)"},
  {key:"vet",     label:"Veterinary School (DVM)"}
];

function emptyOffer() { return {school:"", major:"", tuition:"", notes:"", gradPath:"none"}; }

function StatBox(props) {
  var label = props.label, value = props.value, color = props.color, sub = props.sub;
  return (
    <div style={{background:"rgba(255,255,255,0.06)",borderRadius:"10px",padding:"14px",textAlign:"center"}}>
      <div style={{color:color||"#f0f0f0",fontSize:"18px",fontWeight:"800",fontFamily:"'Montserrat',sans-serif",lineHeight:"1.1"}}>{value||"--"}</div>
      {sub && <div style={{color:"#b0b0bc",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginTop:"2px",opacity:0.75}}>{sub}</div>}
      <div style={{color:"#b0b0bc",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginTop:"4px",letterSpacing:"0.08em"}}>{label}</div>
    </div>
  );
}

function OfferCard(props) {
  var result = props.result, index = props.index;
  var tabState = useState("roi");
  var tab = tabState[0], setTab = tabState[1];
  var colors = ["#5aba6a","#c9a84c","#c0302a","#6b9fe4"];
  var col = colors[index % 4];
  var roi = result.roi || {};
  var jobs = result.jobs || {};
  var grad = result.grad || {};
  var verdict = result.verdict || {};
  var campus = result.campus || {};
  var postgrad = result.postgrad || {};
  var employers = jobs.topEmployers || [];
  var programs = grad.topPrograms || [];
  var isGradPath = result.gradPath && result.gradPath !== "none";

  var tabs = [
    {id:"roi", label:"ROI"},
    {id:"career", label: isGradPath ? "Post-Grad Career" : "Job Prospects"},
    {id:"grad", label: isGradPath ? "Grad Admissions" : "Grad School"},
    {id:"campus", label:"Campus Life"},
    {id:"verdict", label:"Verdict"}
  ];

  return (
    <div className="fade-up" style={{animationDelay:(index*0.1)+"s",background:"rgba(255,255,255,0.04)",border:"1px solid "+col+"44",borderRadius:"16px",overflow:"hidden",marginBottom:"20px"}}>
      <div style={{background:"rgba(0,0,0,0.3)",borderBottom:"1px solid "+col+"30",padding:"18px 22px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"10px"}}>
        <div>
          <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.14em",marginBottom:"4px"}}>OFFER {index+1}</div>
          <div style={{color:"#f0f0f0",fontFamily:"'DM Serif Display',serif",fontSize:"20px",fontWeight:"700"}}>{result.school}</div>
          <div style={{color:"#b0b0bc",fontSize:"12px",marginTop:"3px"}}>{result.program} &middot; {result.location}</div>
          {isGradPath && (
            <div style={{marginTop:"5px",display:"inline-block",background:col+"22",border:"1px solid "+col+"44",borderRadius:"6px",padding:"2px 8px",color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>
              {result.gradPathLabel} pathway
            </div>
          )}
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:col,fontSize:"22px",fontWeight:"800",fontFamily:"'Montserrat',sans-serif"}}>{result.annualCost}</div>
          <div style={{color:"#b0b0bc",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>PER YEAR</div>
          <div style={{color:"#b0b0bc",fontSize:"11px",marginTop:"2px"}}>{result.totalCost} total</div>
        </div>
      </div>

      <div style={{display:"flex",gap:"2px",padding:"10px 22px 0",borderBottom:"1px solid rgba(255,255,255,0.06)",overflowX:"auto"}}>
        {tabs.map(function(t) {
          return (
            <button key={t.id} onClick={function(){setTab(t.id);}} style={{padding:"7px 12px",borderRadius:"6px 6px 0 0",cursor:"pointer",border:"none",background:tab===t.id?(col+"22"):"transparent",color:tab===t.id?col:"#b0b0bc",fontFamily:"'Montserrat',sans-serif",fontSize:"10px",fontWeight:"700",whiteSpace:"nowrap",borderBottom:tab===t.id?("2px solid "+col):"2px solid transparent",flexShrink:0}}>
              {t.label}
            </button>
          );
        })}
      </div>

      <div style={{padding:"20px 22px"}}>

        {tab === "roi" && (
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",marginBottom:"12px"}}>
              <StatBox label="SALARY 1YR" value={roi.salary1yr} sub={roi.currency} color={col}/>
              <StatBox label="SALARY 5YR" value={roi.salary5yr} sub={roi.currency} color={col}/>
              <StatBox label="BREAK-EVEN" value={roi.breakEven} color={col}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
              <StatBox label="EMPLOYED 6MO" value={roi.employmentRate} color={col}/>
              <StatBox label="IN FIELD" value={roi.inFieldRate} color={col}/>
            </div>
            {isGradPath && (
              <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"10px",padding:"14px 16px",marginBottom:"12px"}}>
                <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"6px"}}>POST-GRAD SALARY ({result.gradPathLabel})</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
                  <StatBox label="EARLY CAREER" value={postgrad.salaryEarly} sub={roi.currency} color="#c9a84c"/>
                  <StatBox label="MID CAREER" value={postgrad.salaryMid} sub={roi.currency} color="#c9a84c"/>
                </div>
                <p style={{color:"#d0d0d8",fontSize:"12px",lineHeight:"1.6",margin:0}}>{postgrad.salaryNote}</p>
              </div>
            )}
            <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"10px",padding:"14px 16px"}}>
              <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"6px"}}>ROI ANALYSIS</div>
              <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.65",margin:0}}>{roi.analysis}</p>
            </div>
          </div>
        )}

        {tab === "career" && (
          <div>
            {isGradPath ? (
              <div>
                <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"10px",padding:"14px 16px",marginBottom:"12px"}}>
                  <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"6px"}}>CAREER AFTER {(result.gradPathLabel||"").toUpperCase()}</div>
                  <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.65",margin:0}}>{postgrad.careerOverview}</p>
                </div>
                <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"10px"}}>TOP CAREER OUTCOMES</div>
                {(postgrad.careerOutcomes||[]).map(function(c,i) {
                  return (
                    <div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",background:"rgba(255,255,255,0.05)",borderRadius:"8px",padding:"10px 12px",marginBottom:"8px"}}>
                      <div style={{background:(col+"22"),color:col,borderRadius:"50%",width:"22px",height:"22px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"700",flexShrink:0}}>{i+1}</div>
                      <div>
                        <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"700"}}>{c.role}</div>
                        <div style={{color:"#b0b0bc",fontSize:"11px",marginTop:"2px"}}>{c.salary} &middot; {c.note}</div>
                      </div>
                    </div>
                  );
                })}
                <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"10px",padding:"14px 16px",marginTop:"4px"}}>
                  <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"6px"}}>HOW THIS SCHOOL POSITIONS YOU</div>
                  <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.65",margin:0}}>{postgrad.schoolStrength}</p>
                </div>
              </div>
            ) : (
              <div>
                <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"10px"}}>TOP EMPLOYERS THAT RECRUIT HERE</div>
                {employers.map(function(e,i) {
                  return (
                    <div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",background:"rgba(255,255,255,0.05)",borderRadius:"8px",padding:"10px 12px",marginBottom:"8px"}}>
                      <div style={{background:(col+"22"),color:col,borderRadius:"50%",width:"22px",height:"22px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"700",flexShrink:0}}>{i+1}</div>
                      <div>
                        <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"700"}}>{e.name}</div>
                        <div style={{color:"#b0b0bc",fontSize:"11px",marginTop:"2px"}}>{e.type} &middot; {e.recruiting}</div>
                      </div>
                    </div>
                  );
                })}
                <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"10px",padding:"14px 16px",marginTop:"4px"}}>
                  <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"6px"}}>NETWORK STRENGTH</div>
                  <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.65",margin:0}}>{jobs.networkStrength}</p>
                </div>
              </div>
            )}
          </div>
        )}

        {tab === "grad" && (
          <div>
            {isGradPath ? (
              <div>
                <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"10px",padding:"14px 16px",marginBottom:"12px"}}>
                  <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"6px"}}>{(result.gradPathLabel||"GRAD SCHOOL").toUpperCase()} ADMISSIONS FROM HERE</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
                    <StatBox label="ACCEPTANCE RATE" value={postgrad.gradAcceptRate} color={col}/>
                    <StatBox label="AVG GPA NEEDED" value={postgrad.gradGPA} color={col}/>
                  </div>
                  <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.65",margin:0}}>{postgrad.gradAdmissionsNote}</p>
                </div>
                <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"10px"}}>TOP PROGRAMS THIS SCHOOL FEEDS INTO</div>
                {(postgrad.feederPrograms||[]).map(function(p,i) {
                  return (
                    <div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",background:"rgba(255,255,255,0.05)",borderRadius:"8px",padding:"10px 12px",marginBottom:"8px"}}>
                      <div style={{background:(col+"22"),color:col,borderRadius:"50%",width:"22px",height:"22px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"700",flexShrink:0}}>{i+1}</div>
                      <div>
                        <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"700"}}>{p.name}</div>
                        <div style={{color:"#b0b0bc",fontSize:"11px",marginTop:"2px"}}>{p.type} &middot; {p.note}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : (
              <div>
                <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"10px"}}>GRAD SCHOOL PIPELINE</div>
                {programs.map(function(g,i) {
                  return (
                    <div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",background:"rgba(255,255,255,0.05)",borderRadius:"8px",padding:"10px 12px",marginBottom:"8px"}}>
                      <div style={{background:(col+"22"),color:col,borderRadius:"50%",width:"22px",height:"22px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"700",flexShrink:0}}>{i+1}</div>
                      <div>
                        <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"700"}}>{g.name}</div>
                        <div style={{color:"#b0b0bc",fontSize:"11px",marginTop:"2px"}}>{g.type} &middot; {g.note}</div>
                      </div>
                    </div>
                  );
                })}
                <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"10px",padding:"14px 16px",marginTop:"4px"}}>
                  <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"6px"}}>GRAD SCHOOL STRENGTH</div>
                  <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.65",margin:0}}>{grad.analysis}</p>
                </div>
              </div>
            )}
          </div>
        )}

        {tab === "campus" && (
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
              <StatBox label="UNDERGRAD SIZE" value={campus.undergradSize} color={col}/>
              <StatBox label="AVG CLASS SIZE" value={campus.avgClassSize} color={col}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"12px"}}>
              <StatBox label="GREEK LIFE" value={campus.greekLife} color={col}/>
              <StatBox label="CAMPUS SAFETY" value={campus.campusSafetyRating} color={col}/>
              <StatBox label="DIVERSITY SCORE" value={campus.diversityRating} color={col}/>
            </div>
            <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"10px",padding:"14px 16px",marginBottom:"12px"}}>
              <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"6px"}}>STUDENT FORUM INSIGHTS</div>
              {(campus.forumInsights||[]).map(function(insight,i) {
                return (
                  <div key={i} style={{borderBottom:i<(campus.forumInsights||[]).length-1?"1px solid rgba(255,255,255,0.06)":"none",paddingBottom:"10px",marginBottom:"10px"}}>
                    <div style={{color:"#f0f0f0",fontSize:"12px",fontWeight:"700",marginBottom:"3px"}}>"{insight.quote}"</div>
                    <div style={{color:"#b0b0bc",fontSize:"11px"}}>{insight.source} &middot; {insight.topic}</div>
                  </div>
                );
              })}
            </div>
            <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"10px",padding:"14px 16px"}}>
              <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"6px"}}>SOCIAL SCENE OVERVIEW</div>
              <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.65",margin:0}}>{campus.socialOverview}</p>
            </div>
          </div>
        )}

        {tab === "verdict" && (
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
              <StatBox label="VALUE SCORE" value={(verdict.valueScore || "--") + "/10"} color={col}/>
              <StatBox label="PRESTIGE" value={(verdict.prestigeScore || "--") + "/10"} color={col}/>
            </div>
            <div style={{background:"rgba(0,0,0,0.3)",border:"1px solid "+col+"35",borderRadius:"12px",padding:"16px 18px",marginBottom:"12px"}}>
              <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"8px"}}>HONEST TAKE</div>
              <p style={{color:"#f0f0f0",fontSize:"14px",lineHeight:"1.7",margin:0,fontFamily:"'DM Serif Display',serif",fontStyle:"italic"}}>{verdict.honest}</p>
            </div>
            <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"10px",padding:"14px 16px"}}>
              <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"6px"}}>BEST FOR</div>
              <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.65",margin:0}}>{verdict.bestFor}</p>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

function WinnerBanner(props) {
  var results = props.results;
  if (!results || results.length < 2) return null;
  var winner = results[0];
  var col = "#5aba6a";
  return (
    <div className="fade-up" style={{background:"rgba(201,168,76,0.08)",border:"1px solid rgba(201,168,76,0.4)",borderRadius:"16px",padding:"24px 28px",marginBottom:"28px",textAlign:"center"}}>
      <div style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.18em",marginBottom:"8px"}}>FYPU RECOMMENDATION</div>
      <div style={{color:"#f0f0f0",fontFamily:"'DM Serif Display',serif",fontSize:"26px",fontWeight:"700",marginBottom:"6px"}}>Go with {winner.school}</div>
      <div style={{color:"#b0b0bc",fontSize:"12px",fontFamily:"'Montserrat',sans-serif",marginBottom:"14px"}}>{winner.program} &middot; {winner.annualCost}/yr</div>
      <p style={{color:"#d0d0d8",fontSize:"14px",lineHeight:"1.7",maxWidth:"560px",margin:"0 auto",fontFamily:"'DM Serif Display',serif",fontStyle:"italic"}}>{winner.overallVerdict}</p>
    </div>
  );
}

function App() {
  var offersState = useState([emptyOffer(), emptyOffer()]);
  var offers = offersState[0], setOffers = offersState[1];
  var careerState = useState("");
  var careerGoal = careerState[0], setCareerGoal = careerState[1];
  var resultsState = useState(null);
  var results = resultsState[0], setResults = resultsState[1];
  var loadingState = useState(false);
  var loading = loadingState[0], setLoading = loadingState[1];
  var errorState = useState("");
  var error = errorState[0], setError = errorState[1];
  var progressState = useState(0);
  var progress = progressState[0], setProgress = progressState[1];

  function updateOffer(i, val) {
    setOffers(function(prev) { return prev.map(function(o,j){ return j===i?val:o; }); });
  }
  function addOffer() {
    if (offers.length < 4) setOffers(function(prev){ return prev.concat([emptyOffer()]); });
  }
  function removeOffer(i) {
    setOffers(function(prev){ return prev.filter(function(_,j){ return j!==i; }); });
  }

  var filledOffers = offers.filter(function(o){ return o.school.trim() && o.major; });

  function analyze() {
    if (filledOffers.length < 2) { setError("Please enter at least 2 offers to compare."); return; }
    setError(""); setLoading(true); setResults(null); setProgress(0);

    var offerSummaries = filledOffers.map(function(o,i) {
      var gp = GRAD_PATHS.filter(function(g){ return g.key===o.gradPath; })[0];
      var gpLabel = gp ? gp.label : "Career after undergrad";
      return "Offer "+(i+1)+": "+o.school+", "+o.major+", tuition: "+(o.tuition||"unknown")+", aid: "+(o.notes||"none")+", post-grad: "+gpLabel;
    }).join("; ");

    // Schema for main analysis (ROI, jobs, grad, postgrad, verdict)
    var mainSchema = filledOffers.map(function(o) {
      var gp = GRAD_PATHS.filter(function(g){ return g.key===o.gradPath; })[0];
      var gpLabel = gp ? gp.label : "Career after undergrad";
      return '{"school":"'+o.school+'","program":"'+o.major+'","location":"City, State/Province, Country","annualCost":"$XX,XXX","totalCost":"$XXX,XXX","gradPath":"'+(o.gradPath||"none")+'","gradPathLabel":"'+gpLabel+'",' +
        '"roi":{"salary1yr":"$XX,XXX","salary5yr":"$XX,XXX","currency":"USD or CAD","breakEven":"X yrs","employmentRate":"XX%","inFieldRate":"XX%","analysis":"2 sentence ROI analysis"},' +
        '"jobs":{"topEmployers":[{"name":"Employer","type":"Tech|Finance|Consulting|Other","recruiting":"On-Campus|Target|General"},{"name":"E2","type":"t","recruiting":"r"},{"name":"E3","type":"t","recruiting":"r"},{"name":"E4","type":"t","recruiting":"r"},{"name":"E5","type":"t","recruiting":"r"}],"networkStrength":"2 sentences"},' +
        '"grad":{"topPrograms":[{"name":"Program","type":"MBA|Law|Med|PhD|MS","note":"note"},{"name":"P2","type":"t","note":"n"},{"name":"P3","type":"t","note":"n"}],"analysis":"2 sentences"},' +
        '"postgrad":{"salaryEarly":"$XX,XXX","salaryMid":"$XX,XXX","salaryNote":"CAD/USD","careerOverview":"2 sentences","careerOutcomes":[{"role":"title","salary":"$Xk","note":"n"},{"role":"r2","salary":"s","note":"n"},{"role":"r3","salary":"s","note":"n"}],"schoolStrength":"2 sentences","gradAcceptRate":"XX%","gradGPA":"X.X+","gradAdmissionsNote":"2 sentences","feederPrograms":[{"name":"Program","type":"type","note":"n"},{"name":"p2","type":"t","note":"n"},{"name":"p3","type":"t","note":"n"}]},' +
        '"verdict":{"valueScore":8,"prestigeScore":7,"honest":"2 sentence honest assessment","bestFor":"ideal student type"}}';
    }).join(",");

    // Schema for campus life (separate call)
    var campusSchema = filledOffers.map(function(o) {
      return '{"school":"'+o.school+'","campus":{"undergradSize":"XX,XXX","avgClassSize":"~XX","greekLife":"Strong|Moderate|Minimal|None","campusSafetyRating":"X/5","diversityRating":"X/5","forumInsights":[{"quote":"student quote","source":"Reddit r/school","topic":"Social|Safety|Greek|Housing"},{"quote":"q2","source":"s2","topic":"t2"},{"quote":"q3","source":"s3","topic":"t3"}],"socialOverview":"3 sentences on campus vibe and social scene"}}';
    }).join(",");

    var mainPrompt = "Brutally honest university financial advisor with deep knowledge of US and Canadian universities. " +
      "Use NACE data for US salaries, Statistics Canada for Canadian. Name real employers. " +
      "Offers: " + offerSummaries + ". " +
      (careerGoal ? "Career goal: " + careerGoal + ". " : "") +
      "No apostrophes in strings. Return ONLY JSON: " +
      '{"offers":[' + mainSchema + '],"overallVerdict":"3 sentence recommendation on which offer to pick and why"}';

    var campusPrompt = "University campus life expert. Use real student review data from Reddit and College Confidential. " +
      "Offers: " + offerSummaries + ". " +
      "No apostrophes. Return ONLY JSON: " +
      '{"campusData":[' + campusSchema + ']}';

    var headers = {"Content-Type":"application/json"};
    if (IS_LOCAL) headers["anthropic-dangerous-direct-browser-access"] = "true";
    var body1 = JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:3500,messages:[{role:"user",content:mainPrompt}]});
    var body2 = JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:campusPrompt}]});

    var interval = null;
    var p = 0;
    interval = setInterval(function() {
      p = Math.min(p + Math.random()*4, 88);
      setProgress(Math.round(p));
    }, 500);

    function parseJSON(raw) {
      var cleaned = raw.replace(/```json|```/g,"").replace(/[‘’]/g,"'").replace(/[“”]/g,'"').trim();
      if (cleaned.slice(0,20).match(/^(An error|Error|Sorry|I cannot|I am unable)/i)) {
        throw new Error("API returned an error. Please try again.");
      }
      var first = cleaned.indexOf("{"), last = cleaned.lastIndexOf("}");
      if (first===-1||last===-1) throw new Error("Invalid response. Please try again.");
      try { return JSON.parse(cleaned.slice(first,last+1)); }
      catch(e) { throw new Error("Could not parse response. Please try again."); }
    }

    function callAPI(body) {
      return fetch(API_URL, {method:"POST",headers:headers,body:body})
        .then(function(res){
          if (!res.ok) throw new Error("Server error "+res.status+". Please try again.");
          return res.json();
        })
        .then(function(json) {
          if (json.error) throw new Error(json.error.message||"API error");
          var raw = (json.content||[]).map(function(b){ return b.text||""; }).join("").trim();
          return parseJSON(raw);
        });
    }

    // Run both calls, retry main if it fails once
    function runMain(attempt) {
      return callAPI(body1).catch(function(e) {
        if (attempt < 2) {
          return new Promise(function(resolve){ setTimeout(function(){ resolve(runMain(2)); }, 1000); });
        }
        throw e;
      });
    }

    Promise.all([runMain(1), callAPI(body2).catch(function(){ return null; })])
      .then(function(results) {
        clearInterval(interval);
        var mainData = results[0];
        var campusData = results[1];
        if (!mainData.offers||mainData.offers.length===0) throw new Error("No offer data returned.");
        // Merge campus data into offers
        if (campusData && campusData.campusData) {
          campusData.campusData.forEach(function(cd, i) {
            if (mainData.offers[i]) mainData.offers[i].campus = cd.campus;
          });
        }
        mainData.offers[0].overallVerdict = mainData.overallVerdict;
        setProgress(100);
        setTimeout(function(){ setResults(mainData.offers); setLoading(false); }, 300);
      })
      .catch(function(e) {
        clearInterval(interval);
        setError("Analysis failed: "+e.message);
        setLoading(false);
        setProgress(0);
      });
  }

  return (
    <div style={{minHeight:"100vh",background:"#080808",backgroundImage:"radial-gradient(ellipse at 10% 0%,rgba(90,186,106,0.07) 0%,transparent 50%)"}}>
      <div style={{borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"0 24px",height:"56px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <a href={HOME_URL} style={{display:"flex",alignItems:"center",gap:"10px",textDecoration:"none"}}>
          <img src={LOGO_URI} alt="FYPU" style={{height:"36px",width:"auto",mixBlendMode:"screen",opacity:0.9}}/>
          <span style={{color:"#c9a84c",fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"700",letterSpacing:"0.18em"}}>FYPU</span>
        </a>
        <a href={HOME_URL} style={{color:"#b0b0bc",fontSize:"11px",fontWeight:"600",fontFamily:"'Montserrat',sans-serif",textDecoration:"none"}}>BACK</a>
      </div>
      <div style={{maxWidth:"820px",margin:"0 auto",padding:"48px 24px 80px"}}>
        {!results && !loading && (
          <div style={{textAlign:"center",marginBottom:"48px"}}>
            <div style={{color:"#b0b0bc",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.22em",marginBottom:"20px"}}>OFFER COMPARISON TOOL</div>
            <h1 style={{fontFamily:"'Bodoni Moda',serif",fontSize:"clamp(30px,5vw,52px)",fontWeight:"900",color:"#f0f0f0",lineHeight:"1.08",marginBottom:"10px"}}>You Got In.</h1>
            <div style={{fontFamily:"'Great Vibes',cursive",fontSize:"clamp(28px,5vw,44px)",background:"linear-gradient(135deg,#5aba6a,#c9a84c,#f0e090,#5aba6a)",backgroundSize:"200% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:"20px",lineHeight:"1.4",animation:"shimmer 4s linear infinite"}}>Now Make the Smart Choice.</div>
            <p style={{color:"#b0b0bc",fontSize:"13px",maxWidth:"440px",margin:"0 auto",lineHeight:"1.8"}}>Enter your offers including your post-grad plans. FYPU analyses ROI, career paths, campus life and gives you an honest recommendation.</p>
          </div>
        )}
        {results && !loading && (
          <div style={{marginBottom:"24px",display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:"12px"}}>
            <h2 style={{color:"#f0f0f0",fontFamily:"'Bodoni Moda',serif",fontSize:"28px",fontWeight:"900"}}>{results.length} Offers Analyzed</h2>
            <button onClick={function(){ setResults(null); setProgress(0); }} style={{background:"none",border:"1px solid rgba(255,255,255,0.12)",color:"#b0b0bc",borderRadius:"8px",padding:"8px 16px",cursor:"pointer",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>Edit Offers</button>
          </div>
        )}
        {loading && (
          <div style={{textAlign:"center",padding:"80px 20px"}}>
            <div style={{width:"50px",height:"50px",border:"2px solid rgba(255,255,255,0.06)",borderTop:"2px solid #5aba6a",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 24px"}}></div>
            <div style={{color:"#f0f0f0",fontFamily:"'DM Serif Display',serif",fontSize:"20px",marginBottom:"8px"}}>Analyzing your offers...</div>
            <div style={{color:"#b0b0bc",fontFamily:"'Montserrat',sans-serif",fontSize:"12px",marginBottom:"24px"}}>Cross-checking ROI, career paths, campus life and grad school outcomes</div>
            <div style={{maxWidth:"280px",margin:"0 auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
                <span style={{color:"#555",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>Progress</span>
                <span style={{color:"#5aba6a",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>{progress}%</span>
              </div>
              <div style={{height:"3px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden"}}>
                <div style={{width:progress+"%",height:"100%",background:"linear-gradient(90deg,#5aba6a,#c9a84c)",borderRadius:"2px",transition:"width 0.4s ease"}}></div>
              </div>
            </div>
          </div>
        )}
        {results && !loading && (
          <div>
            <WinnerBanner results={results}/>
            {results.map(function(r,i){ return <OfferCard key={i} result={r} index={i}/>; })}
            <div style={{marginTop:"16px",padding:"12px 16px",background:"rgba(255,255,255,0.04)",borderRadius:"10px",color:"#555",fontSize:"11px",lineHeight:"1.7",fontFamily:"'Montserrat',sans-serif"}}>
              Analysis uses AI cross-referenced with NACE, Statistics Canada, and student forum data. Verify all figures directly with institutions before deciding.
            </div>
          </div>
        )}
        {!results && !loading && (
          <div>
            <div style={{marginBottom:"18px"}}>
              <label style={{display:"block",color:"#b0b0bc",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.18em",marginBottom:"12px"}}>YOUR OFFERS *</label>
              {offers.map(function(o,i) {
                return (
                  <div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(90,186,106,0.2)",borderRadius:"14px",padding:"18px 20px",marginBottom:"12px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                      <span style={{color:"#5aba6a",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700",letterSpacing:"0.1em"}}>OFFER {i+1}</span>
                      {offers.length > 2 && (
                        <button onClick={function(){ removeOffer(i); }} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:"18px",lineHeight:1}}>x</button>
                      )}
                    </div>
                    <div style={{marginBottom:"10px"}}>
                      <input value={o.school} onChange={function(e){ updateOffer(i,{school:e.target.value,major:o.major,tuition:o.tuition,notes:o.notes,gradPath:o.gradPath}); }} placeholder="School name e.g. University of Toronto or University of Michigan" style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"8px",padding:"10px 12px",fontSize:"13px",color:"#f0f0f0",boxSizing:"border-box",marginBottom:"8px"}}/>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
                        <select value={o.major} onChange={function(e){ updateOffer(i,{school:o.school,major:e.target.value,tuition:o.tuition,notes:o.notes,gradPath:o.gradPath}); }} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"8px",padding:"10px 12px",fontSize:"13px",color:o.major?"#f0f0f0":"#555",cursor:"pointer",boxSizing:"border-box"}}>
                          <option value="" disabled style={{background:"#111"}}>Select major...</option>
                          {MAJORS.map(function(m){ return <option key={m} value={m} style={{background:"#111"}}>{m}</option>; })}
                        </select>
                        <input value={o.tuition} onChange={function(e){ updateOffer(i,{school:o.school,major:o.major,tuition:e.target.value,notes:o.notes,gradPath:o.gradPath}); }} placeholder="Tuition after aid e.g. $28,000" style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"8px",padding:"10px 12px",fontSize:"13px",color:"#f0f0f0",boxSizing:"border-box"}}/>
                      </div>
                      <div style={{marginBottom:"8px"}}>
                        <div style={{color:"#b0b0bc",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"6px"}}>POST-GRAD PLAN</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                          {GRAD_PATHS.map(function(gp) {
                            var selected = (o.gradPath||"none") === gp.key;
                            return (
                              <button key={gp.key} onClick={function(){ updateOffer(i,{school:o.school,major:o.major,tuition:o.tuition,notes:o.notes,gradPath:gp.key}); }} style={{padding:"5px 12px",borderRadius:"8px",cursor:"pointer",border:"1px solid "+(selected?"rgba(90,186,106,0.6)":"rgba(255,255,255,0.08)"),background:selected?"rgba(90,186,106,0.12)":"transparent",color:selected?"#5aba6a":"#b0b0bc",fontFamily:"'Montserrat',sans-serif",fontSize:"10px",fontWeight:selected?"700":"400",transition:"all 0.15s"}}>
                                {gp.label}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                      <input value={o.notes} onChange={function(e){ updateOffer(i,{school:o.school,major:o.major,tuition:o.tuition,notes:e.target.value,gradPath:o.gradPath}); }} placeholder="Scholarship notes (optional) e.g. Merit scholarship $12k/yr" style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"8px",padding:"10px 12px",fontSize:"13px",color:"#f0f0f0",boxSizing:"border-box"}}/>
                    </div>
                  </div>
                );
              })}
              {offers.length < 4 && (
                <button onClick={addOffer} style={{background:"none",border:"1px dashed rgba(90,186,106,0.3)",color:"#5aba6a",borderRadius:"10px",padding:"12px 18px",cursor:"pointer",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",fontWeight:"600",width:"100%"}}>
                  + Add another offer ({offers.length}/4)
                </button>
              )}
            </div>
            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"12px",padding:"16px 18px",marginBottom:"16px"}}>
              <label style={{display:"block",color:"#b0b0bc",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.18em",marginBottom:"8px"}}>YOUR CAREER GOAL <span style={{color:"#555",fontWeight:"400"}}>(optional — helps personalise analysis)</span></label>
              <input value={careerGoal} onChange={function(e){ setCareerGoal(e.target.value); }} placeholder="e.g. Become a cardiologist, software engineer at Google, corporate lawyer..." style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"8px",padding:"10px 12px",fontSize:"13px",color:"#f0f0f0",boxSizing:"border-box"}}/>
            </div>
            {error && (
              <div style={{color:"#c0302a",fontSize:"13px",marginBottom:"12px",padding:"10px 14px",background:"rgba(139,26,26,0.12)",borderRadius:"8px"}}>{error}</div>
            )}
            <button onClick={analyze} disabled={loading||filledOffers.length<2} style={{width:"100%",background:filledOffers.length<2?"rgba(255,255,255,0.05)":"linear-gradient(135deg,#2d6e3a,#5aba6a)",color:filledOffers.length<2?"#555":"#080808",border:"none",borderRadius:"10px",padding:"15px",fontSize:"13px",fontWeight:"700",letterSpacing:"0.1em",cursor:filledOffers.length<2?"not-allowed":"pointer",fontFamily:"'Montserrat',sans-serif",marginBottom:"14px"}}>
              ANALYZE MY OFFERS ({filledOffers.length} offer{filledOffers.length!==1?"s":""})
            </button>
            <div style={{textAlign:"center"}}>
              <a href={HOME_URL} style={{color:"#555",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",textDecoration:"none"}}>Still deciding where to apply? Back to FYPU</a>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

var root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
