function getGradSuggestions(major) {
  const keys = MAJOR_TO_GRAD_PATHS[major] || ["grad","mba","law"];
  return keys.map(k => POST_GRAD_PATHS.find(p => p.key === k)).filter(Boolean);
}

function detectPostGradPath(major) {
  if (!major) return null;
  const suggestions = getGradSuggestions(major);
  return suggestions[0] || POST_GRAD_PATHS.find(p => p.key === "grad");
}

function Dial({score, color}) {
  const r=28, circ=2*Math.PI*r, dash=(score/10)*circ;
  return (
    <svg width="70" height="70" viewBox="0 0 70 70">
      <circle cx="35" cy="35" r={r} fill="none" stroke="rgba(139,26,26,0.10)" strokeWidth="5"/>
      <circle cx="35" cy="35" r={r} fill="none" stroke={color} strokeWidth="5"
        strokeDasharray={dash+" "+(circ-dash)} strokeLinecap="round" transform="rotate(-90 35 35)"/>
      <text x="35" y="40" textAnchor="middle" fill={color} fontSize="16" fontWeight="700" fontFamily="monospace">{score}</text>
    </svg>
  );
}

function CBar({label, valA, valB, nameA, nameB, cA, cB, higher}) {
  const parse = v => parseFloat(String(v).replace(/[^0-9.]/g,""))||0;
  const a=parse(valA), b=parse(valB), mx=Math.max(a,b)||1;
  const hasA = a > 0, hasB = b > 0;
  if (!hasA && !hasB) return null;
  const win = higher!==false ? (a>=b?"A":"B") : (a<=b?"A":"B");
  return (
    <div style={{marginBottom:"18px"}}>
      <div style={{color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",marginBottom:"8px"}}>{label}</div>
      {[{n:nameA,v:a,raw:valA,c:cA,s:"A"},{n:nameB,v:b,raw:valB,c:cB,s:"B"}].map(x=>(
        <div key={x.s} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}>
          <div style={{width:"100px",fontSize:"10px",color:"#9898a8",fontFamily:"'Montserrat',sans-serif",textAlign:"right",flexShrink:0}}>{x.n.split(" ").slice(0,2).join(" ")}</div>
          <div style={{flex:1,background:"rgba(255,255,255,0.04)",borderRadius:"4px",height:"24px",overflow:"hidden"}}>
            <div style={{width:Math.max((x.v/mx)*100,8)+"%",height:"100%",background:x.c+(win===x.s?"":"88"),borderRadius:"4px",display:"flex",alignItems:"center",paddingLeft:"8px",minWidth:"30px"}}>
              <span style={{color:"#080808",fontSize:"10px",fontWeight:"700",fontFamily:"'Montserrat',sans-serif",whiteSpace:"nowrap"}}>{x.raw}</span>
            </div>
          </div>
          {win===x.s && <span style={{color:x.c,fontSize:"14px"}}>&#10003;</span>}
        </div>
      ))}
    </div>
  );
}

    ]},
    {label:"Social Sciences & Humanities", options:[
      "Psychology","Sociology","Anthropology","History","Philosophy",
      "English Literature","Linguistics","Communications","Journalism"
    ]},
    {label:"Arts & Design", options:[
      "Architecture","Graphic Design","Film & Media Studies","Fine Arts",
      "Music","Theatre / Performing Arts","Fashion Design"
    ]},
    {label:"Education & Social Work", options:[
      "Education","Social Work","Counselling Psychology"
    ]},
    {label:"Other", options:[
      "Undecided / Exploring","Other (not listed)"
    ]}
  ];
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(()=>{
    function handle(e){ if(ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", handle);
    return ()=>document.removeEventListener("mousedown", handle);
  },[]);
  return (
    <div ref={ref} style={{position:"relative"}}>
      <div
        onClick={()=>setOpen(!open)}
        style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(107,159,228,0.20)",borderRadius:"10px",
          padding:"11px 14px",color:value?"#f0f0f0":"#9898a8",fontSize:"13px",cursor:"pointer",
          display:"flex",justifyContent:"space-between",alignItems:"center",userSelect:"none",
          boxSizing:"border-box"}}

        <span>{value||"Select your intended major..."}</span>
        <span style={{color:"#9898a8",fontSize:"10px",marginLeft:"8px"}}>{open?"▲":"▼"}</span>
      </div>
      {open && (
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:500,
          background:"#0c0c0c",border:"1px solid rgba(255,255,255,0.15)",borderRadius:"10px",
          maxHeight:"320px",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.6)"}}>
          {groups.map(g=>(
            <div key={g.label}>
              <div style={{padding:"8px 14px 4px",color:"#c9a84c",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",
                letterSpacing:"0.12em",fontWeight:"700",borderTop:"1px solid rgba(107,159,228,0.10)",
                background:"rgba(139,26,26,0.08)"}}>
                {g.label}
              </div>
              {g.options.map(opt=>(
                <div key={opt}
                  onClick={()=>{onChange(opt);setOpen(false);}}
                  style={{padding:"9px 14px 9px 22px",color:value===opt?"#f15177":"#d0d0d8",fontSize:"13px",
                    cursor:"pointer",background:value===opt?"rgba(139,26,26,0.10)":"transparent",
                    transition:"background 0.12s"}}

                  onMouseLeave={e=>e.currentTarget.style.background=value===opt?"rgba(139,26,26,0.10)":"transparent"}

    </div>
  );
}

    "Virginia Polytechnic Institute":"Virginia Tech",
    "North Carolina State University":"NC State",
    "Clemson University":"Clemson",
    "University of South Carolina":"USC Upstate",
    "Florida State University":"FSU",
    "Florida International University":"FIU",
    "University of Central Florida":"UCF",
    "University of South Florida":"USF",
    "Texas A&M University":"Texas A&M",
    "University of Houston":"U Houston",
    "Baylor University":"Baylor",
    "Texas Tech University":"Texas Tech",
    "Southern Methodist University":"SMU",
    "Fordham University":"Fordham",
    "Hofstra University":"Hofstra",
    "Yeshiva University":"YU",
    "Tufts University":"Tufts",
    "Brandeis University":"Brandeis",
    "Rochester Institute of Technology":"RIT",
    "Babson College":"Babson",
    "Bentley University":"Bentley",
    "Colgate University":"Colgate",
    "Bucknell University":"Bucknell",
    "Lafayette College":"Lafayette",
  };
  // Check exact match
  if (known[name]) return known[name];
  // Check if name contains a known key
  for (const [k,v] of Object.entries(known)) {
    if (name.toLowerCase().includes(k.toLowerCase())) return v;
  }
  // Shorten generic long names: "University of X" -> "U X" if > 20 chars
  if (name.length <= 18) return name;
  const match = name.match(/^University of (.+)$/);
  if (match) return "U " + match[1];
  return name;
}

  useEffect(()=>{ runAnalysis(); },[]);

  async function runAnalysis() {
    const gs = GRADE_SYSTEMS[profile.province] || {};
    const ctx =
      "Student: province=" + profile.province + ", avg=" + profile.cumAvg + " (" + (gs.scale||"") + "), " +
      "SAT=" + (profile.satScore||"N/A") + ", ACT=" + (profile.actScore||"N/A") + ", " +

      (profile.programs&&profile.programs.ib ? ", IB predicted="+profile.ibScore+"/45" : "") +
      (profile.programs&&profile.programs.ap ? ", AP: "+profile.apCourses : "") +
      ", ECs=" + (profile.extras||"none") + ", awards=" + (profile.awards||"none") + ". " +
      "School: " + school.name + " (" + category + ", accept=" + school.acceptRate + "). " +
      "Program: " + ((school.targetProgram||{}).name||profile.intendedMajor) + " (" + ((school.targetProgram||{}).admRate||"?") + "). ";

    async function callAPI(promptText, maxTok) {
      for (let t = 1; t <= 2; t++) {
        try {
          const r = await fetch("/api/claude", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:maxTok,
              messages:[{role:"user",content:promptText}]})
          });
          const j = await r.json();
          if (j.error) throw new Error(j.error.message);
          const raw = (j.content||[]).map(b=>b.text||"").join("").split(String.fromCharCode(96,96,96)+"json").join("").split(String.fromCharCode(96,96,96)).join("").trim();
          let best2 = null; let d2=0, s2=-1;
          for (let i=0;i<raw.length;i++) {
            if(raw[i]==="{"){if(d2===0)s2=i;d2++;}
            else if(raw[i]==="}"){d2--;if(d2===0&&s2!==-1){try{best2=JSON.parse(raw.slice(s2,i+1));break;}catch(e3){s2=-1;}}}
          }
          if (!best2) throw new Error("no JSON");
          return best2;
        } catch(err) {
          if (t===2) throw err;
          await new Promise(r=>setTimeout(r,600));
        }
      }
    }

    const p1 = ctx +
      "Return ONLY JSON, no markdown: " +
      '{"riskAnalysis":{"admissionTrend":{"rateIn2019":"","rateIn2024":"","absoluteChange":"","direction":"","intlSpecificRate":"","commentary":""},' +
      '"gapAnalysis":{"studentGPA":"","median50thGPA":"","medianGapPoints":"","sat25th":"","sat75th":"","studentSATStatus":"","satGapPoints":"","commentary":""},' +
      '"volatilityScore":{"score":0,"label":"","yearOverYearSwing":"","mostVolatileYear":"","causeOfVolatility":"","implication":""},' +
      '"internationalPenalty":{"domesticRate":"","internationalRate":"","penaltyFactor":"","canadianSpecific":"","financialAidRisk":""},' +
      '"supplementalWeight":{"essayCount":0,"totalWordCount":0,"weightPercentage":"","recommendedHours":0,"hoursBreakdown":"","specificPrompts":["",""],"riskIfWeak":""}},' +
      '"weaknessIdentification":{"overallRisk":"","primaryWeakness":{"factor":"","severity":"","specificData":"","impact":""},' +
      '"secondaryWeakness":{"factor":"","severity":"","specificData":"","impact":""},' +
      '"hiddenRisk":{"factor":"","explanation":""},"strengths":["","",""]}}';

    const p2 = ctx +
      (isSenior ? "Grade 12: omit SAT retakes, only test-optional advice. " : "Year "+hsYear+": include SAT strategy. ") +
      "Return ONLY JSON, no markdown: " +
      '{"optimizationAdvice":{"highestROIAction":{"action":"","expectedImpact":"","timeRequired":"","howTo":""},' +
      '"satStrategy":{"currentSAT":"' + (profile.satScore||"N/A") + '","currentACT":"' + (profile.actScore||"N/A") + '","targetScore":"","pointsNeeded":"","weeklyHours":0,"weeksNeeded":0,"resources":["",""],"testOptionalAdvice":"","seniorNote":"' + (isSenior?"SENIOR: test-optional":"") + '"},' +
      '"essayStrategy":{"topicSuggestions":["",""],"wordsBySection":{"whyUs":250,"mainEssay":650},"differentiationAdvice":""},' +
      '"ecGapFill":{"missingElement":"","specificSuggestion":"","leadTime":"' + (isSenior?"immediate":"6-18 months") + '"}},' +
      '"timelinePlanning":{"applicationDeadline":"","earlyOptionAvailable":true,"earlyDeadline":"","earlyAdvantage":"","milestones":[{"date":"","task":"","hoursRequired":0,"priority":"Critical"},{"date":"","task":"","hoursRequired":0,"priority":"High"},{"date":"","task":"","hoursRequired":0,"priority":"High"},{"date":"","task":"","hoursRequired":0,"priority":"Critical"},{"date":"","task":"","hoursRequired":0,"priority":"Medium"}],"totalHoursEstimate":0,"criticalWarning":"","yearSpecificNote":""}}';

    // p4: Bachelor's-only target school/employer analysis
    const p4 = !isPostGrad
      ? ctx + "For " + school.name + " undergrad (" + profile.intendedMajor + "): " +
        "Give: (1) top 6 employers that recruit from this school for this major (on-campus/target school), " +

        '"gradSchoolTargets":[{"name":"","type":"MBA|Law|Med|PhD|MS|Other","placementRate":"","note":""}],' +

    try {

      const promises = calls.map((call, i) =>
        call.then(result => {
          setData(prev => Object.assign({}, prev||{}, result));

      );
      await Promise.all(promises);
    } catch(e) {
      console.error("Analysis failed:", e);
      setData(prev => prev || null);

                  <SBox label="Intl Rate" value={data.riskAnalysis.internationalPenalty.internationalRate} color="#c0302a"/>

                  <CLabel style={{margin:0}}>SUPPLEMENTAL ESSAY RISK<InfoTip text="Many US schools require extra essays beyond the Common App. These can make or break your application — this section shows how much weight they carry and how many hours to invest."/></CLabel>

                {forumBusy && (

                    <div style={{width:"28px",height:"28px",border:"2px solid rgba(107,159,228,0.10)",borderTop:"2px solid #c0302a",borderRadius:"50%",animation:"nbspin 0.8s linear infinite",margin:"0 auto 8px"}}/>

                      </div>

                  </div>

                {forumData && forumData.error && (
                  <div style={{marginTop:"12px",color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",textAlign:"center",padding:"10px"}}>

          {tab==="weakness" && (

                <div style={{width:"12px",height:"12px",borderRadius:"50%",background:rCol(data.weaknessIdentification.overallRisk),flexShrink:0}}/>
                <div>
                  <div style={{color:rCol(data.weaknessIdentification.overallRisk),fontWeight:"700",fontFamily:"'Montserrat',sans-serif",fontSize:"13px"}}>OVERALL RISK: {(data.weaknessIdentification.overallRisk||"").toUpperCase()}</div>

                const sc={High:"#c0302a",Medium:"#e8c96a",Low:"#5aba6a"}[(w.d||{}).severity]||"#705858";
                return (
                  <DCard key={i}>
                    <CLabel>{w.lbl}</CLabel>
                    <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>

                        <div style={{color:sc,fontSize:"11px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700"}}>{(w.d||{}).severity}</div>

                        <div style={{color:"#f0f0f0",fontSize:"14px",fontWeight:"600",marginBottom:"4px"}}>{(w.d||{}).factor}</div>

                      </div>
                    </div>
                  </DCard>
                );
              })}

                <CLabel color="#c9a84c">HIDDEN RISK</CLabel>

                <CLabel color="#5aba6a">YOUR COMPETITIVE STRENGTHS</CLabel>

                    <span style={{color:"#5aba6a",fontFamily:"'Montserrat',sans-serif",fontSize:"13px",flexShrink:0}}>&#10003;</span>
                    <span style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.5"}}>{s}</span>
                  </div>
                ))}
              </DCard>
            </div>
          )}
          {tab==="optimize" && (

                  <Tag c="#e8c96a">Impact: {(data.optimizationAdvice.highestROIAction||{}).expectedImpact}</Tag>

                </div>
                <p style={{color:"#9898a8",fontSize:"12px",lineHeight:"1.7",margin:0}}>{(data.optimizationAdvice.highestROIAction||{}).howTo}</p>
              </div>
              <DCard>
                <CLabel>SAT STRATEGY<InfoTip text="The SAT (scored 0–1600) and ACT (scored 1–36) are standardized tests used by US universities. Many schools are now 'test-optional' meaning you can choose not to submit a score."/></CLabel>

                  <div style={{background:"rgba(255,159,67,0.10)",border:"1px solid rgba(255,159,67,0.28)",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",gap:"8px",alignItems:"center"}}>
                    <span style={{color:"#c9a84c",fontSize:"12px",flexShrink:0}}>&#9888;</span>
                    <span style={{color:"#c9a84c",fontSize:"12px"}}>Grade 12 - focus on test-optional strategy, not retakes.</span>
                  </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"12px"}}>
                  <SBox label="Current" value={(data.optimizationAdvice.satStrategy||{}).currentScore} color="#705858"/>
                  <SBox label="Target" value={(data.optimizationAdvice.satStrategy||{}).targetScore} color={isSenior?"#9898a8":cfg.color}/>
                  <SBox label="Gap" value={isSenior?"N/A":(data.optimizationAdvice.satStrategy||{}).pointsNeeded} color={isSenior?"#9898a8":"#c0302a"}/>
                </div>
                {!isSenior && (
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
                    <SBox label="hrs/week" value={(data.optimizationAdvice.satStrategy||{}).weeklyHours} color="#705858"/>
                    <SBox label="weeks needed" value={(data.optimizationAdvice.satStrategy||{}).weeksNeeded} color="#705858"/>

                  <span style={{color:"#705858",fontSize:"12px"}}>{(data.optimizationAdvice.satStrategy||{}).testOptionalAdvice}</span>

              </DCard>

                <div style={{background:"rgba(139,26,26,0.08)",border:"1px solid rgba(139,156,244,0.22)",borderRadius:"8px",padding:"10px 12px"}}>
                  <div style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"3px"}}>CANADIAN TIP</div>
                  <div style={{color:"#d0d0d8",fontSize:"12px"}}>{(data.optimizationAdvice.essayStrategy||{}).differentiationAdvice}</div>

                <Tag c={isSenior?"#c9a84c":"#5aba6a"}>Start {(data.optimizationAdvice.ecGapFill||{}).leadTime} before application</Tag>
              </DCard>
            </div>
          )}
          {tab==="timeline" && (

                    <div style={{color:"#f0f0f0",fontSize:"22px",fontFamily:"'DM Serif Display',serif",fontStyle:"italic"}}>{data.timelinePlanning.earlyDeadline}</div>

                        <div style={{display:"flex",gap:"5px",flexShrink:0}}>
                          <Tag c="#9898a8">{m.hoursRequired}h</Tag>

// COMPARE PAGE
// ========================================
function ComparePage({schoolA, schoolB, catA, catB, profile, onBack}) {
  const [data,setData] = useState(null);
  const [busy,setBusy] = useState(true);
  const [tab,setTab]   = useState("roi");
  const cA="#c9a84c", cB="#c9a84c";

  useEffect(()=>{ run(); },[]);

  async function run() {
    const sA = schoolA.name, sB = schoolB.name;
    const progA = (schoolA.targetProgram||{}).name || profile.intendedMajor;
    const progB = (schoolB.targetProgram||{}).name || profile.intendedMajor;
    const ctx =
      "Canadian student (province=" + profile.province + ", avg=" + profile.grade +
      ", SAT=" + (profile.satScore||"none") + ", major=" + profile.intendedMajor + ") " +
      "comparing " + sA + " (" + progA + ") vs " + sB + " (" + progB + "). " +
      "Return ONLY a single JSON object, no markdown:\n";

    const schema =
      '{"roiComparison":{' +
      '"schoolA":{"annualTuition":"$X","employmentRate6mo":"X%","medianSalary6mo":"$X","roiScore":8,"roiNote":"note","breakEvenYears":"X yrs"},' +
      '"schoolB":{"annualTuition":"$X","employmentRate6mo":"X%","medianSalary6mo":"$X","roiScore":7,"roiNote":"note","breakEvenYears":"X yrs"},"verdict":"Which school offers better ROI and why in 2 sentences"}},' +
      '"schoolA":{"internshipRate":"X% or null","avgInternSalary":"$X/hr or null","medianInternSalary":"$X/hr or null","returnOfferRate":"X% or null","topInternEmployers":["E1","E2","E3"],"internStrength":"Strong|Moderate|Weak","intlEligibility":"note","typicalTimeline":"note","networkAdvantage":"1 sentence on alumni/recruiting network strength for internships","competitiveEdge":"1 sentence on what makes this school stand out for internships","note":"note"},' +
      '"schoolB":{"internshipRate":"X% or null","avgInternSalary":"$X/hr or null","medianInternSalary":"$X/hr or null","returnOfferRate":"X% or null","topInternEmployers":["E1","E2","E3"],"internStrength":"Strong|Moderate|Weak","intlEligibility":"note","typicalTimeline":"note","networkAdvantage":"1 sentence on alumni/recruiting network strength for internships","competitiveEdge":"1 sentence on what makes this school stand out for internships","note":"note"},"verdict":"2 sentence internship comparison"}},' +
      '"schoolB":{"internshipRate":"X%","avgInternSalary":"$X/hr","medianInternSalary":"$X/hr","topInternEmployers":["E1","E2","E3"],"internStrength":"Strong|Moderate|Weak","intlEligibility":"note","typicalTimeline":"note","returnOfferRate":"X%","note":"note"},"verdict":"2 sentence internship comparison"}},' +
      '"salaryComparison":{' +
      '"schoolA":{"median6mo":"$X","p25_6mo":"$X","p75_6mo":"$X","topEmployers":["E1","E2"],"employedInField6mo":"X%"},' +
      '"schoolB":{"median6mo":"$X","p25_6mo":"$X","p75_6mo":"$X","topEmployers":["E1","E2"],"employedInField6mo":"X%"}},' +
      '"competitivenessOutcome":{' +
      '"schoolA":{"admitDifficulty":"Very High","expectedAdmitProb":"X%","rankingInMajor":"Top X","alumniNetwork":"Strong","outcomeScore":8},' +
      '"schoolB":{"admitDifficulty":"High","expectedAdmitProb":"X%","rankingInMajor":"Top X","alumniNetwork":"Moderate","outcomeScore":7},"recommendationForStudent":"Personalized 2-sentence recommendation for this student"},' +
      '"overallVerdict":{"winner":"school name","winnerFor":"best scenario","summary":"3 sentence comparison","caveat":"important caveat"}}';

    async function fetchCompare(prompt, attempt) {
      const res = await fetch("/api/claude", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:3000, messages:[{role:"user", content:prompt}]})
      });
      const json = await res.json();
      if (json.error) throw new Error(json.error.message||"API error");
      const raw = (json.content||[]).map(b=>b.text||"").join("").split(String.fromCharCode(96,96,96)+"json").join("").split(String.fromCharCode(96,96,96)).join("").trim();
      const first = raw.indexOf("{"), last = raw.lastIndexOf("}");
      if (first===-1||last===-1) throw new Error("No JSON (attempt "+attempt+")");
      return JSON.parse(raw.slice(first, last+1));
    }

    // Try up to 2 attempts
    for (let attempt = 1; attempt <= 2; attempt++) {
      try {
        const result = await fetchCompare(ctx + schema, attempt);
        // Validate minimum required fields
        if (!result.roiComparison && !result.competitivenessOutcome) {
          throw new Error("Missing required fields in response");
        }
        setData(result);
        setBusy(false);
        return;
      } catch(e) {
        console.warn("Compare attempt " + attempt + " failed:", e.message);
        if (attempt === 2) {
          setData(null);
          setBusy(false);
        }
      }
    }
  }


  const isPostGradCompare = !!(profile && profile.postGrad);
  const pgPathCompare = isPostGradCompare ? (POST_GRAD_PATHS.find(p=>p.key===profile.pgPathKey)||detectPostGradPath(profile.intendedMajor)) : null;
  const tabs = isPostGradCompare
    ? [{id:"roi",label:"ROI"},{id:"coop",label:"Internships"},{id:"postgrad",label:(pgPathCompare?pgPathCompare.label.split(" ")[0]:"Post-Grad")+" Path"},{id:"outcome",label:"Competitiveness"}]
    : [{id:"roi",label:"ROI"},{id:"coop",label:"Internships"},{id:"salary",label:"Salary"},{id:"outcome",label:"Competitiveness"}];

  return (
    <div style={{position:"fixed",top:0,right:0,bottom:0,left:0,zIndex:999,background:"#080808",overflowY:"auto",fontFamily:"sans-serif",color:"#d0d0d8"}}>
      <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,900;1,6..96,400;1,6..96,900&family=DM+Serif+Display:ital@0;1&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
      <div style={{position:"sticky",top:0,zIndex:10,background:"rgba(8,8,8,0.97)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(107,159,228,0.18)",padding:"14px 24px",display:"flex",alignItems:"center",gap:"12px"}}>
        <button onClick={onBack} style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(107,159,228,0.22)",color:"#d0d0d8",borderRadius:"8px",padding:"7px 14px",cursor:"pointer",fontSize:"12px",fontFamily:"'Montserrat',sans-serif",flexShrink:0}}>Back</button>
        <div style={{display:"flex",gap:"8px",flex:1,minWidth:0,alignItems:"center"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:cA,fontSize:"9px",fontFamily:"'Montserrat',sans-serif"}}>{schoolAbbr(schoolA.name)}</div>
            <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"600",fontFamily:"'DM Serif Display',serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{schoolA.name}</div>
          </div>
          <span style={{color:"#9898a8",fontSize:"18px",flexShrink:0}}>vs</span>
          <div style={{flex:1,minWidth:0,textAlign:"right"}}>
            <div style={{color:cB,fontSize:"9px",fontFamily:"'Montserrat',sans-serif"}}>{schoolAbbr(schoolB.name)}</div>
            <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"600",fontFamily:"'DM Serif Display',serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{schoolB.name}</div>
          </div>
        </div>
      </div>

      {busy ? (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"70vh",gap:"20px"}}>
          <div style={{width:"48px",height:"48px",border:"3px solid rgba(107,159,228,0.10)",borderTop:"3px solid #c0302a",borderRadius:"50%",animation:"nbspin 0.8s linear infinite"}}/>
          <div style={{color:"#9898a8",fontFamily:"'Montserrat',sans-serif",fontSize:"12px"}}>RUNNING COMPARISON ANALYSIS...</div>
          <div style={{color:"#9898a8",fontSize:"11px",maxWidth:"280px",textAlign:"center",lineHeight:"1.6"}}>ROI, co-op, post-grad pipeline, competitiveness tradeoffs</div>
        </div>
      ) : data ? (
        <div style={{maxWidth:"880px",margin:"0 auto",padding:"28px 20px"}}>
          <div style={{display:"flex",gap:"10px",marginBottom:"20px"}}>
            {[{s:schoolA,cfg:CAT[catA],c:cA,lbl:schoolAbbr(schoolA.name)},{s:schoolB,cfg:CAT[catB],c:cB,lbl:schoolAbbr(schoolB.name)}].map(x=>(
              <div key={x.lbl} style={{background:x.cfg.bg,border:"1px solid "+x.cfg.border,borderRadius:"12px",padding:"14px 16px",flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
                  <span style={{color:x.cfg.color,fontSize:"14px"}}>{x.cfg.icon}</span>
                  <span style={{color:"#f0f0f0",fontFamily:"'DM Serif Display',serif",fontSize:"14px",fontWeight:"700",lineHeight:"1.2"}}>{x.s.name}</span>
                </div>
                {x.s.targetProgram && <div style={{color:x.c,fontSize:"11px",fontFamily:"'Montserrat',sans-serif",marginTop:"4px"}}>{x.s.targetProgram.name} - {x.s.targetProgram.admRate}</div>}
              </div>
            ))}
          </div>

                            {x.pg.researchOpps && <div style={{marginTop:"8px",color:"#9898a8",fontSize:"11px",lineHeight:"1.5"}}><strong style={{color:"#d0d0d8"}}>Research: </strong>{x.pg.researchOpps}</div>}
                            {x.pg.alumniNote && <div style={{marginTop:"6px",color:"#9898a8",fontSize:"11px",lineHeight:"1.5"}}><strong style={{color:"#d0d0d8"}}>Alumni: </strong>{x.pg.alumniNote}</div>}
                            {x.pg.summary && <div style={{marginTop:"10px",padding:"8px 10px",background:x.c+"0a",borderRadius:"8px",color:"#d0d0d8",fontSize:"11px",lineHeight:"1.5"}}>{x.pg.summary}</div>}
                          </>)}
                        </div>
                      ))}
                    </div>
                    <div style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(241,81,119,0.28)",borderRadius:"10px",padding:"14px 16px"}}>
                      <div style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"6px"}}>{pgPathCompare?pgPathCompare.label.toUpperCase():"POST-GRAD"} PIPELINE VERDICT</div>
                      <div style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.6"}}>
                        {pgA.feederScore > pgB.feederScore
                          ? schoolA.name + " scores higher as a " + (pgPathCompare?pgPathCompare.label:"post-grad") + " feeder (" + pgA.feederScore + "/10 vs " + pgB.feederScore + "/10). " + (pgA.summary||"")
                          : pgB.feederScore > pgA.feederScore
                          ? schoolB.name + " scores higher as a " + (pgPathCompare?pgPathCompare.label:"post-grad") + " feeder (" + pgB.feederScore + "/10 vs " + pgA.feederScore + "/10). " + (pgB.summary||"")
                          : "Both schools are comparably rated feeders for " + (pgPathCompare?pgPathCompare.label:"post-grad programs") + "."}
                      </div>
                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          {tab==="outcome" && data.competitivenessOutcome && (
            <div>
              <h2 style={{color:"#f0f0f0",fontFamily:"'Great Vibes',cursive",fontSize:"28px",fontWeight:"400",margin:"0 0 4px"}}>Competitiveness vs Outcome</h2>
              <p style={{color:"#9898a8",fontSize:"13px",margin:"0 0 16px"}}>Is the harder school worth it for your profile?</p>
              <CBar label="Your Estimated Admit Probability" valA={data.competitivenessOutcome.schoolA.expectedAdmitProb} valB={data.competitivenessOutcome.schoolB.expectedAdmitProb} nameA={schoolAbbr(schoolA.name)} nameB={schoolAbbr(schoolB.name)} cA={cA} cB={cB} higher={true}/>
              <CBar label="Outcome Score (earnings + network + brand)" valA={data.competitivenessOutcome.schoolA.outcomeScore} valB={data.competitivenessOutcome.schoolB.outcomeScore} nameA={schoolAbbr(schoolA.name)} nameB={schoolAbbr(schoolB.name)} cA={cA} cB={cB} higher={true}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",margin:"16px 0"}}>
                {[{s:schoolA,d:data.competitivenessOutcome.schoolA,c:cA,lbl:schoolAbbr(schoolA.name)},{s:schoolB,d:data.competitivenessOutcome.schoolB,c:cB,lbl:"B"}].map(x=>(
                  <div key={x.lbl} style={{background:"rgba(255,255,255,0.03)",border:"1px solid "+x.c+"30",borderRadius:"12px",padding:"16px"}}>
                    <div style={{color:x.c,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"8px"}}>SCHOOL {x.lbl}</div>
                    <RRow label="Difficulty" value={x.d.admitDifficulty} vc={{VeryHigh:"#c0302a","Very High":"#c0302a",High:"#c9a84c",Moderate:"#e8c96a",Low:"#5aba6a"}[x.d.admitDifficulty]||"#705858"}/>
                    <RRow label="Program admit rate" value={x.d.programAdmitRate}/>
                    <RRow label="Your admit prob" value={x.d.expectedAdmitProb} vc={x.c}/>
                    <RRow label="Ranking in major" value={x.d.rankingInMajor}/>
                    <RRow label="Alumni network" value={x.d.alumniNetwork}/>
                    <RRow label="Brand premium" value={x.d.brandPremium} vc="#5aba6a"/>
                  </div>
                ))}
              </div>
              <DCard>
                <CLabel color="#c9a84c">TRADEOFF ANALYSIS<InfoTip text="A direct comparison of what you gain and lose choosing one school over the other — prestige vs cost, difficulty vs fit, network vs location."/></CLabel>
                <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.7",marginBottom:"14px"}}>{data.competitivenessOutcome.tradeoffAnalysis}</p>
                <div style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(241,81,119,0.28)",borderRadius:"8px",padding:"12px 14px"}}>
                  <div style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"4px"}}>RECOMMENDATION FOR YOU</div>
                  <div style={{color:"#f0f0f0",fontSize:"13px",lineHeight:"1.6"}}>{data.competitivenessOutcome.recommendationForStudent || (data.competitivenessOutcome.schoolA && data.competitivenessOutcome.schoolB ? "Based on competitiveness scores, "+((data.competitivenessOutcome.schoolA.outcomeScore||0)>=(data.competitivenessOutcome.schoolB.outcomeScore||0)?schoolAbbr(schoolA.name):schoolAbbr(schoolB.name))+" is the stronger fit for your profile. Consider "+((data.competitivenessOutcome.schoolA.admitDifficulty||"")==="Very High"||( data.competitivenessOutcome.schoolA.admitDifficulty||"")==="Extremely High"?schoolAbbr(schoolB.name)+" as a safer option.":"both schools as realistic targets.") : "Run comparison to see your recommendation.")}</div>
                </div>
              </DCard>
            </div>
          )}

          {data.overallVerdict && (
            <div style={{marginTop:"20px",background:"linear-gradient(135deg,rgba(201,168,76,0.09),rgba(201,168,76,0.04))",border:"1px solid rgba(201,168,76,0.32)",borderRadius:"14px",padding:"20px 22px"}}>
              <div style={{display:"flex",gap:"10px",alignItems:"center",marginBottom:"10px",flexWrap:"wrap"}}>
                <div style={{background:"rgba(192,48,42,0.35)",border:"1px solid rgba(201,168,76,0.38)",borderRadius:"8px",padding:"5px 12px"}}><span style={{color:"#c9a84c",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700"}}>OVERALL WINNER</span></div>
                <span style={{color:"#f0f0f0",fontFamily:"'Anton',sans-serif",fontSize:"22px",fontWeight:"400",letterSpacing:"0.03em"}}>{data.overallVerdict.winner}</span>
                <Tag c="#f15177">for {data.overallVerdict.winnerFor}</Tag>
              </div>
              <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.7",marginBottom:"10px"}}>{data.overallVerdict.summary}</p>
              <div style={{background:"rgba(255,159,67,0.10)",border:"1px solid rgba(255,159,67,0.22)",borderRadius:"8px",padding:"10px 12px"}}>
                <span style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>CAVEAT: </span>
                <span style={{color:"#9898a8",fontSize:"12px"}}>{data.overallVerdict.caveat}</span>
              </div>
            </div>
          )}
        </div>
      ) : (
        <div style={{textAlign:"center",padding:"80px 24px",color:"#9898a8",fontFamily:"'Montserrat',sans-serif"}}>Comparison failed. Please go back and try again.</div>
      )}
      <style dangerouslySetInnerHTML={{__html:"@keyframes nbspin{to{transform:rotate(360deg);}} @keyframes nbpulse{0%,100%{opacity:.5}50%{opacity:1}}"}}/>
    </div>
  );
}

// ========================================
// SCHOOL CARD
// ========================================
function SchoolCard({school, category, profile, onAnalyze, compareNames, onToggleCompare}) {
  const [open,setOpen]   = useState(false);
  const cfg              = CAT[category];
  const inCompare        = compareNames.includes(school.name);

  return (
    <div style={{background:cfg.bg,border:"1px solid "+(inCompare?"rgba(201,168,76,0.65)":cfg.border),borderRadius:"16px",padding:"18px 20px",marginBottom:"12px",transition:"border-color 0.2s",overflow:"hidden",minWidth:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}}>
        <div style={{flex:1,cursor:"pointer",minWidth:0,overflow:"hidden"}} onClick={()=>setOpen(!open)}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
            <span style={{color:cfg.color,fontSize:"16px",flexShrink:0}}>{cfg.icon}</span>
            <span style={{color:"#f0f0f0",fontFamily:"'DM Serif Display',serif",fontSize:"16px",fontWeight:"700",lineHeight:"1.2"}}>{school.name}</span>
          </div>
          {school.targetProgram && (
            <div style={{display:"flex",alignItems:"center",gap:"6px",marginLeft:"24px",marginBottom:"4px"}}>
              <span style={{color:"#c9a84c",fontSize:"12px",fontFamily:"'Montserrat',sans-serif",fontWeight:"600"}}>{school.targetProgram.name}</span>
              <span style={{color:"#9898a8",fontSize:"12px",fontFamily:"'Montserrat',sans-serif"}}>- {school.targetProgram.admRate} admit</span>
            </div>
          )}
          <div style={{display:"flex",gap:"12px",flexWrap:"wrap",marginLeft:"24px"}}>
            <span style={{color:"#705858",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>{school.location}</span>
            <span style={{color:"#705858",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>Overall: {school.acceptRate}</span>
            <span style={{color:"#705858",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>Intl: {school.intlFriendly}</span>
            {school.creditPolicy && (profile.programs&&(profile.programs.ib||profile.programs.ap)) && (
              <span style={{background:"rgba(139,26,26,0.12)",border:"1px solid rgba(167,139,250,0.28)",color:"#c9a84c",borderRadius:"5px",padding:"1px 7px",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700"}}>&#127891; CREDITS</span>
            )}
          </div>
        </div>
        <div style={{display:"flex",gap:"5px",alignItems:"center",flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
          <button onClick={()=>onToggleCompare(school,category)} style={{background:inCompare?"rgba(192,48,42,0.35)":"rgba(255,255,255,0.04)",border:"1px solid "+(inCompare?"rgba(201,168,76,0.55)":"rgba(139,26,26,0.12)"),color:inCompare?"#f15177":"#9898a8",borderRadius:"7px",padding:"5px 9px",fontSize:"10px",fontWeight:"700",cursor:"pointer",fontFamily:"'Montserrat',sans-serif",whiteSpace:"nowrap"}}>
            {inCompare ? "COMPARING" : "+ COMPARE"}
          </button>
          <button onClick={()=>onAnalyze(school,category)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(107,159,228,0.22)",color:"#705858",borderRadius:"7px",padding:"5px 9px",fontSize:"10px",fontWeight:"700",cursor:"pointer",fontFamily:"'Montserrat',sans-serif",whiteSpace:"nowrap"}}>
            ANALYZE
          </button>
          <a href={getLink(school.name)} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{background:cfg.color,color:"#080808",borderRadius:"7px",padding:"5px 12px",fontSize:"11px",fontWeight:"700",textDecoration:"none",fontFamily:"'Montserrat',sans-serif",whiteSpace:"nowrap"}}>
            APPLY
          </a>
          <span onClick={()=>setOpen(!open)} style={{color:"#d0d0d8",fontSize:"20px",cursor:"pointer",display:"inline-block",transition:"transform 0.2s",transform:open?"rotate(180deg)":"rotate(0)"}}>▾</span>
        </div>
      </div>

      {open && (
        <div style={{marginTop:"14px",marginLeft:"24px",borderTop:"1px solid "+cfg.border,paddingTop:"14px",overflow:"hidden",wordBreak:"break-word",overflowWrap:"break-word"}}>
          <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.6",marginBottom:"12px",fontStyle:"italic",overflowWrap:"break-word",wordBreak:"break-word"}}>{school.note}</p>
          {school.targetProgram && (
            <div style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(107,159,228,0.32)",borderRadius:"10px",padding:"12px 14px",marginBottom:"12px"}}>
              <div style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"6px"}}>YOUR TARGET PROGRAM</div>
              <div style={{display:"flex",gap:"16px",alignItems:"center",flexWrap:"wrap"}}>
                <div>
                  <div style={{color:"#f0f0f0",fontSize:"14px",fontWeight:"700"}}>{school.targetProgram.name}</div>
                  <div style={{color:"#9898a8",fontSize:"11px",marginTop:"2px"}}>{school.targetProgram.degree||""}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{color:"#c0302a",fontSize:"20px",fontWeight:"800"}}>{school.targetProgram.admRate}</div>
                  <div style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>PROGRAM ADMIT RATE</div>
                </div>
                {school.targetProgram.notes && <div style={{color:"#9898a8",fontSize:"12px",flex:1,lineHeight:"1.5",overflowWrap:"break-word",wordBreak:"break-word",minWidth:0}}>{school.targetProgram.notes}</div>}
              </div>
            </div>
          )}
          {school.programs && school.programs.length > 0 && (
            <div style={{marginBottom:"12px"}}>
              <p style={{color:cfg.color,fontSize:"11px",fontWeight:"700",letterSpacing:"0.1em",marginBottom:"8px",fontFamily:"'Montserrat',sans-serif"}}>OTHER RELATED PROGRAMS</p>
              {school.programs.map((p,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"8px 12px",marginBottom:"6px"}}>
                  <span style={{color:cfg.color,fontWeight:"700",fontSize:"12px",fontFamily:"'Montserrat',sans-serif",minWidth:"22px"}}>#{i+1}</span>
                  <span style={{color:"#d0d0d8",fontSize:"13px",fontWeight:"600"}}>{p.name}</span>
                  <span style={{color:"#9898a8",fontSize:"11px"}}>- {p.admRate}</span>
                </div>
              ))}
            </div>
          )}
          <div style={{padding:"10px 14px",background:"rgba(255,255,255,0.03)",borderRadius:"8px",marginBottom:"10px"}}>
            <span style={{color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>{school.tuition} | {school.conversion}</span>
          </div>
          {school.postGradProfile && profile.postGrad && (()=>{
            const pgP = (POST_GRAD_PATHS.find(p=>p.key===profile.pgPathKey)||detectPostGradPath(profile.intendedMajor)) || {};
            const pg  = school.postGradProfile;
            const score = parseInt(pg.feederScore)||0;
            const scoreCol = score>=8?"#5aba6a":score>=6?"#e8c96a":"#c9a84c";
            return (
              <div style={{background:"linear-gradient(135deg,rgba(241,81,119,0.07),rgba(107,159,228,0.06))",border:"1px solid rgba(201,168,76,0.3)",borderRadius:"12px",padding:"14px 16px",marginBottom:"10px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
                  <span style={{fontSize:"15px"}}>{pgP.icon||"Gd"}</span>
                  <span style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700",letterSpacing:"0.1em"}}>{(pg.postGradLabel||pgP.label||"POST-GRAD").toUpperCase()} FEEDER PROFILE</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px",marginBottom:"12px"}}>
                  <div style={{background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"10px",textAlign:"center",overflow:"hidden",minWidth:0}}>
                    <div style={{color:scoreCol,fontSize:"20px",fontWeight:"800",lineHeight:1,overflow:"hidden"}}>{pg.feederScore}<span style={{fontSize:"11px",color:"#9898a8"}}>/10</span></div>
                    <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginTop:"3px"}}>FEEDER SCORE</div>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"10px",textAlign:"center",overflow:"hidden",minWidth:0}}>
                    <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"700",lineHeight:1.2,overflowWrap:"break-word",wordBreak:"break-word"}}>{pg.postGradAcceptRate||"Not available"}</div>
                    <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginTop:"3px"}}>ADMIT RATE</div>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"10px",textAlign:"center",overflow:"hidden",minWidth:0}}>
                    <div style={{color:"#c9a84c",fontSize:"11px",fontWeight:"700",lineHeight:1.3,overflowWrap:"break-word",wordBreak:"break-word"}}>{pg.avgTestScore||"-"}</div>
                    <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginTop:"3px"}}>AVG {pgP.testLabel||"TEST"}</div>
                  </div>
                </div>
                {pg.researchOpps && <div style={{display:"flex",gap:"6px",marginBottom:"6px",alignItems:"flex-start",overflow:"hidden"}}><span style={{color:"#c9a84c",fontSize:"10px",flexShrink:0,marginTop:"2px"}}>&gt;</span><div style={{minWidth:0,overflow:"hidden"}}><span style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>RESEARCH: </span><span style={{color:"#d0d0d8",fontSize:"12px",overflowWrap:"break-word",wordBreak:"break-word"}}>{pg.researchOpps}</span></div></div>}
                {pg.internshipPipeline && <div style={{display:"flex",gap:"6px",marginBottom:"6px",alignItems:"flex-start",overflow:"hidden"}}><span style={{color:"#c9a84c",fontSize:"10px",flexShrink:0,marginTop:"2px"}}>&gt;</span><div style={{minWidth:0,overflow:"hidden"}}><span style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>PIPELINE: </span><span style={{color:"#d0d0d8",fontSize:"12px",overflowWrap:"break-word",wordBreak:"break-word"}}>{pg.internshipPipeline}</span></div></div>}
                {pg.alumniNote && <div style={{display:"flex",gap:"6px",marginBottom:"8px",alignItems:"flex-start"}}><span style={{color:"#c9a84c",fontSize:"10px",flexShrink:0,marginTop:"2px"}}>&gt;</span><div><span style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>ALUMNI: </span><span style={{color:"#d0d0d8",fontSize:"12px",overflowWrap:"break-word",wordBreak:"break-word"}}>{pg.alumniNote}</span></div></div>}
                {pg.summary && <div style={{background:"rgba(139,26,26,0.12)",borderRadius:"8px",padding:"8px 10px",color:"#e8c96a",fontSize:"12px",lineHeight:"1.5",overflowWrap:"break-word",wordBreak:"break-word"}}>{pg.summary}</div>}
              </div>
            );
          })()}
          {school.creditPolicy && (profile.programs && (profile.programs.ib || profile.programs.ap)) && (
            <div style={{background:"rgba(201,168,76,0.07)",border:"1px solid rgba(201,168,76,0.22)",borderRadius:"12px",padding:"14px 16px",marginBottom:"10px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
                <span style={{fontSize:"14px"}}>&#127891;</span>
                <span style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700",letterSpacing:"0.1em"}}>IB / AP CREDIT POLICY</span>
              </div>

              {profile.programs.ib && (
                <div style={{marginBottom:"10px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}}>
                    <span style={{background:"rgba(139,26,26,0.12)",border:"1px solid rgba(167,139,250,0.3)",color:"#c9a84c",borderRadius:"5px",padding:"2px 8px",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700"}}>IB</span>
                    <span style={{color:school.creditPolicy.offersIBCredit?"#5aba6a":"#c0302a",fontSize:"11px",fontWeight:"600"}}>{school.creditPolicy.offersIBCredit?"Credit Offered":"No IB Credit"}</span>
                    {school.creditPolicy.offersIBCredit && <span style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>via {school.creditPolicy.ibCreditSystem||"course exemption"}</span>}
                  </div>
                  {school.creditPolicy.offersIBCredit && school.creditPolicy.ibCreditDetails && (
                    <div style={{background:"rgba(139,26,26,0.10)",borderRadius:"8px",padding:"8px 10px"}}>
                      <div style={{color:"#c9a84c",fontSize:"12px",lineHeight:"1.5",overflowWrap:"break-word",wordBreak:"break-word"}}>{school.creditPolicy.ibCreditDetails}</div>
                    </div>
                  )}
                </div>
              )}

              {profile.programs.ap && (
                <div style={{marginBottom:"10px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}}>
                    <span style={{background:"rgba(201,168,76,0.07)",border:"1px solid rgba(96,165,250,0.3)",color:"#c9a84c",borderRadius:"5px",padding:"2px 8px",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700"}}>AP</span>
                    <span style={{color:school.creditPolicy.offersAPCredit?"#5aba6a":"#c0302a",fontSize:"11px",fontWeight:"600"}}>{school.creditPolicy.offersAPCredit?"Credit Offered":"No AP Credit"}</span>
                    {school.creditPolicy.offersAPCredit && <span style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>via {school.creditPolicy.apCreditSystem||"direct course credit"}</span>}
                  </div>
                  {school.creditPolicy.offersAPCredit && school.creditPolicy.apCreditDetails && (
                    <div style={{background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"8px 10px"}}>
                      <div style={{color:"#c9a84c",fontSize:"12px",lineHeight:"1.5"}}>{school.creditPolicy.apCreditDetails}</div>
                    </div>
                  )}
                </div>
              )}

              {(school.creditPolicy.maxCreditsFromTests || school.creditPolicy.semestersSaved) && (
                <div style={{display:"flex",gap:"10px",flexWrap:"wrap",marginTop:"8px"}}>
                  {school.creditPolicy.maxCreditsFromTests && (
                    <div style={{background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"8px 12px",flex:1,minWidth:"120px"}}>
                      <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginBottom:"3px"}}>MAX CREDITS</div>
                      <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"700"}}>{school.creditPolicy.maxCreditsFromTests}</div>
                    </div>
                  )}
                  {school.creditPolicy.semestersSaved && (
                    <div style={{background:"rgba(255,217,61,0.06)",border:"1px solid rgba(255,217,61,0.2)",borderRadius:"8px",padding:"8px 12px",flex:1,minWidth:"120px"}}>
                      <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginBottom:"3px"}}>POTENTIAL SAVING</div>
                      <div style={{color:"#e8c96a",fontSize:"13px",fontWeight:"700"}}>{school.creditPolicy.semestersSaved}</div>
                    </div>
                  )}
                </div>

export default function App() {
  const [province,setProvince]           = useState("");
  const [cumAvg,setCumAvg]               = useState("");
  const [actScore,setActScore]           = useState("");
  const [programs,setPrograms]           = useState({ib:false,ap:false});
  const [ibScore,setIbScore]             = useState("");
  const [apCourses,setApCourses]         = useState("");
  const [awards,setAwards]               = useState("");
  const [hsYear,setHsYear]               = useState("");
  const [satScore,setSatScore]           = useState("");
  const [intendedMajor,setIntendedMajor] = useState("");
  const [extras,setExtras]               = useState("");
  const [results,setResults]             = useState(null);
  const [loading,setLoading]             = useState(false);
  const [error,setError]                 = useState("");
  const [activeTab,setActiveTab]         = useState("reach");
  const [analysisTarget,setAnalysisTarget] = useState(null);
  const [compareList,setCompareList]     = useState([]);
  const [compareTarget,setCompareTarget] = useState(null);
  const [page,setPage]                   = useState("form"); // "form" | "results"
  const [postGrad,setPostGrad]           = useState(false);
  const [pgPathKey,setPgPathKey]         = useState(null);
  const pgPath = pgPathKey ? (POST_GRAD_PATHS.find(p=>p.key===pgPathKey)||null) : null;

  const profile = {province, cumAvg, actScore, satScore, programs, ibScore, apCourses, awards, hsYear, intendedMajor, extras, postGrad: pgPathKey !== null, pgPathKey};

  function resetToForm() {
    setPage("form");
    setResults(null);
    setCompareList([]);
    setCompareTarget(null);
    setAnalysisTarget(null);
  }

  function toggleCompare(school, category) {
    setCompareList(prev => {
      const exists = prev.some(s=>s.school.name===school.name);
      if (exists) return prev.filter(s=>s.school.name!==school.name);
      if (prev.length >= 2) return [...prev.slice(1), {school,category}];
      return [...prev, {school,category}];
    });
  }

  async function generate() {
    if (!province || !cumAvg || !intendedMajor || !hsYear) { setError("Please fill in province, cumulative average, school year, and intended major."); return; }
    setError(""); setLoading(true); setResults(null); setCompareList([]);
    const gs     = GRADE_SYSTEMS[province] || {};
    const hsInfo = HS_YEARS.find(y=>y.value===hsYear) || HS_YEARS[3];
    const isSr   = hsYear==="grade12";
    const hasIB  = programs.ib;
    const hasAP  = programs.ap;
    const pgPath = pgPathKey ? (POST_GRAD_PATHS.find(p=>p.key===pgPathKey)||null) : null;

    // Tier prompts are built inside fetchTier() below - no single combined prompt needed

    // Helper: build per-tier prompt
    async function fetchTier(tier) {
      const tierDef = tier==="reach"
        ? "REACH schools: highly selective, <15% admit chance for this student (think MIT, Harvard, Stanford level)"
        : tier==="target"
        ? "TARGET schools: well-matched, 25-55% admit chance for this student"
        : "SAFETY schools: strong likelihood >70%, student is above average for these schools";

      const extras_pg = pgPath ? " Post-grad goal: " + pgPath.label + "." : "";
      const extras_ib = hasIB ? " IB predicted " + (ibScore||"?") + "/45." : "";
      const extras_ap = hasAP ? " AP courses: " + (apCourses||"various") + "." : "";
      const extras_tests = (satScore||actScore) ? " SAT=" + (satScore||"N/A") + " ACT=" + (actScore||"N/A") + "." : "";

      const prompt =
        "You are a US university admissions expert for Canadian students. " +
        "Student profile: " + province + " student, cumulative average " + cumAvg +
        " (" + (gs.scale||"percentage") + "), major: " + intendedMajor + "." +
        extras_tests + extras_ib + extras_ap +
        " ECs: " + (extras||"none") + ". Awards: " + (awards||"none") + "." +
        (isSr ? " Applying this cycle." : " " + hsInfo.yearsOut + " years before applying.") +
        extras_pg + "\n\n" +
        "Recommend 4 " + tierDef + ".\n\n" +

              <select value={province} onChange={e=>setProvince(e.target.value)} style={Object.assign({},inp,{cursor:"pointer",appearance:"none"})}>
                <option value="" disabled>Select province</option>
                {PROVINCES.map(p=><option key={p} value={p} style={{background:"#0c0c0c"}}>{p}</option>)}
              </select>
            </div>
            <div>
              <label style={{display:"block",color:"#9898a8",fontSize:"11px",letterSpacing:"0.12em",fontFamily:"'Montserrat',sans-serif",marginBottom:"7px"}}>
                CUMULATIVE AVERAGE *{province ? " ("+((GRADE_SYSTEMS[province]||{}).scale||"")+")" : ""}
              </label>
              <input value={cumAvg} onChange={e=>setCumAvg(e.target.value)} placeholder={province ? ((GRADE_SYSTEMS[province]||{}).example||"Enter average") : "Select province first"} style={inp}/>
              {province && <div style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginTop:"4px"}}>Enter your overall cumulative average across all courses</div>}
            </div>
          </div>
          <div style={{marginBottom:"18px"}}>
            <label style={{display:"block",color:"#9898a8",fontSize:"11px",letterSpacing:"0.12em",fontFamily:"'Montserrat',sans-serif",marginBottom:"10px"}}>HIGH SCHOOL YEAR *</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"8px"}}>
              {HS_YEARS.map(y=>{
                const sel = hsYear===y.value;
                const col = y.value==="grade12"?"#c9a84c":y.value==="grade11"?"#e8c96a":"#5aba6a";
                return (
                  <button key={y.value} onClick={()=>setHsYear(y.value)} style={{padding:"12px 8px",borderRadius:"12px",cursor:"pointer",border:"1px solid "+(sel?col+"90":"rgba(201,168,76,0.07)"),background:sel?col+"14":"rgba(255,255,255,0.03)",color:sel?col:"#9898a8",fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"700",textAlign:"center",transition:"all 0.18s",lineHeight:"1.4"}}>
                    {y.label}
                    <span style={{display:"block",fontSize:"9px",fontWeight:"400",marginTop:"3px",opacity:sel?0.9:0.5}}>{y.tag}</span>
                  </button>
                );
              })}
            </div>
            {hsInfo && hsYear==="grade12" && (
              <div style={{marginTop:"8px",background:"rgba(255,159,67,0.10)",border:"1px solid rgba(255,159,67,0.22)",borderRadius:"8px",padding:"8px 12px",display:"flex",gap:"8px",alignItems:"center"}}>
                <span style={{color:"#c9a84c",fontSize:"11px",flexShrink:0}}>&#9888;</span>
                <span style={{color:"#c9a84c",fontSize:"11px"}}>Grade 12 detected - timeline and SAT advice will be adjusted for immediate application this cycle.</span>
              </div>
            )}
            {hsInfo && hsYear!=="grade12" && (
              <div style={{marginTop:"8px",background:"rgba(107,203,119,0.06)",border:"1px solid rgba(107,203,119,0.18)",borderRadius:"8px",padding:"8px 12px",display:"flex",gap:"8px",alignItems:"center"}}>
                <span style={{color:"#5aba6a",fontSize:"11px",flexShrink:0}}>&#10024;</span>
                <span style={{color:"#5aba6a",fontSize:"11px"}}>{hsInfo.label} - {hsInfo.yearsOut} year{hsInfo.yearsOut>1?"s":""} to build your profile. Long-term strategies enabled.</span>
              </div>
            )}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"18px",marginBottom:"18px"}}>
            <div>
              <label style={{display:"block",color:"#9898a8",fontSize:"11px",letterSpacing:"0.12em",fontFamily:"'Montserrat',sans-serif",marginBottom:"7px"}}>SAT SCORE (optional)</label>
              <input value={satScore} onChange={e=>setSatScore(e.target.value)} placeholder="e.g. 1480  (400-1600)" style={inp}/>
            </div>
            <div>
              <label style={{display:"block",color:"#9898a8",fontSize:"11px",letterSpacing:"0.12em",fontFamily:"'Montserrat',sans-serif",marginBottom:"7px"}}>ACT SCORE (optional)</label>
              <input value={actScore} onChange={e=>setActScore(e.target.value)} placeholder="e.g. 33  (1-36)" style={inp}/>
            </div>
          </div>
          <div style={{marginBottom:"18px"}}>
            <label style={{display:"block",color:"#9898a8",fontSize:"11px",letterSpacing:"0.12em",fontFamily:"'Montserrat',sans-serif",marginBottom:"7px"}}>INTENDED MAJOR *</label>
            <MajorSelect value={intendedMajor} onChange={v=>{setIntendedMajor(v);setPgPathKey(null);}}/>
          </div>
          {intendedMajor.trim() && (()=>{
            const suggestions = getGradSuggestions(intendedMajor);
            const selectedPg = POST_GRAD_PATHS.find(p => p.key === (pgPathKey||"")) || null;
            return (
              <div style={{marginBottom:"18px"}}>
                <label style={{display:"block",color:"#9898a8",fontSize:"11px",letterSpacing:"0.12em",fontFamily:"'Montserrat',sans-serif",marginBottom:"10px"}}>POST-GRADUATE PLANS</label>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
                  <button onClick={()=>setPgPathKey(null)} style={{padding:"12px 14px",borderRadius:"12px",cursor:"pointer",textAlign:"left",border:"1px solid "+(pgPathKey===null?"rgba(255,255,255,0.4)":"rgba(201,168,76,0.07)"),background:pgPathKey===null?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.03)",color:pgPathKey===null?"#f0f0f0":"#9898a8",transition:"all 0.15s"}}>
                    <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"700",marginBottom:"2px"}}>Bachelor's Only</div>
                    <div style={{fontSize:"10px",opacity:0.65}}>Career outcomes after undergrad</div>
                  </button>
                  {suggestions.slice(0,3).map(pg=>(
                    <button key={pg.key} onClick={()=>setPgPathKey(pg.key)} style={{padding:"12px 14px",borderRadius:"12px",cursor:"pointer",textAlign:"left",border:"1px solid "+(pgPathKey===pg.key?pg.color:"rgba(201,168,76,0.07)"),background:pgPathKey===pg.key?pg.color+"12":"rgba(255,255,255,0.03)",color:pgPathKey===pg.key?pg.color:"#9898a8",transition:"all 0.15s"}}>
                      <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"700",marginBottom:"2px"}}>{pg.label}</div>
                      <div style={{fontSize:"10px",opacity:0.75}}>{pg.abbr} &middot; {pg.testLabel}</div>
                    </button>
                  ))}
                </div>
                {selectedPg && (
                  <div style={{display:"flex",gap:"10px",alignItems:"flex-start",padding:"10px 14px",borderRadius:"8px",background:selectedPg.color+"0e",border:"1px solid "+selectedPg.color+"35"}}>
                    <div>
                      <div style={{color:selectedPg.color,fontSize:"11px",fontWeight:"700",fontFamily:"'Montserrat',sans-serif",marginBottom:"2px"}}>{selectedPg.label} &mdash; {selectedPg.abbr}</div>
                      <div style={{color:selectedPg.color+"bb",fontSize:"11px",lineHeight:"1.5"}}>Each school card will show how well it feeds into <strong>{selectedPg.label}</strong> programs.</div>
                    </div>
                  </div>
                )}
              </div>
            );
          })()}
          <div style={{marginBottom:"18px"}}>
            <label style={{display:"block",color:"#9898a8",fontSize:"11px",letterSpacing:"0.12em",fontFamily:"'Montserrat',sans-serif",marginBottom:"10px"}}>ACADEMIC PROGRAMS (optional)</label>
            <div style={{display:"flex",gap:"10px",marginBottom:"10px"}}>
              {[{key:"ib",label:"IB Programme",sub:"International Baccalaureate",col:"#c9a84c"},{key:"ap",label:"AP Courses",sub:"Advanced Placement",col:"#c9a84c"}].map(pg=>(
                <button key={pg.key} onClick={()=>setPrograms(p=>Object.assign({},p,{[pg.key]:!p[pg.key]}))} style={{flex:1,padding:"12px 14px",borderRadius:"12px",cursor:"pointer",border:"1px solid "+(programs[pg.key]?pg.col+"80":"rgba(201,168,76,0.07)"),background:programs[pg.key]?pg.col+"14":"rgba(255,255,255,0.03)",color:programs[pg.key]?pg.col:"#9898a8",textAlign:"left",transition:"all 0.18s"}}>
                  <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"700"}}>{pg.label}</div>
                  <div style={{fontSize:"10px",opacity:0.7,marginTop:"2px"}}>{pg.sub}</div>
                </button>
              ))}
            </div>
            {programs.ib && (
              <div style={{background:"rgba(167,139,250,0.07)",border:"1px solid rgba(167,139,250,0.25)",borderRadius:"10px",padding:"14px 16px",marginBottom:"10px"}}>
                <label style={{display:"block",color:"#c9a84c",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"8px"}}>IB PREDICTED SCORE (optional)</label>
                <input value={ibScore} onChange={e=>setIbScore(e.target.value)} placeholder="e.g. 38  (scored out of 45)" style={Object.assign({},inp,{border:"1px solid rgba(167,139,250,0.3)"})}/>
                <div style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginTop:"5px"}}>Your predicted total out of 45 points</div>
              </div>
            )}
            {programs.ap && (
              <div style={{background:"rgba(96,165,250,0.07)",border:"1px solid rgba(96,165,250,0.25)",borderRadius:"10px",padding:"14px 16px",marginBottom:"10px"}}>
                <label style={{display:"block",color:"#c9a84c",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"8px"}}>AP COURSES & SCORES (optional)</label>
                <textarea value={apCourses} onChange={e=>setApCourses(e.target.value)} placeholder="e.g. AP Calculus BC (5), AP Physics C (5), AP Computer Science A (4), AP English Language (4)..." rows={2} style={Object.assign({},inp,{resize:"vertical",border:"1px solid rgba(96,165,250,0.3)"})}/>
                <div style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginTop:"5px"}}>List courses and scores (1-5) if you have them</div>
              </div>
            )}
          </div>
          <div style={{marginBottom:"14px"}}>
            <label style={{display:"block",color:"#9898a8",fontSize:"11px",letterSpacing:"0.12em",fontFamily:"'Montserrat',sans-serif",marginBottom:"7px"}}>EXTRACURRICULARS (optional)</label>
            <textarea value={extras} onChange={e=>setExtras(e.target.value)} placeholder="e.g. Captain of debate team, varsity soccer, robotics club president, research internship at U of T..." rows={3} style={Object.assign({},inp,{resize:"vertical"})}/>
          </div>
          <div style={{marginBottom:"22px"}}>
            <label style={{display:"block",color:"#9898a8",fontSize:"11px",letterSpacing:"0.12em",fontFamily:"'Montserrat',sans-serif",marginBottom:"7px"}}>AWARDS & ACCOMPLISHMENTS (optional)</label>
            <textarea value={awards} onChange={e=>setAwards(e.target.value)} placeholder="e.g. 1st place Canadian Math Kangaroo (national), Schulich Leader nominee, DECA provincials finalist, Governor General Award..." rows={3} style={Object.assign({},inp,{resize:"vertical",borderColor:"rgba(201,168,76,0.3)"})}/>
            <div style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginTop:"5px"}}>List your biggest wins - competitions, scholarships, recognitions, publications</div>
          </div>

          {error && <div style={{color:"#c0302a",fontSize:"13px",marginBottom:"14px",padding:"10px 14px",background:"rgba(139,26,26,0.12)",borderRadius:"8px"}}>{error}</div>}
          <button onClick={generate} disabled={loading} style={{width:"100%",background:loading?"rgba(201,168,76,0.3)":"linear-gradient(135deg,#6b9fe4,#2a2a44)",color:"#080808",border:"none",borderRadius:"12px",padding:"14px",fontSize:"14px",fontWeight:"700",letterSpacing:"0.1em",cursor:loading?"not-allowed":"pointer",fontFamily:"'Montserrat',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}>
            {loading ? (
              <><span style={{display:"inline-block",animation:"nbspin 1s linear infinite"}}>o</span> FINDING YOUR SCHOOLS...</>
            ) : "GENERATE MY UNIVERSITY LIST"}
          </button>
        </div>

      </div>
      <style dangerouslySetInnerHTML={{__html:"@keyframes nbspin { to { transform: rotate(360deg); } } * { box-sizing: border-box; overflow-wrap: break-word; word-break: break-word; } p { margin: 0 0 8px; max-width: 100%; } select, input, textarea { color: #f0f0f0 !important; background: #0a0a0a; } select option { background: #141414; color: #f0f0f0; } input::placeholder, textarea::placeholder { color: #444444 !important; } input:focus, textarea:focus, select:focus { border-color: rgba(192,48,42,0.80) !important; outline: none; } ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #080808; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; } @keyframes diamond-pulse { 0%,100%{filter:drop-shadow(0 0 4px rgba(168,200,248,0.3))} 50%{filter:drop-shadow(0 0 12px rgba(255,255,255,0.6))} } .diamond-logo { animation: diamond-pulse 3s ease-in-out infinite; }"}}/>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
