      )}

      {/* Floating buttons — demo pill + music player */}
      <div style={{position:"fixed",bottom:"28px",right:"28px",zIndex:9000,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"10px"}}>
        {/* Demo pill */}
        <button onClick={()=>setDemoOpen(true)} style={{background:"linear-gradient(135deg,#0d0d0d,#111)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"100px",padding:"8px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:"8px",boxShadow:"0 4px 20px rgba(0,0,0,0.5)",transition:"border-color 0.2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(201,168,76,0.5)"} onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.12)"}>
          <div style={{width:"20px",height:"20px",borderRadius:"50%",background:"linear-gradient(135deg,#c0302a,#c9a84c)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{color:"#fff",fontSize:"9px",marginLeft:"1px"}}>▶</span></div>
          <span style={{color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.05em",whiteSpace:"nowrap"}}>Watch demo</span>
        </button>

        {/* Music player */}
        <div style={{animation:"musicFloat 4.5s ease-in-out infinite",transformOrigin:"bottom center"}}>
          {musicOpen ? (
            <div style={{background:"#0a0a0a",border:"1px solid rgba(201,168,76,0.35)",borderRadius:"18px",overflow:"hidden",boxShadow:"0 16px 60px rgba(0,0,0,0.75)",width:"300px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 15px 10px",background:"linear-gradient(135deg,rgba(201,168,76,0.08),rgba(192,48,42,0.06))"}}>
                <div style={{display:"flex",alignItems:"center",gap:"9px"}}>
                  <div style={{width:"28px",height:"28px",borderRadius:"8px",background:"linear-gradient(135deg,#c9a84c,#e8c96a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",flexShrink:0}}>🎵</div>
                  <div>
                    <div style={{color:"#c9a84c",fontSize:"10px",fontWeight:"700",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.12em"}}>FYPU PLAYLIST</div>
                    <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",fontStyle:"italic"}}>for the big decisions</div>
                  </div>
                </div>
                <button onClick={()=>setMusicOpen(false)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"#9898a8",width:"22px",height:"22px",borderRadius:"50%",cursor:"pointer",fontSize:"11px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>x</button>
              </div>
              <iframe src="https://open.spotify.com/embed/playlist/3cLzuKClIdVVUl44kNARF5?utm_source=generator&theme=0" width="300" height="460" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" style={{display:"block"}}/>
            </div>
          ) : (
            <button onClick={()=>setMusicOpen(true)} style={{background:"linear-gradient(135deg,#0d0d0d,#111)",border:"1px solid rgba(201,168,76,0.40)",borderRadius:"14px",padding:"11px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px",boxShadow:"0 8px 32px rgba(0,0,0,0.6)",transition:"border-color 0.25s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(201,168,76,0.8)"} onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(201,168,76,0.40)"}>
              <div style={{width:"34px",height:"34px",borderRadius:"10px",background:"linear-gradient(135deg,#c9a84c,#e8c96a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",flexShrink:0}}>🎵</div>
              <div style={{textAlign:"left"}}>
                <div style={{color:"#c9a84c",fontSize:"11px",fontWeight:"700",whiteSpace:"nowrap"}}>FYPU Playlist</div>
                <div style={{color:"#9898a8",fontSize:"10px",whiteSpace:"nowrap",fontStyle:"italic"}}>for the big decisions ✨</div>
              </div>
            </button>
          )}
        </div>
      </div>
    </>
  );

  // ── LANDING PAGE ───────────────────────────────────────────────────────────
  if (page==="landing" || page==="form") {
    // if page===form, skip landing and show stepped form directly
    if (page==="landing") return (
      <div style={{minHeight:"100vh",background:"#080808",backgroundImage:"radial-gradient(ellipse at 8% 5%,rgba(139,26,26,0.08) 0%,transparent 40%),radial-gradient(ellipse at 92% 95%,rgba(201,168,76,0.04) 0%,transparent 60%)",fontFamily:"sans-serif",color:"#d0d0d8"}}>
        {sharedChrome}
        <div style={{maxWidth:"600px",margin:"0 auto",padding:"0 20px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"calc(100vh - 56px)",textAlign:"center",paddingBottom:"120px"}}>
          <div style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.22em",marginBottom:"24px"}}>AI-POWERED UNIVERSITY ADVISOR</div>
          <h1 style={{fontFamily:"'Bodoni Moda',serif",fontSize:"clamp(36px,5.5vw,64px)",fontWeight:"900",lineHeight:"1.08",letterSpacing:"-0.01em",color:"#f0f0f0",marginBottom:"8px"}}>Find Your Perfect</h1>
          <div style={{fontFamily:"'Great Vibes',cursive",fontSize:"clamp(48px,8vw,88px)",fontWeight:"400",background:"linear-gradient(135deg,#c0302a 0%,#c9a84c 30%,#f0e090 50%,#c9a84c 70%,#c0302a 100%)",backgroundSize:"200% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:"1.1",marginBottom:"32px",animation:"heroShimmer 4s linear infinite"}}>University</div>
          <p style={{color:"#9898a8",fontSize:"14px",maxWidth:"400px",lineHeight:"1.8",marginBottom:"52px"}}>Your personalized list — reach, target, and safety schools — in under 60 seconds.</p>

          <div style={{display:"flex",flexDirection:"column",gap:"14px",width:"100%",maxWidth:"380px"}}>
            <button onClick={()=>{ const isLocal = window.location.hostname==="localhost" || window.location.protocol==="file:"; window.location.href = isLocal ? "./dreamlist.html" : "/dreamlist"; }} style={{width:"100%",padding:"18px 24px",borderRadius:"16px",cursor:"pointer",border:"1px solid rgba(201,168,76,0.45)",background:"rgba(201,168,76,0.07)",color:"#c9a84c",fontFamily:"'Montserrat',sans-serif",fontSize:"13px",fontWeight:"700",letterSpacing:"0.08em",textAlign:"center",transition:"all 0.2s",lineHeight:"1.4"}} onMouseEnter={e=>{e.currentTarget.style.background="rgba(201,168,76,0.13)";e.currentTarget.style.borderColor="rgba(201,168,76,0.75)";}} onMouseLeave={e=>{e.currentTarget.style.background="rgba(201,168,76,0.07)";e.currentTarget.style.borderColor="rgba(201,168,76,0.45)";}}>
              <div style={{fontSize:"22px",marginBottom:"6px"}}>🎯</div>
              I already have schools in mind
              <div style={{color:"#705858",fontSize:"10px",fontWeight:"400",marginTop:"4px",letterSpacing:"0.04em"}}>Analyze and compare your dream list</div>
            </button>

            <button onClick={()=>setPage("form")} style={{width:"100%",padding:"18px 24px",borderRadius:"16px",cursor:"pointer",border:"1px solid rgba(192,48,42,0.5)",background:"rgba(139,26,26,0.12)",color:"#f0f0f0",fontFamily:"'Montserrat',sans-serif",fontSize:"13px",fontWeight:"700",letterSpacing:"0.08em",textAlign:"center",transition:"all 0.2s",lineHeight:"1.4"}} onMouseEnter={e=>{e.currentTarget.style.background="rgba(139,26,26,0.22)";e.currentTarget.style.borderColor="rgba(192,48,42,0.8)";}} onMouseLeave={e=>{e.currentTarget.style.background="rgba(139,26,26,0.12)";e.currentTarget.style.borderColor="rgba(192,48,42,0.5)";}}>
              <div style={{fontSize:"22px",marginBottom:"6px"}}>✨</div>
              I don't have schools in mind yet
              <div style={{color:"#705858",fontSize:"10px",fontWeight:"400",marginTop:"4px",letterSpacing:"0.04em"}}>Build your personalized list from scratch</div>
            </button>
          </div>
        </div>
        <style dangerouslySetInnerHTML={{__html:globalStyles}}/>
        <Footer/>
      </div>
    );
  }

  // ── STEPPED FORM ───────────────────────────────────────────────────────────
  // Steps: 0=origin+location, 1=major+hsYear, 2=grades+tests, 3=ecs+awards

  const STEPS = [
    { label:"Where are you from?", hint:"Step 1 of 4" },
    { label:"What do you want to study?", hint:"Step 2 of 4" },
    { label:"Your academic scores", hint:"Step 3 of 4" },
    { label:"Your activities & awards", hint:"Step 4 of 4" },
  ];

  function canAdvance() {
    if (formStep===0) return !!(studentOrigin && province);
    if (formStep===1) return !!(intendedMajor && hsYear);
    if (formStep===2) return !!cumAvg;
    return true;
  }

  function handleNext() {
    if (formStep < 3) { setFormStep(s=>s+1); }
    else { generate(); }
  }

  return (
    <div style={{minHeight:"100vh",background:"#080808",backgroundImage:"radial-gradient(ellipse at 8% 5%,rgba(139,26,26,0.08) 0%,transparent 40%),radial-gradient(ellipse at 92% 95%,rgba(201,168,76,0.04) 0%,transparent 60%)",fontFamily:"sans-serif",color:"#d0d0d8"}}>
      {sharedChrome}

      <div style={{maxWidth:"520px",margin:"0 auto",padding:"40px 20px 160px",position:"relative",zIndex:1}}>

        {/* Progress bar */}
        <div style={{marginBottom:"36px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
            <span style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.14em"}}>{STEPS[formStep].hint}</span>
            <button onClick={()=>setPage("landing")} style={{background:"none",border:"none",color:"#705858",cursor:"pointer",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>← Back</button>
          </div>
          <div style={{height:"2px",background:"rgba(255,255,255,0.06)",borderRadius:"2px",overflow:"hidden"}}>
            <div style={{height:"100%",width:((formStep+1)/4*100)+"%",background:"linear-gradient(90deg,#c0302a,#c9a84c)",borderRadius:"2px",transition:"width 0.4s cubic-bezier(0.22,1,0.36,1)"}}/>
          </div>
        </div>

        {/* Step heading */}
        <div style={{marginBottom:"32px",animation:"fypuFadeUp 0.35s cubic-bezier(0.22,1,0.36,1) both"}}>
          <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:"28px",fontWeight:"700",color:"#f0f0f0",marginBottom:"6px",lineHeight:"1.2"}}>{STEPS[formStep].label}</h2>
        </div>

        {/* STEP 0 — origin + location */}
        {formStep===0 && (
          <div style={{animation:"fypuFadeUp 0.35s cubic-bezier(0.22,1,0.36,1) both"}}>
            <div style={{marginBottom:"24px"}}>
              <label style={{display:"block",color:"#9898a8",fontSize:"10px",letterSpacing:"0.14em",fontFamily:"'Montserrat',sans-serif",marginBottom:"10px"}}>WHERE ARE YOU FROM?</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
                {[{key:"canada",label:"🇨🇦",sub:"Canada"},{key:"us",label:"🇺🇸",sub:"United States"},{key:"other",label:"🌎",sub:"Other Country"}].map(o=>{
                  const sel = studentOrigin===o.key;
                  return (
                    <button key={o.key} onClick={()=>{setStudentOrigin(o.key);setProvince("");}} style={{padding:"16px 8px",borderRadius:"14px",cursor:"pointer",border:"1px solid "+(sel?"rgba(201,168,76,0.65)":"rgba(255,255,255,0.07)"),background:sel?"rgba(201,168,76,0.12)":"rgba(255,255,255,0.03)",color:sel?"#c9a84c":"#9898a8",fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"700",textAlign:"center",transition:"all 0.18s",lineHeight:"1.5"}}>
                      <div style={{fontSize:"26px",marginBottom:"6px"}}>{o.label}</div>
                      {o.sub}
                    </button>
                  );
                })}
              </div>
            </div>
            {studentOrigin && (
              <div style={{animation:"fypuFadeUp 0.3s cubic-bezier(0.22,1,0.36,1) both"}}>
                <label style={{display:"block",color:"#9898a8",fontSize:"10px",letterSpacing:"0.14em",fontFamily:"'Montserrat',sans-serif",marginBottom:"10px"}}>{studentOrigin==="us"?"YOUR STATE":studentOrigin==="canada"?"YOUR PROVINCE":"YOUR COUNTRY / REGION"}</label>
                <select value={province} onChange={e=>setProvince(e.target.value)} style={Object.assign({},inp,{cursor:"pointer",appearance:"none"})}>
                  <option value="" disabled>{studentOrigin==="us"?"Select your state":studentOrigin==="canada"?"Select your province":"Select your country"}</option>
                  {studentOrigin==="canada" && PROVINCES.map(p=><option key={p} value={p}>{p}</option>)}
                  {studentOrigin==="us" && US_STATES.map(s=><option key={s} value={s}>{s}</option>)}
                  {studentOrigin==="other" && OTHER_COUNTRIES.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            )}
          </div>
        )}

        {/* STEP 1 — major + hs year */}
        {formStep===1 && (
          <div style={{animation:"fypuFadeUp 0.35s cubic-bezier(0.22,1,0.36,1) both"}}>
            <div style={{marginBottom:"28px"}}>
              <label style={{display:"block",color:"#9898a8",fontSize:"10px",letterSpacing:"0.14em",fontFamily:"'Montserrat',sans-serif",marginBottom:"10px"}}>INTENDED MAJOR</label>
              <MajorSelect value={intendedMajor} onChange={v=>{setIntendedMajor(v);setPgPathKey(null);}}/>
            </div>
            {intendedMajor && (()=>{
              const suggestions = getGradSuggestions(intendedMajor);
              return (
                <div style={{marginBottom:"28px",animation:"fypuFadeUp 0.3s cubic-bezier(0.22,1,0.36,1) both"}}>
                  <label style={{display:"block",color:"#9898a8",fontSize:"10px",letterSpacing:"0.14em",fontFamily:"'Montserrat',sans-serif",marginBottom:"10px"}}>POST-GRAD PLANS <span style={{color:"#705858",fontWeight:"400"}}>(optional)</span></label>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                    <button onClick={()=>setPgPathKey(null)} style={{padding:"12px",borderRadius:"12px",cursor:"pointer",textAlign:"left",border:"1px solid "+(pgPathKey===null?"rgba(255,255,255,0.35)":"rgba(255,255,255,0.07)"),background:pgPathKey===null?"rgba(255,255,255,0.05)":"rgba(255,255,255,0.02)",color:pgPathKey===null?"#f0f0f0":"#9898a8",transition:"all 0.15s"}}>
                      <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"700",marginBottom:"2px"}}>Bachelor's Only</div>
                      <div style={{fontSize:"10px",opacity:0.6}}>Career after undergrad</div>
                    </button>
                    {suggestions.slice(0,3).map(pg=>(
                      <button key={pg.key} onClick={()=>setPgPathKey(pg.key)} style={{padding:"12px",borderRadius:"12px",cursor:"pointer",textAlign:"left",border:"1px solid "+(pgPathKey===pg.key?pg.color:"rgba(255,255,255,0.07)"),background:pgPathKey===pg.key?pg.color+"12":"rgba(255,255,255,0.02)",color:pgPathKey===pg.key?pg.color:"#9898a8",transition:"all 0.15s"}}>
                        <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"700",marginBottom:"2px"}}>{pg.label}</div>
                        <div style={{fontSize:"10px",opacity:0.7}}>{pg.abbr}</div>
                      </button>
                    ))}
                  </div>
                </div>
              );
            })()}
            <div>
              <label style={{display:"block",color:"#9898a8",fontSize:"10px",letterSpacing:"0.14em",fontFamily:"'Montserrat',sans-serif",marginBottom:"10px"}}>CURRENT YEAR OF HIGH SCHOOL</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                {HS_YEARS.map(y=>{
                  const sel = hsYear===y.value;
                  const col = y.value==="grade12"?"#c9a84c":y.value==="grade11"?"#e8c96a":"#5aba6a";
                  return (
                    <button key={y.value} onClick={()=>setHsYear(y.value)} style={{padding:"14px 16px",borderRadius:"14px",cursor:"pointer",border:"1px solid "+(sel?col+"90":"rgba(255,255,255,0.07)"),background:sel?col+"14":"rgba(255,255,255,0.03)",color:sel?col:"#9898a8",fontFamily:"'Montserrat',sans-serif",fontSize:"12px",fontWeight:"700",textAlign:"left",transition:"all 0.18s",lineHeight:"1.4"}}>
                      {y.label}
                      <span style={{display:"block",fontSize:"10px",fontWeight:"400",marginTop:"2px",opacity:0.65}}>{y.tag}</span>
                    </button>
                  );
                })}
              </div>
              {hsYear==="grade12" && (
                <div style={{marginTop:"10px",background:"rgba(255,159,67,0.08)",border:"1px solid rgba(255,159,67,0.22)",borderRadius:"8px",padding:"8px 12px",display:"flex",gap:"8px",alignItems:"center"}}>
                  <span style={{color:"#c9a84c",fontSize:"11px",flexShrink:0}}>⚠</span>
                  <span style={{color:"#c9a84c",fontSize:"11px"}}>Applying this cycle — timeline advice adjusted.</span>
                </div>
              )}
            </div>
          </div>
        )}

        {/* STEP 2 — grades + tests */}
        {formStep===2 && (
          <div style={{animation:"fypuFadeUp 0.35s cubic-bezier(0.22,1,0.36,1) both"}}>
            <div style={{marginBottom:"24px"}}>
              <label style={{display:"block",color:"#9898a8",fontSize:"10px",letterSpacing:"0.14em",fontFamily:"'Montserrat',sans-serif",marginBottom:"6px"}}>
                {studentOrigin==="us"?"GPA":"CUMULATIVE AVERAGE"}
                {province && <span style={{color:"#705858",fontWeight:"400"}}> — {(GRADE_SYSTEMS[province]||{}).scale||""}</span>}
              </label>
              <input value={cumAvg} onChange={e=>setCumAvg(e.target.value)} placeholder={province?((GRADE_SYSTEMS[province]||{}).example||"Enter your average"):"Enter your average"} style={inp} autoFocus/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"24px"}}>
              <div>
                <label style={{display:"block",color:"#9898a8",fontSize:"10px",letterSpacing:"0.14em",fontFamily:"'Montserrat',sans-serif",marginBottom:"6px"}}>SAT <span style={{color:"#705858",fontWeight:"400"}}>(optional)</span></label>
                <input value={satScore} onChange={e=>setSatScore(e.target.value)} placeholder="e.g. 1480" style={inp}/>
              </div>
              <div>
                <label style={{display:"block",color:"#9898a8",fontSize:"10px",letterSpacing:"0.14em",fontFamily:"'Montserrat',sans-serif",marginBottom:"6px"}}>ACT <span style={{color:"#705858",fontWeight:"400"}}>(optional)</span></label>
                <input value={actScore} onChange={e=>setActScore(e.target.value)} placeholder="e.g. 33" style={inp}/>
              </div>
            </div>
            <div style={{marginBottom:"10px"}}>
              <label style={{display:"block",color:"#9898a8",fontSize:"10px",letterSpacing:"0.14em",fontFamily:"'Montserrat',sans-serif",marginBottom:"10px"}}>ACADEMIC PROGRAMS <span style={{color:"#705858",fontWeight:"400"}}>(optional)</span></label>
              <div style={{display:"flex",gap:"10px",marginBottom:"10px"}}>
                {[{key:"ib",label:"IB Programme",sub:"International Baccalaureate"},{key:"ap",label:"AP Courses",sub:"Advanced Placement"}].map(pg=>(
                  <button key={pg.key} onClick={()=>setPrograms(p=>Object.assign({},p,{[pg.key]:!p[pg.key]}))} style={{flex:1,padding:"12px",borderRadius:"12px",cursor:"pointer",border:"1px solid "+(programs[pg.key]?"rgba(201,168,76,0.6)":"rgba(255,255,255,0.07)"),background:programs[pg.key]?"rgba(201,168,76,0.10)":"rgba(255,255,255,0.02)",color:programs[pg.key]?"#c9a84c":"#9898a8",textAlign:"left",transition:"all 0.18s"}}>
                    <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"700"}}>{pg.label}</div>
                    <div style={{fontSize:"10px",opacity:0.65,marginTop:"2px"}}>{pg.sub}</div>
                  </button>
                ))}
              </div>
              {programs.ib && <input value={ibScore} onChange={e=>setIbScore(e.target.value)} placeholder="IB predicted score (e.g. 38 / 45)" style={Object.assign({},inp,{marginBottom:"8px",border:"1px solid rgba(201,168,76,0.3)"})}/>}
              {programs.ap && <textarea value={apCourses} onChange={e=>setApCourses(e.target.value)} placeholder="AP courses & scores (e.g. Calc BC (5), Physics C (5)...)" rows={2} style={Object.assign({},inp,{resize:"vertical",border:"1px solid rgba(201,168,76,0.3)"})}/>}
            </div>
          </div>
        )}

        {/* STEP 3 — ECs + awards */}
        {formStep===3 && (
          <div style={{animation:"fypuFadeUp 0.35s cubic-bezier(0.22,1,0.36,1) both"}}>
            <div style={{marginBottom:"24px"}}>
              <label style={{display:"block",color:"#9898a8",fontSize:"10px",letterSpacing:"0.14em",fontFamily:"'Montserrat',sans-serif",marginBottom:"6px"}}>EXTRACURRICULARS <span style={{color:"#705858",fontWeight:"400"}}>(optional but important)</span></label>
              <textarea value={extras} onChange={e=>setExtras(e.target.value)} placeholder="e.g. Captain of debate team, varsity soccer, robotics club president, volunteer at hospital..." rows={4} style={Object.assign({},inp,{resize:"vertical"})} autoFocus/>
              <div style={{color:"#705858",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginTop:"6px"}}>The more detail, the better your list. Top schools weight this heavily.</div>
            </div>
            <div style={{marginBottom:"24px"}}>
              <label style={{display:"block",color:"#9898a8",fontSize:"10px",letterSpacing:"0.14em",fontFamily:"'Montserrat',sans-serif",marginBottom:"6px"}}>AWARDS & ACCOMPLISHMENTS <span style={{color:"#705858",fontWeight:"400"}}>(optional)</span></label>
              <textarea value={awards} onChange={e=>setAwards(e.target.value)} placeholder="e.g. 1st place Canadian Math Kangaroo, Schulich Leader nominee, DECA provincials finalist..." rows={3} style={Object.assign({},inp,{resize:"vertical",borderColor:"rgba(201,168,76,0.3)"})}/>
            </div>
            <div style={{display:"flex",gap:"8px",marginBottom:"4px"}}>
              <button onClick={saveProfile} style={{flex:1,padding:"10px",borderRadius:"10px",cursor:"pointer",border:"1px solid rgba(201,168,76,0.35)",background:profileSaved?"rgba(90,186,106,0.12)":"rgba(201,168,76,0.06)",color:profileSaved?"#5aba6a":"#c9a84c",fontFamily:"'Montserrat',sans-serif",fontSize:"10px",fontWeight:"700",letterSpacing:"0.08em",transition:"all 0.2s"}}>
                {profileSaved ? "✓ SAVED" : "💾 SAVE PROFILE"}
              </button>
              <button onClick={clearProfile} style={{padding:"10px 14px",borderRadius:"10px",cursor:"pointer",border:"1px solid rgba(255,255,255,0.07)",background:"transparent",color:"#705858",fontFamily:"'Montserrat',sans-serif",fontSize:"10px",fontWeight:"700"}}>CLEAR</button>
            </div>
          </div>
        )}

        {/* Error */}
        {error && <div style={{color:"#c0302a",fontSize:"12px",marginTop:"12px",padding:"10px 14px",background:"rgba(139,26,26,0.12)",borderRadius:"8px"}}>{error}</div>}

        {/* Nav buttons */}
        <div style={{display:"flex",gap:"10px",marginTop:"32px"}}>
          {formStep > 0 && (
            <button onClick={()=>setFormStep(s=>s-1)} style={{padding:"14px 20px",borderRadius:"12px",cursor:"pointer",border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"#9898a8",fontFamily:"'Montserrat',sans-serif",fontSize:"12px",fontWeight:"700"}}>← Back</button>
          )}
          <button onClick={handleNext} disabled={loading || !canAdvance()} style={{flex:1,background:loading?"rgba(201,168,76,0.3)":canAdvance()?"linear-gradient(135deg,#c0302a,#8b1a1a)":"rgba(255,255,255,0.05)",color:canAdvance()&&!loading?"#f0f0f0":"#555",border:"none",borderRadius:"12px",padding:"14px",fontSize:"13px",fontWeight:"700",letterSpacing:"0.08em",cursor:loading||!canAdvance()?"not-allowed":"pointer",fontFamily:"'Montserrat',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",transition:"all 0.2s"}}>
            {loading ? (<><span style={{display:"inline-block",animation:"nbspin 1s linear infinite"}}>o</span> Finding your schools...</>) : formStep===3 ? "Generate My List ✨" : "Continue →"}
          </button>
        </div>

        {/* Step dots */}
        <div style={{display:"flex",justifyContent:"center",gap:"6px",marginTop:"24px"}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{width:i===formStep?"20px":"6px",height:"6px",borderRadius:"3px",background:i===formStep?"#c9a84c":i<formStep?"rgba(201,168,76,0.4)":"rgba(255,255,255,0.1)",transition:"all 0.3s"}}/>
          ))}
        </div>

      </div>

      <style dangerouslySetInnerHTML={{__html:globalStyles}}/>
      <Footer/>
    </div>
  );
}

function Footer() {
  const [feedback, setFeedback] = React.useState("");
  const [feedbackType, setFeedbackType] = React.useState("general");
  const [submitted, setSubmitted] = React.useState(false);
  const [submitting, setSubmitting] = React.useState(false);

  async function submitFeedback() {
    if (!feedback.trim()) return;
    setSubmitting(true);
    try {
      await fetch("https://formspree.io/f/xwvwljgk", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ type: feedbackType, message: feedback })
      });
    } catch(e) {}
    setSubmitting(false);
    setSubmitted(true);
  }

  return (
    <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",marginTop:"60px",padding:"48px 20px 32px",background:"rgba(0,0,0,0.3)"}}>
      <div style={{maxWidth:"860px",margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:"40px"}}>
          <div style={{color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.15em",marginBottom:"20px"}}>CONNECT WITH US</div>
          <div style={{display:"flex",justifyContent:"center",gap:"12px",flexWrap:"wrap"}}>
            {[{label:"Instagram",icon:"📸",url:"https://www.instagram.com/fypuhere"},{label:"TikTok",icon:"🎵",url:"https://www.tiktok.com/@fypuhere"},{label:"Connect with Founder",icon:"✉️",url:"mailto:Hellokayleec@gmail.com"}].map(s=>(
              <a key={s.label} href={s.url} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:"8px",padding:"10px 20px",borderRadius:"12px",border:"1px solid rgba(201,168,76,0.2)",background:"rgba(201,168,76,0.05)",color:"#c9a84c",fontFamily:"'Montserrat',sans-serif",fontSize:"12px",fontWeight:"600",textDecoration:"none"}}>
                <span>{s.icon}</span>{s.label}
              </a>
            ))}
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"16px",padding:"28px",marginBottom:"32px"}}>
          <div style={{color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.15em",marginBottom:"16px"}}>SHARE YOUR FEEDBACK</div>
          {submitted ? (
            <div style={{textAlign:"center",padding:"20px"}}>
              <div style={{fontSize:"28px",marginBottom:"8px"}}>🎓</div>
              <div style={{color:"#5aba6a",fontFamily:"'Montserrat',sans-serif",fontSize:"13px",fontWeight:"700",marginBottom:"4px"}}>Thank you!</div>
              <div style={{color:"#9898a8",fontSize:"12px"}}>Your feedback helps us improve FYPU for students everywhere.</div>
            </div>
          ) : (
            <div>
              <div style={{display:"flex",gap:"8px",marginBottom:"14px",flexWrap:"wrap"}}>
                {[{key:"general",label:"💡 General"},{key:"bug",label:"👋 Connect"},{key:"feature",label:"✨ Feature Request"},{key:"accuracy",label:"🎯 Accuracy"}].map(t=>(
                  <button key={t.key} onClick={()=>setFeedbackType(t.key)} style={{padding:"6px 14px",borderRadius:"8px",cursor:"pointer",border:"1px solid "+(feedbackType===t.key?"rgba(201,168,76,0.5)":"rgba(255,255,255,0.08)"),background:feedbackType===t.key?"rgba(201,168,76,0.1)":"transparent",color:feedbackType===t.key?"#c9a84c":"#9898a8",fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"600"}}>
                    {t.label}
                  </button>
                ))}
              </div>
              <textarea value={feedback} onChange={e=>setFeedback(e.target.value)} placeholder="Tell us what you think, what's missing, or what could be better..." rows={4} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"10px",padding:"12px 14px",color:"#f0f0f0",fontSize:"13px",fontFamily:"'Montserrat',sans-serif",resize:"vertical",outline:"none",boxSizing:"border-box",marginBottom:"12px"}}/>
              <button onClick={submitFeedback} disabled={submitting||!feedback.trim()} style={{padding:"10px 24px",borderRadius:"10px",cursor:feedback.trim()?"pointer":"not-allowed",border:"none",background:feedback.trim()?"linear-gradient(135deg,#c9a84c,#e8c96a)":"rgba(255,255,255,0.05)",color:feedback.trim()?"#080808":"#555",fontFamily:"'Montserrat',sans-serif",fontSize:"12px",fontWeight:"700",letterSpacing:"0.08em"}}>
                {submitting?"SENDING...":"SEND FEEDBACK"}
              </button>
            </div>
          )}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px"}}>
          <div style={{color:"#444",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>© 2025 FYPU · fypuhere.com</div>
          <div style={{color:"#444",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>Built for students, by students 🎓</div>
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
