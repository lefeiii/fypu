                                </div>
                              )}
                              {x.pg.undergradActions && x.pg.undergradActions.length>0 && (
                                <div style={{background:"rgba(196,127,212,0.06)",borderRadius:"8px",padding:"8px 12px"}}>
                                  <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginBottom:"6px"}}>RECOMMENDED ACTIONS</div>
                                  {x.pg.undergradActions.slice(0,3).map((a,i)=>(
                                    <div key={i} style={{display:"flex",alignItems:"flex-start",gap:"6px",marginBottom:"5px"}}>
                                      <div style={{color:x.c,fontSize:"11px",fontWeight:"700",flexShrink:0}}>{i+1}.</div>
                                      <span style={{color:"#f0f0f0",fontSize:"11px",lineHeight:"1.4"}}>{a}</span>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          ) : (<>
                            <div style={{textAlign:"center",marginBottom:"12px"}}>
                              <div style={{color:x.c,fontSize:"32px",fontWeight:"900"}}>{x.pg.feederScore || "?"}<span style={{fontSize:"14px",color:"#9898a8"}}>/10</span></div>
                              <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif"}}>FEEDER SCORE</div>
                            </div>
                            <RRow label="Post-grad admit rate" value={x.pg.postGradAcceptRate||"Not available"}/>
                            <RRow label={"Avg "+((pgPathCompare||{}).testLabel||"test")} value={x.pg.avgTestScore||"Not available"}/>
                            {x.pg.researchOpps && <div style={{marginTop:"8px",color:"#9898a8",fontSize:"11px",lineHeight:"1.5"}}><strong style={{color:"#d0d0d8"}}>Research: </strong>{x.pg.researchOpps}</div>}
                            {x.pg.alumniNote && <div style={{marginTop:"6px",color:"#9898a8",fontSize:"11px",lineHeight:"1.5"}}><strong style={{color:"#d0d0d8"}}>Alumni: </strong>{x.pg.alumniNote}</div>}
                            {x.pg.summary && <div style={{marginTop:"10px",padding:"8px 10px",background:x.c+"0a",borderRadius:"8px",color:"#d0d0d8",fontSize:"11px",lineHeight:"1.5"}}>{x.pg.summary}</div>}
                          </>)}
                        </div>
                      ))}
                    </div>
                    <div style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(241,81,119,0.28)",borderRadius:"10px",padding:"14px 16px"}}>
                      <div style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"6px"}}>{pgPathCompare?pgPathCompare.label.toUpperCase():"POST-GRAD"} PIPELINE VERDICT</div>
                      <div style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.6"}}>
                        {pgA.feederScore > pgB.feederScore
                          ? schoolA.name + " scores higher as a " + (pgPathCompare?pgPathCompare.label:"post-grad") + " feeder (" + pgA.feederScore + "/10 vs " + pgB.feederScore + "/10). " + (pgA.summary||"")
                          : pgB.feederScore > pgA.feederScore
                          ? schoolB.name + " scores higher as a " + (pgPathCompare?pgPathCompare.label:"post-grad") + " feeder (" + pgB.feederScore + "/10 vs " + pgA.feederScore + "/10). " + (pgB.summary||"")
                          : "Both schools are comparably rated feeders for " + (pgPathCompare?pgPathCompare.label:"post-grad programs") + "."}
                      </div>
                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          {tab==="outcome" && data.competitivenessOutcome && (
            <div>
              <h2 style={{color:"#f0f0f0",fontFamily:"'Great Vibes',cursive",fontSize:"28px",fontWeight:"400",margin:"0 0 4px"}}>Competitiveness vs Outcome</h2>
              <p style={{color:"#9898a8",fontSize:"13px",margin:"0 0 16px"}}>Is the harder school worth it for your profile?</p>
              <CBar label="Your Estimated Admit Probability" valA={data.competitivenessOutcome.schoolA.expectedAdmitProb} valB={data.competitivenessOutcome.schoolB.expectedAdmitProb} nameA={schoolAbbr(schoolA.name)} nameB={schoolAbbr(schoolB.name)} cA={cA} cB={cB} higher={true}/>
              <CBar label="Outcome Score (earnings + network + brand)" valA={data.competitivenessOutcome.schoolA.outcomeScore} valB={data.competitivenessOutcome.schoolB.outcomeScore} nameA={schoolAbbr(schoolA.name)} nameB={schoolAbbr(schoolB.name)} cA={cA} cB={cB} higher={true}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",margin:"16px 0"}}>
                {[{s:schoolA,d:data.competitivenessOutcome.schoolA,c:cA,lbl:schoolAbbr(schoolA.name)},{s:schoolB,d:data.competitivenessOutcome.schoolB,c:cB,lbl:"B"}].map(x=>(
                  <div key={x.lbl} style={{background:"rgba(255,255,255,0.03)",border:"1px solid "+x.c+"30",borderRadius:"12px",padding:"16px"}}>
                    <div style={{color:x.c,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"8px"}}>SCHOOL {x.lbl}</div>
                    <RRow label="Difficulty" value={x.d.admitDifficulty} vc={{VeryHigh:"#c0302a","Very High":"#c0302a",High:"#c9a84c",Moderate:"#e8c96a",Low:"#5aba6a"}[x.d.admitDifficulty]||"#705858"}/>
                    <RRow label="Program admit rate" value={x.d.programAdmitRate}/>
                    <RRow label="Your admit prob" value={x.d.expectedAdmitProb} vc={x.c}/>
                    <RRow label="Ranking in major" value={x.d.rankingInMajor}/>
                    <RRow label="Alumni network" value={x.d.alumniNetwork}/>
                    <RRow label="Brand premium" value={x.d.brandPremium} vc="#5aba6a"/>
                  </div>
                ))}
              </div>
              <DCard>
                <CLabel color="#c9a84c">TRADEOFF ANALYSIS<InfoTip text="A direct comparison of what you gain and lose choosing one school over the other — prestige vs cost, difficulty vs fit, network vs location."/></CLabel>
                <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.7",marginBottom:"14px"}}>{data.competitivenessOutcome.tradeoffAnalysis}</p>
                <div style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(241,81,119,0.28)",borderRadius:"8px",padding:"12px 14px"}}>
                  <div style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"4px"}}>RECOMMENDATION FOR YOU</div>
                  <div style={{color:"#f0f0f0",fontSize:"13px",lineHeight:"1.6"}}>{data.competitivenessOutcome.recommendationForStudent || (data.competitivenessOutcome.schoolA && data.competitivenessOutcome.schoolB ? "Based on competitiveness scores, "+((data.competitivenessOutcome.schoolA.outcomeScore||0)>=(data.competitivenessOutcome.schoolB.outcomeScore||0)?schoolAbbr(schoolA.name):schoolAbbr(schoolB.name))+" is the stronger fit for your profile. Consider "+((data.competitivenessOutcome.schoolA.admitDifficulty||"")==="Very High"||( data.competitivenessOutcome.schoolA.admitDifficulty||"")==="Extremely High"?schoolAbbr(schoolB.name)+" as a safer option.":"both schools as realistic targets.") : "Run comparison to see your recommendation.")}</div>
                </div>
              </DCard>
            </div>
          )}

          {data.overallVerdict && (
            <div style={{marginTop:"20px",background:"linear-gradient(135deg,rgba(201,168,76,0.09),rgba(201,168,76,0.04))",border:"1px solid rgba(201,168,76,0.32)",borderRadius:"14px",padding:"20px 22px"}}>
              <div style={{display:"flex",gap:"10px",alignItems:"center",marginBottom:"10px",flexWrap:"wrap"}}>
                <div style={{background:"rgba(192,48,42,0.35)",border:"1px solid rgba(201,168,76,0.38)",borderRadius:"8px",padding:"5px 12px"}}><span style={{color:"#c9a84c",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700"}}>OVERALL WINNER</span></div>
                <span style={{color:"#f0f0f0",fontFamily:"'Anton',sans-serif",fontSize:"22px",fontWeight:"400",letterSpacing:"0.03em"}}>{data.overallVerdict.winner}</span>
                <Tag c="#f15177">for {data.overallVerdict.winnerFor}</Tag>
              </div>
              <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.7",marginBottom:"10px"}}>{data.overallVerdict.summary}</p>
              <div style={{background:"rgba(255,159,67,0.10)",border:"1px solid rgba(255,159,67,0.22)",borderRadius:"8px",padding:"10px 12px"}}>
                <span style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>CAVEAT: </span>
                <span style={{color:"#9898a8",fontSize:"12px"}}>{data.overallVerdict.caveat}</span>
              </div>
            </div>
          )}
        </div>
      ) : (
        <div style={{textAlign:"center",padding:"80px 24px",color:"#9898a8",fontFamily:"'Montserrat',sans-serif"}}>Comparison failed. Please go back and try again.</div>
      )}
      <style dangerouslySetInnerHTML={{__html:"@keyframes nbspin{to{transform:rotate(360deg);}} @keyframes nbpulse{0%,100%{opacity:.5}50%{opacity:1}}"}}/>
    </div>
  );
}

// ========================================
// SCHOOL CARD
// ========================================
function SchoolCard({school, category, profile, onAnalyze, compareNames, onToggleCompare}) {
  const [open,setOpen]   = useState(false);
  const cfg              = CAT[category];
  const inCompare        = compareNames.includes(school.name);

  return (
    <div style={{background:cfg.bg,border:"1px solid "+(inCompare?"rgba(201,168,76,0.65)":cfg.border),borderRadius:"16px",padding:"14px 16px",marginBottom:"12px",transition:"border-color 0.2s",overflow:"hidden",minWidth:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}}>
        <div style={{flex:1,cursor:"pointer",minWidth:0,overflow:"hidden"}} onClick={()=>setOpen(!open)}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
            <span style={{color:cfg.color,fontSize:"16px",flexShrink:0}}>{cfg.icon}</span>
            <span style={{color:"#f0f0f0",fontFamily:"'DM Serif Display',serif",fontSize:"16px",fontWeight:"700",lineHeight:"1.2"}}>{school.name}</span>
          </div>
          {school.targetProgram && (
            <div style={{marginBottom:"4px"}}>
              <span style={{color:"#c9a84c",fontSize:"12px",fontFamily:"'Montserrat',sans-serif",fontWeight:"600"}}>{school.targetProgram.name}</span>
              <span style={{color:"#9898a8",fontSize:"12px",fontFamily:"'Montserrat',sans-serif"}}>- {school.targetProgram.admRate} admit</span>
            </div>
          )}
          <div style={{display:"flex",gap:"12px",flexWrap:"wrap",marginLeft:"24px"}}>
            <span style={{color:"#705858",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>{school.location}</span>
            <span style={{color:"#705858",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>Overall: {school.acceptRate}</span>
            <span style={{color:"#705858",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>Intl: {school.intlFriendly}</span>
            {school.creditPolicy && (profile.programs&&(profile.programs.ib||profile.programs.ap)) && (
              <span style={{background:"rgba(139,26,26,0.12)",border:"1px solid rgba(167,139,250,0.28)",color:"#c9a84c",borderRadius:"5px",padding:"1px 7px",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700"}}>&#127891; CREDITS</span>
            )}
          </div>
        </div>
        <div style={{display:"flex",gap:"5px",alignItems:"center",flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
          <button onClick={()=>onToggleCompare(school,category)} style={{background:inCompare?"rgba(192,48,42,0.35)":"rgba(255,255,255,0.04)",border:"1px solid "+(inCompare?"rgba(201,168,76,0.55)":"rgba(139,26,26,0.12)"),color:inCompare?"#f15177":"#9898a8",borderRadius:"7px",padding:"5px 9px",fontSize:"10px",fontWeight:"700",cursor:"pointer",fontFamily:"'Montserrat',sans-serif",whiteSpace:"nowrap"}}>
            {inCompare ? "COMPARING" : "+ COMPARE"}
          </button>
          <button onClick={()=>onAnalyze(school,category)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(107,159,228,0.22)",color:"#705858",borderRadius:"7px",padding:"5px 9px",fontSize:"10px",fontWeight:"700",cursor:"pointer",fontFamily:"'Montserrat',sans-serif",whiteSpace:"nowrap"}}>
            ANALYZE
          </button>
          <a href={getLink(school.name)} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{background:cfg.color,color:"#080808",borderRadius:"7px",padding:"5px 12px",fontSize:"11px",fontWeight:"700",textDecoration:"none",fontFamily:"'Montserrat',sans-serif",whiteSpace:"nowrap"}}>
            APPLY
          </a>
          <span onClick={()=>setOpen(!open)} style={{color:"#d0d0d8",fontSize:"20px",cursor:"pointer",display:"inline-block",transition:"transform 0.2s",transform:open?"rotate(180deg)":"rotate(0)"}}>▾</span>
        </div>
      </div>

      {open && (
        <div style={{marginTop:"14px",marginLeft:"24px",borderTop:"1px solid "+cfg.border,paddingTop:"14px",overflow:"hidden",wordBreak:"break-word",overflowWrap:"break-word"}}>
          <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.6",marginBottom:"12px",fontStyle:"italic",overflowWrap:"break-word",wordBreak:"break-word"}}>{school.note}</p>
          {school.targetProgram && (
            <div style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(107,159,228,0.32)",borderRadius:"10px",padding:"12px 14px",marginBottom:"12px"}}>
              <div style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"6px"}}>YOUR TARGET PROGRAM</div>
              <div style={{display:"flex",gap:"16px",alignItems:"center",flexWrap:"wrap"}}>
                <div>
                  <div style={{color:"#f0f0f0",fontSize:"14px",fontWeight:"700"}}>{school.targetProgram.name}</div>
                  <div style={{color:"#9898a8",fontSize:"11px",marginTop:"2px"}}>{school.targetProgram.degree||""}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{color:"#c0302a",fontSize:"20px",fontWeight:"800"}}>{school.targetProgram.admRate}</div>
                  <div style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>PROGRAM ADMIT RATE</div>
                </div>
                {school.targetProgram.notes && <div style={{color:"#9898a8",fontSize:"12px",flex:1,lineHeight:"1.5",overflowWrap:"break-word",wordBreak:"break-word",minWidth:0}}>{school.targetProgram.notes}</div>}
              </div>
            </div>
          )}
          {school.programs && school.programs.length > 0 && (
            <div style={{marginBottom:"12px"}}>
              <p style={{color:cfg.color,fontSize:"11px",fontWeight:"700",letterSpacing:"0.1em",marginBottom:"8px",fontFamily:"'Montserrat',sans-serif"}}>OTHER RELATED PROGRAMS</p>
              {school.programs.map((p,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"8px 12px",marginBottom:"6px"}}>
                  <span style={{color:cfg.color,fontWeight:"700",fontSize:"12px",fontFamily:"'Montserrat',sans-serif",minWidth:"22px"}}>#{i+1}</span>
                  <span style={{color:"#d0d0d8",fontSize:"13px",fontWeight:"600"}}>{p.name}</span>
                  <span style={{color:"#9898a8",fontSize:"11px"}}>- {p.admRate}</span>
                </div>
              ))}
            </div>
          )}
          <div style={{padding:"10px 14px",background:"rgba(255,255,255,0.03)",borderRadius:"8px",marginBottom:"10px"}}>
            <span style={{color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>{school.tuition} | {school.conversion}</span>
          </div>
          {school.postGradProfile && profile.postGrad && (()=>{
            const pgP = (POST_GRAD_PATHS.find(p=>p.key===profile.pgPathKey)||detectPostGradPath(profile.intendedMajor)) || {};
            const pg  = school.postGradProfile;
            const score = parseInt(pg.feederScore)||0;
            const scoreCol = score>=8?"#5aba6a":score>=6?"#e8c96a":"#c9a84c";
            return (
              <div style={{background:"linear-gradient(135deg,rgba(241,81,119,0.07),rgba(107,159,228,0.06))",border:"1px solid rgba(201,168,76,0.3)",borderRadius:"12px",padding:"14px 16px",marginBottom:"10px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
                  <span style={{fontSize:"15px"}}>{pgP.icon||"Gd"}</span>
                  <span style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700",letterSpacing:"0.1em"}}>{(pg.postGradLabel||pgP.label||"POST-GRAD").toUpperCase()} FEEDER PROFILE</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px",marginBottom:"12px"}}>
                  <div style={{background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"10px",textAlign:"center",overflow:"hidden",minWidth:0}}>
                    <div style={{color:scoreCol,fontSize:"20px",fontWeight:"800",lineHeight:1,overflow:"hidden"}}>{pg.feederScore}<span style={{fontSize:"11px",color:"#9898a8"}}>/10</span></div>
                    <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginTop:"3px"}}>FEEDER SCORE</div>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"10px",textAlign:"center",overflow:"hidden",minWidth:0}}>
                    <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"700",lineHeight:1.2,overflowWrap:"break-word",wordBreak:"break-word"}}>{pg.postGradAcceptRate||"Not available"}</div>
                    <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginTop:"3px"}}>ADMIT RATE</div>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"10px",textAlign:"center",overflow:"hidden",minWidth:0}}>
                    <div style={{color:"#c9a84c",fontSize:"11px",fontWeight:"700",lineHeight:1.3,overflowWrap:"break-word",wordBreak:"break-word"}}>{pg.avgTestScore||"-"}</div>
                    <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginTop:"3px"}}>AVG {pgP.testLabel||"TEST"}</div>
                  </div>
                </div>
                {pg.researchOpps && <div style={{display:"flex",gap:"6px",marginBottom:"6px",alignItems:"flex-start",overflow:"hidden"}}><span style={{color:"#c9a84c",fontSize:"10px",flexShrink:0,marginTop:"2px"}}>&gt;</span><div style={{minWidth:0,overflow:"hidden"}}><span style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>RESEARCH: </span><span style={{color:"#d0d0d8",fontSize:"12px",overflowWrap:"break-word",wordBreak:"break-word"}}>{pg.researchOpps}</span></div></div>}
                {pg.internshipPipeline && <div style={{display:"flex",gap:"6px",marginBottom:"6px",alignItems:"flex-start",overflow:"hidden"}}><span style={{color:"#c9a84c",fontSize:"10px",flexShrink:0,marginTop:"2px"}}>&gt;</span><div style={{minWidth:0,overflow:"hidden"}}><span style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>PIPELINE: </span><span style={{color:"#d0d0d8",fontSize:"12px",overflowWrap:"break-word",wordBreak:"break-word"}}>{pg.internshipPipeline}</span></div></div>}
                {pg.alumniNote && <div style={{display:"flex",gap:"6px",marginBottom:"8px",alignItems:"flex-start"}}><span style={{color:"#c9a84c",fontSize:"10px",flexShrink:0,marginTop:"2px"}}>&gt;</span><div><span style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>ALUMNI: </span><span style={{color:"#d0d0d8",fontSize:"12px",overflowWrap:"break-word",wordBreak:"break-word"}}>{pg.alumniNote}</span></div></div>}
                {pg.summary && <div style={{background:"rgba(139,26,26,0.12)",borderRadius:"8px",padding:"8px 10px",color:"#e8c96a",fontSize:"12px",lineHeight:"1.5",overflowWrap:"break-word",wordBreak:"break-word"}}>{pg.summary}</div>}
              </div>
            );
          })()}
          {school.creditPolicy && (profile.programs && (profile.programs.ib || profile.programs.ap)) && (
            <div style={{background:"rgba(201,168,76,0.07)",border:"1px solid rgba(201,168,76,0.22)",borderRadius:"12px",padding:"14px 16px",marginBottom:"10px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
                <span style={{fontSize:"14px"}}>&#127891;</span>
                <span style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700",letterSpacing:"0.1em"}}>IB / AP CREDIT POLICY</span>
              </div>

              {profile.programs.ib && (
                <div style={{marginBottom:"10px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}}>
                    <span style={{background:"rgba(139,26,26,0.12)",border:"1px solid rgba(167,139,250,0.3)",color:"#c9a84c",borderRadius:"5px",padding:"2px 8px",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700"}}>IB</span>
                    <span style={{color:school.creditPolicy.offersIBCredit?"#5aba6a":"#c0302a",fontSize:"11px",fontWeight:"600"}}>{school.creditPolicy.offersIBCredit?"Credit Offered":"No IB Credit"}</span>
                    {school.creditPolicy.offersIBCredit && <span style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>via {school.creditPolicy.ibCreditSystem||"course exemption"}</span>}
                  </div>
                  {school.creditPolicy.offersIBCredit && school.creditPolicy.ibCreditDetails && (
                    <div style={{background:"rgba(139,26,26,0.10)",borderRadius:"8px",padding:"8px 10px"}}>
                      <div style={{color:"#c9a84c",fontSize:"12px",lineHeight:"1.5",overflowWrap:"break-word",wordBreak:"break-word"}}>{school.creditPolicy.ibCreditDetails}</div>
                    </div>
                  )}
                </div>
              )}

              {profile.programs.ap && (
                <div style={{marginBottom:"10px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}}>
                    <span style={{background:"rgba(201,168,76,0.07)",border:"1px solid rgba(96,165,250,0.3)",color:"#c9a84c",borderRadius:"5px",padding:"2px 8px",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700"}}>AP</span>
                    <span style={{color:school.creditPolicy.offersAPCredit?"#5aba6a":"#c0302a",fontSize:"11px",fontWeight:"600"}}>{school.creditPolicy.offersAPCredit?"Credit Offered":"No AP Credit"}</span>
                    {school.creditPolicy.offersAPCredit && <span style={{color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>via {school.creditPolicy.apCreditSystem||"direct course credit"}</span>}
                  </div>
                  {school.creditPolicy.offersAPCredit && school.creditPolicy.apCreditDetails && (
                    <div style={{background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"8px 10px"}}>
                      <div style={{color:"#c9a84c",fontSize:"12px",lineHeight:"1.5"}}>{school.creditPolicy.apCreditDetails}</div>
                    </div>
                  )}
                </div>
              )}

              {(school.creditPolicy.maxCreditsFromTests || school.creditPolicy.semestersSaved) && (
                <div style={{display:"flex",gap:"10px",flexWrap:"wrap",marginTop:"8px"}}>
                  {school.creditPolicy.maxCreditsFromTests && (
                    <div style={{background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"8px 12px",flex:1,minWidth:"120px"}}>
                      <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginBottom:"3px"}}>MAX CREDITS</div>
                      <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"700"}}>{school.creditPolicy.maxCreditsFromTests}</div>
                    </div>
                  )}
                  {school.creditPolicy.semestersSaved && (
                    <div style={{background:"rgba(255,217,61,0.06)",border:"1px solid rgba(255,217,61,0.2)",borderRadius:"8px",padding:"8px 12px",flex:1,minWidth:"120px"}}>
                      <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginBottom:"3px"}}>POTENTIAL SAVING</div>
                      <div style={{color:"#e8c96a",fontSize:"13px",fontWeight:"700"}}>{school.creditPolicy.semestersSaved}</div>
                    </div>
                  )}
                </div>
              )}

              {school.creditPolicy.creditUrl && school.creditPolicy.creditUrl !== "https://..." && (
                <a href={school.creditPolicy.creditUrl} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:"5px",marginTop:"10px",color:"#c9a84c",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",textDecoration:"none",opacity:0.8}}>
                  &#8594; Official credit policy page
                </a>
              )}
            </div>
          )}

          <div style={{display:"flex",gap:"8px"}}>
            <button onClick={()=>onToggleCompare(school,category)} style={{flex:1,background:inCompare?"rgba(139,26,26,0.12)":"rgba(255,255,255,0.03)",border:"1px solid "+(inCompare?"rgba(241,81,119,0.4)":cfg.border),color:inCompare?"#f15177":cfg.color,borderRadius:"10px",padding:"10px",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"'Montserrat',sans-serif"}}>
              {inCompare ? "In Compare" : "+ Add to Compare"}
            </button>
            <button onClick={()=>onAnalyze(school,category)} style={{flex:1,background:"rgba(255,255,255,0.03)",border:"1px solid "+cfg.border,color:cfg.color,borderRadius:"10px",padding:"10px",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"'Montserrat',sans-serif"}}>
              Deep Analysis
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ========================================
// MAIN APP
// ========================================
const LOGO_URI = "./logo.webp"; "";

function App() {
  const [province,setProvince]           = useState("");
  const [studentOrigin,setStudentOrigin] = useState(""); // "canada" | "us" | "other"
  const [cumAvg,setCumAvg]               = useState("");
  const [actScore,setActScore]           = useState("");
  const [programs,setPrograms]           = useState({ib:false,ap:false});
  const [ibScore,setIbScore]             = useState("");
  const [apCourses,setApCourses]         = useState("");
  const [awards,setAwards]               = useState("");
  const [hsYear,setHsYear]               = useState("");
  const [satScore,setSatScore]           = useState("");
  const [intendedMajor,setIntendedMajor] = useState("");
  const [extras,setExtras]               = useState("");
  const [profileSaved,setProfileSaved]   = useState(false);
  const [howItWorksOpen,setHowItWorksOpen] = useState(false);
  const [demoOpen,setDemoOpen]             = useState(false);
  const [musicOpen,setMusicOpen]           = useState(false);

  useEffect(()=>{
    try {
      const s = localStorage.getItem('fypu_profile');
      if (s) {
        const d = JSON.parse(s);
        if (d.studentOrigin) setStudentOrigin(d.studentOrigin);
        if (d.province) setProvince(d.province);
        if (d.cumAvg) setCumAvg(d.cumAvg);
        if (d.actScore) setActScore(d.actScore);
        if (d.satScore) setSatScore(d.satScore);
        if (d.programs) setPrograms(d.programs);
        if (d.ibScore) setIbScore(d.ibScore);
        if (d.apCourses) setApCourses(d.apCourses);
        if (d.awards) setAwards(d.awards);
        if (d.hsYear) setHsYear(d.hsYear);
        if (d.intendedMajor) setIntendedMajor(d.intendedMajor);
        if (d.extras) setExtras(d.extras);
      }
    } catch(e) {}
  },[]);

  const [results,setResults]             = useState(null);
  const [loading,setLoading]             = useState(false);
  const [error,setError]                 = useState("");
  const [activeTab,setActiveTab]         = useState("reach");
  const [analysisTarget,setAnalysisTarget] = useState(null);
  const [compareList,setCompareList]     = useState([]);
  const [compareTarget,setCompareTarget] = useState(null);
  const [page,setPage]                   = useState("form"); // "form" | "results"
  const [postGrad,setPostGrad]           = useState(false);
  const [pgPathKey,setPgPathKey]         = useState(null);
  const pgPath = pgPathKey ? (POST_GRAD_PATHS.find(p=>p.key===pgPathKey)||null) : null;

  function saveProfile() {
    try {
      localStorage.setItem('fypu_profile', JSON.stringify({
        province, studentOrigin, cumAvg, actScore, programs,
        ibScore, apCourses, awards, hsYear, satScore, intendedMajor, extras
      }));
      setProfileSaved(true);
      setTimeout(()=>setProfileSaved(false), 2500);
    } catch(e) {}
  }

  function clearProfile() {
    try { localStorage.removeItem('fypu_profile'); } catch(e) {}
    setProvince(""); setStudentOrigin(""); setCumAvg(""); setActScore("");
    setPrograms({ib:false,ap:false}); setIbScore(""); setApCourses("");
    setAwards(""); setHsYear(""); setSatScore(""); setIntendedMajor("");
    setExtras(""); setPgPathKey(null);
  }

  const profile = {province, cumAvg, actScore, satScore, programs, ibScore, apCourses, awards, hsYear, intendedMajor, extras, postGrad: pgPathKey !== null, pgPathKey, studentOrigin};

  function resetToForm() {
    setPage("form");
    setResults(null);
    setCompareList([]);
    setCompareTarget(null);
    setAnalysisTarget(null);
  }

  function toggleCompare(school, category) {
    setCompareList(prev => {
      const exists = prev.some(s=>s.school.name===school.name);
      if (exists) return prev.filter(s=>s.school.name!==school.name);
      if (prev.length >= 2) return [...prev.slice(1), {school,category}];
      return [...prev, {school,category}];
    });
  }

  async function generate() {
    if (!studentOrigin) { setError("Please select where you are from."); return; }
    if (!province || !cumAvg || !intendedMajor || !hsYear) { setError("Please fill in your location, cumulative average, school year, and intended major."); return; }
    const isUSStudent = studentOrigin === "us";
    const isIntl = studentOrigin !== "us";
    setError(""); setLoading(true); setResults(null); setCompareList([]);
    const gs     = GRADE_SYSTEMS[province] || {};
    const hsInfo = HS_YEARS.find(y=>y.value===hsYear) || HS_YEARS[3];
    const isSr   = hsYear==="grade12";
    const hasIB  = programs.ib;
    const hasAP  = programs.ap;
    const pgPath = pgPathKey ? (POST_GRAD_PATHS.find(p=>p.key===pgPathKey)||null) : null;

    // Tier prompts are built inside fetchTier() below - no single combined prompt needed

    // Helper: build per-tier prompt
    async function fetchTier(tier) {
      const tierDef = tier==="reach"
        ? "REACH schools: highly selective, <15% admit chance for this student (think MIT, Harvard, Stanford level)"
        : tier==="target"
        ? "TARGET schools: well-matched, 25-55% admit chance for this student"
        : "SAFETY schools: strong likelihood >70%, student is above average for these schools";

      const extras_pg = pgPath ? " Post-grad goal: " + pgPath.label + "." : "";
      const extras_ib = hasIB ? " IB predicted " + (ibScore||"?") + "/45." : "";
      const extras_ap = hasAP ? " AP courses: " + (apCourses||"various") + "." : "";
      const extras_tests = (satScore||actScore) ? " SAT=" + (satScore||"N/A") + " ACT=" + (actScore||"N/A") + "." : "";

      const regionContext = isUSStudent
        ? "DOMESTIC US student from " + province + ": treat as domestic applicant. Use domestic admission rates. Full FAFSA, merit scholarships, and need-based aid eligibility. No English proficiency test required. Common App applies normally."
        : studentOrigin==="canada"
        ? "CANADIAN international student from " + province + ": grading system is " + (gs.scale||"percentage") + ". No IELTS/TOEFL required for most schools as Canada is English-speaking (except Quebec French programs). Eligible for limited merit aid but NOT federal US aid. F-1 visa required. Strong passport, straightforward visa process."
        : "INTERNATIONAL student from " + province + ": grading system is " + (gs.scale||"percentage") + ". " +
          (province==="China" ? "GaoKao score context important. IELTS 6.5-7.5 or TOEFL 90-100 typically required. F-1 visa required. High competition from Chinese applicants at elite schools." :
           province==="India" ? "CBSE/ICSE percentage context important. IELTS 6.5+ or TOEFL 90+ typically required. F-1 visa required. Strong STEM applicant pool from India." :
           province==="United Kingdom" ? "A-Level grades context important. No IELTS/TOEFL required (native English). F-1 visa required. UK A-levels highly respected by US universities." :
           province==="South Korea" ? "Suneung context important. IELTS 6.5+ or TOEFL 90+ typically required. F-1 visa required." :
           province==="Germany" ? "Abitur context important. IELTS 6.5+ or TOEFL 90+ typically required. F-1 visa required. Strong academic reputation." :
           province==="France" ? "Baccalauréat context. IELTS 6.5+ or TOEFL 90+ typically required. F-1 visa required." :
           province==="Australia" || province==="New Zealand" ? "Native English — no IELTS/TOEFL required at most schools. F-1 visa required." :
           province==="Nigeria" || province==="Ghana" || province==="Kenya" ? "WAEC/NECO grades important. IELTS 6.5+ or TOEFL 90+ may be required. F-1 visa required. Financial documentation critical for visa." :
           province==="Singapore" || province==="Hong Kong" ? "English proficiency strong — TOEFL/IELTS may be waived. F-1 visa required." :
           "IELTS 6.5+ or TOEFL 90+ typically required. F-1 visa required. Financial documentation needed.") +
          " NOT eligible for US federal financial aid. Limited merit scholarships available. Factor in full cost of attendance (~$55,000-$85,000/yr at private schools).";

      const prompt =
        "You are a US university admissions expert. " +
        "STUDENT CONTEXT: " + regionContext + " " +
        "Academic profile: cumulative average " + cumAvg +
        " (" + (gs.scale||"percentage") + "), major: " + intendedMajor + "." +
        extras_tests + extras_ib + extras_ap +
        " ECs: " + (extras||"none") + ". Awards: " + (awards||"none") + "." +
        (prevSchools.length > 0 ? " IMPORTANT: Do NOT recommend any of these schools that were already shown: " + prevSchools.join(", ") + ". Suggest completely different schools." : "") +
        (isSr ? " Applying this cycle." : " " + hsInfo.yearsOut + " years before applying.") +
        extras_pg + "\n\n" +
        "Recommend 4 " + tierDef + ". In the 'note' field for each school, include region-specific advice: visa requirements, English test requirements if applicable, financial aid availability, and any specific considerations for a student from " + province + ".\n\n" +
        "Respond with ONLY a JSON object, no markdown, no explanation. Use this structure:\n" +
        (tier==="reach" ? '{"gpaEquivalent":"3.9/4.0 US GPA equivalent","profileSummary":"2 sentence profile assessment","' + tier + '":[' : '{"'  + tier + '":[') +
        '{"name":"","location":"City, ST","acceptRate":"","intlFriendly":"","tuition":"","note":"","targetProgram":{"name":"","admRate":"","degree":"","notes":""}},' +
        '{"name":"","location":"","acceptRate":"","intlFriendly":"","tuition":"","note":"","targetProgram":{"name":"","admRate":"","degree":"","notes":""}},' +
        '{"name":"","location":"","acceptRate":"","intlFriendly":"","tuition":"","note":"","targetProgram":{"name":"","admRate":"","degree":"","notes":""}},' +
        '{"name":"","location":"","acceptRate":"","intlFriendly":"","tuition":"","note":"","targetProgram":{"name":"","admRate":"","degree":"","notes":""}}' +
        ']}' ;

      const r = await fetch("/api/claude", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:2500,
          messages:[{role:"user", content:prompt}]
        })
      });
      const j = await r.json();
      if (j.error) throw new Error(j.error.message||"API error");
      const raw = (j.content||[]).map(b=>b.text||"").join("").trim();
      // Strip markdown fences if present
      const cleaned = raw.split(String.fromCharCode(96,96,96)+"json").join("").split(String.fromCharCode(96,96,96)).join("").trim();
      // Find first { to last } 
      const first = cleaned.indexOf("{");
      const last = cleaned.lastIndexOf("}");
      if (first===-1 || last===-1) throw new Error("No JSON returned for "+tier);
      return JSON.parse(cleaned.slice(first, last+1));
    }

    // Show results page immediately with loading skeleton, populate tiers as they arrive
    const prevSchools = results ? [...(results.reach||[]), ...(results.target||[]), ...(results.safety||[])].map(s=>s.name) : []; setResults({reach:[], target:[], safety:[], _loading:true});
    setActiveTab("reach");
    setPage("results");

    try {
      const tiers = ["reach","target","safety"];
      await Promise.all(tiers.map(tier =>
        fetchTier(tier).then(data => {
          setResults(prev => Object.assign({}, prev, {[tier]: data[tier]||[], gpaEquivalent:(prev&&prev.gpaEquivalent)||data.gpaEquivalent||"", profileSummary:(prev&&prev.profileSummary)||data.profileSummary||""}));
        }).catch(err => {
          console.warn(tier + " failed:", err.message);
          setResults(prev => prev ? Object.assign({}, prev, {[tier+"Error"]: err.message}) : null);
        })
      ));
    } catch(e) {
      console.error("Generate error:", e);
    } finally {
      setResults(prev => prev ? Object.assign({}, prev, {_loading:false}) : null);
      setLoading(false);
    }
  }

  if (compareTarget) {
    return <ComparePage schoolA={compareTarget[0].school} schoolB={compareTarget[1].school} catA={compareTarget[0].category} catB={compareTarget[1].category} profile={profile} onBack={()=>setCompareTarget(null)}/>;
  }
  if (analysisTarget) {
    return <AnalysisPage school={analysisTarget.school} category={analysisTarget.category} profile={profile} onBack={()=>setAnalysisTarget(null)}/>;
  }

  const inp = {width:"100%",background:"#0a0a0a",border:"1px solid rgba(192,48,42,0.35)",borderRadius:"10px",color:"#f0f0f0",padding:"11px 14px",fontSize:"14px",outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
  const hsInfo = HS_YEARS.find(y=>y.value===hsYear);
  const hasIBAP = profile.programs && (profile.programs.ib || profile.programs.ap);

  // -- RESULTS PAGE ----------------------------------------------------------
  if (page === "results" && results) {
    return (
      <div style={{minHeight:"100vh",background:"#080808",backgroundImage:"radial-gradient(ellipse at 8% 5%,rgba(139,26,26,0.08) 0%,transparent 40%),radial-gradient(ellipse at 92% 95%,rgba(201,168,76,0.04) 0%,transparent 60%)",fontFamily:"sans-serif",color:"#d0d0d8"}}>

        <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,900;1,6..96,400;1,6..96,900&family=DM+Serif+Display:ital@0;1&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
        <div style={{borderBottom:"1px solid rgba(201,168,76,0.20)",padding:"16px 28px",display:"flex",flexDirection:"row",alignItems:"center",justifyContent:"space-between",gap:"12px",flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:"14px",minWidth:0,flex:1}}>
            <button onClick={resetToForm} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.13)",color:"#d0d0d8",borderRadius:"9px",padding:"7px 14px",cursor:"pointer",fontSize:"12px",fontFamily:"'Montserrat',sans-serif",flexShrink:0,display:"flex",alignItems:"center",gap:"6px"}}>
              &#8592; Edit Profile
            </button>
            <button onClick={()=>{setResults(null);setCompareList([]);setCompareTarget(null);setAnalysisTarget(null);generate();}} disabled={loading} style={{background:loading?"rgba(139,26,26,0.30)":"linear-gradient(135deg,#8b1a1a,#c0302a)",border:"1px solid rgba(201,168,76,0.50)",color:loading?"#888":"#f0f0f0",borderRadius:"9px",padding:"9px 20px",boxShadow:loading?"none":"0 0 12px rgba(192,48,42,0.30)",cursor:loading?"not-allowed":"pointer",fontSize:"12px",fontFamily:"'Montserrat',sans-serif",fontWeight:"600",letterSpacing:"0.08em",flexShrink:0,display:"flex",alignItems:"center",gap:"6px",transition:"opacity 0.2s"}}>
              {loading ? "⟳  Regenerating..." : "↻  Regenerate"}
            </button>
            <div style={{minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{fontSize:"18px"}}></span>

    setSubmitting(true);
    try {

        method: "POST",
        headers: {"Content-Type":"application/json"},

    setSubmitting(false);
    setSubmitted(true);

        </div>
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"16px",padding:"28px",marginBottom:"32px"}}>
          <div style={{color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.15em",marginBottom:"16px"}}>SHARE YOUR FEEDBACK</div>
          {submitted ? (
            <div style={{textAlign:"center",padding:"20px"}}>
              <div style={{fontSize:"28px",marginBottom:"8px"}}>🎓</div>
              <div style={{color:"#5aba6a",fontFamily:"'Montserrat',sans-serif",fontSize:"13px",fontWeight:"700",marginBottom:"4px"}}>Thank you!</div>
              <div style={{color:"#9898a8",fontSize:"12px"}}>Your feedback helps us improve FYPU for students everywhere.</div>
            </div>
          ) : (
            <div>
              <div style={{display:"flex",gap:"8px",marginBottom:"14px",flexWrap:"wrap"}}>
                {[{key:"general",label:"💡 General"},{key:"bug",label:"👋 Connect with Founder"},{key:"feature",label:"✨ Feature Request"},{key:"accuracy",label:"🎯 Accuracy"}].map(t=>(
                  <button key={t.key} onClick={()=>setFeedbackType(t.key)} style={{padding:"6px 14px",borderRadius:"8px",cursor:"pointer",border:"1px solid "+(feedbackType===t.key?"rgba(201,168,76,0.5)":"rgba(255,255,255,0.08)"),background:feedbackType===t.key?"rgba(201,168,76,0.1)":"transparent",color:feedbackType===t.key?"#c9a84c":"#9898a8",fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"600"}}>
                    {t.label}
                  </button>
                ))}
              </div>
              <textarea value={feedback} onChange={e=>setFeedback(e.target.value)} placeholder="Tell us what you think, what's missing, or what could be better..." rows={4} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"10px",padding:"12px 14px",color:"#f0f0f0",fontSize:"13px",fontFamily:"'Montserrat',sans-serif",resize:"vertical",outline:"none",boxSizing:"border-box",marginBottom:"12px"}}/>
              <button onClick={submitFeedback} disabled={submitting||!feedback.trim()} style={{padding:"10px 24px",borderRadius:"10px",cursor:feedback.trim()?"pointer":"not-allowed",border:"none",background:feedback.trim()?"linear-gradient(135deg,#c9a84c,#e8c96a)":"rgba(255,255,255,0.05)",color:feedback.trim()?"#080808":"#555",fontFamily:"'Montserrat',sans-serif",fontSize:"12px",fontWeight:"700",letterSpacing:"0.08em"}}>
                {submitting ? "SENDING..." : "SEND FEEDBACK"}
              </button>
            </div>
          )}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px"}}>
          <div style={{color:"#444",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>© 2025 FYPU · fypuhere.com</div>
          <div style={{color:"#444",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>Built for students, by students 🎓</div>
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
<script defer src="/_vercel/insights/script.js"></script> </body>
