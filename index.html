function getGradSuggestions(major) {
  const keys = MAJOR_TO_GRAD_PATHS[major] || ["grad","mba","law"];
  return keys.map(k => POST_GRAD_PATHS.find(p => p.key === k)).filter(Boolean);
}

function detectPostGradPath(major) {
  if (!major) return null;
  const suggestions = getGradSuggestions(major);
  return suggestions[0] || POST_GRAD_PATHS.find(p => p.key === "grad");
}

// ─── getLink: 4-tier lookup with guaranteed working fallback ─────────────────
function getLink(name, applyUrl) {
  const nameLow = (name||"").toLowerCase();

  // Helper: build a reliable Google search that always works
  function googleFallback(schoolName) {
    // "apply [school name]" as a Google search — user sees actual apply page as first result
    return "https://www.google.com/search?q=" + encodeURIComponent("apply " + schoolName + " undergraduate admissions");
  }

  // 1. Check AI-provided URL — but only trust it if it looks like a real path (not just a root domain)
  //    e.g. reject "https://hofstra.edu" but accept "https://admissions.hofstra.edu/apply"
  if (applyUrl && applyUrl.startsWith("http")) {
    try {
      const u = new URL(applyUrl);
      // Must have a path beyond just "/" and the domain must be .edu or .ca
      if ((u.hostname.endsWith(".edu") || u.hostname.endsWith(".ca")) && u.pathname.length > 2) {
        return applyUrl;
      }
    } catch(e) {}
  }

  // 2. Exact match in our hardcoded LINKS map
  if (LINKS[name]) return LINKS[name];

  // 3. Partial name match in LINKS
  for (const [k,v] of Object.entries(LINKS)) {
    if (nameLow.includes(k.toLowerCase()) || k.toLowerCase().includes(nameLow)) return v;
  }

  // 4. We know the domain — build a Google search scoped to that domain
  //    This guarantees the user lands on the right school's site
  if (DOMAINS[name]) {
    return "https://www.google.com/search?q=" + encodeURIComponent("apply undergraduate admissions") + "&as_sitesearch=" + DOMAINS[name];
  }
  for (const [k,v] of Object.entries(DOMAINS)) {
    if (nameLow.includes(k.toLowerCase()) || k.toLowerCase().includes(nameLow)) {
      return "https://www.google.com/search?q=" + encodeURIComponent("apply undergraduate admissions") + "&as_sitesearch=" + v;
    }
  }

  // 5. True fallback — Google search for the school by name, always works
  return googleFallback(name);
}

function Dial({score, color}) {
  const r=28, circ=2*Math.PI*r, dash=(score/10)*circ;
  return (
    <svg width="70" height="70" viewBox="0 0 70 70">
      <circle cx="35" cy="35" r={r} fill="none" stroke="rgba(139,26,26,0.10)" strokeWidth="5"/>
      <circle cx="35" cy="35" r={r} fill="none" stroke={color} strokeWidth="5"
        strokeDasharray={dash+" "+(circ-dash)} strokeLinecap="round" transform="rotate(-90 35 35)"/>
      <text x="35" y="40" textAnchor="middle" fill={color} fontSize="16" fontWeight="700" fontFamily="monospace">{score}</text>
    </svg>
  );
}

function CBar({label, valA, valB, nameA, nameB, cA, cB, higher}) {
  const parse = v => parseFloat(String(v).replace(/[^0-9.]/g,""))||0;
  const a=parse(valA), b=parse(valB), mx=Math.max(a,b)||1;
  const hasA = a > 0, hasB = b > 0;
  if (!hasA && !hasB) return null;
  const win = higher!==false ? (a>=b?"A":"B") : (a<=b?"A":"B");
  return (
    <div style={{marginBottom:"18px"}}>
      <div style={{color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",marginBottom:"8px"}}>{label}</div>
      {[{n:nameA,v:a,raw:valA,c:cA,s:"A"},{n:nameB,v:b,raw:valB,c:cB,s:"B"}].map(x=>(
        <div key={x.s} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}>
          <div style={{width:"100px",fontSize:"10px",color:"#9898a8",fontFamily:"'Montserrat',sans-serif",textAlign:"right",flexShrink:0}}>{x.n.split(" ").slice(0,2).join(" ")}</div>
          <div style={{flex:1,background:"rgba(255,255,255,0.04)",borderRadius:"4px",height:"24px",overflow:"hidden"}}>
            <div style={{width:Math.max((x.v/mx)*100,8)+"%",height:"100%",background:x.c+(win===x.s?"":"88"),borderRadius:"4px",display:"flex",alignItems:"center",paddingLeft:"8px",minWidth:"30px"}}>
              <span style={{color:"#080808",fontSize:"10px",fontWeight:"700",fontFamily:"'Montserrat',sans-serif",whiteSpace:"nowrap"}}>{x.raw}</span>
            </div>
          </div>
          {win===x.s && <span style={{color:x.c,fontSize:"14px"}}>&#10003;</span>}
        </div>
      ))}
    </div>
  );
}

    {label:"Education & Social Work", options:["Education","Social Work","Counselling Psychology"]},
    {label:"Other", options:["Undecided / Exploring","Other (not listed)"]},
  ];
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(()=>{
    function handle(e){ if(ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", handle);
    return ()=>document.removeEventListener("mousedown", handle);
  },[]);
  return (
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>setOpen(!open)} style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(107,159,228,0.20)",borderRadius:"10px",padding:"11px 14px",color:value?"#f0f0f0":"#9898a8",fontSize:"13px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",userSelect:"none",boxSizing:"border-box"}}>
        <span>{value||"Select your intended major..."}</span>
        <span style={{color:"#9898a8",fontSize:"10px",marginLeft:"8px"}}>{open?"▲":"▼"}</span>
      </div>
      {open && (
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:500,background:"#0c0c0c",border:"1px solid rgba(255,255,255,0.15)",borderRadius:"10px",maxHeight:"320px",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.6)"}}>

              {g.options.map(opt=>(
                <div key={opt} onClick={()=>{onChange(opt);setOpen(false);}} style={{padding:"9px 14px 9px 22px",color:value===opt?"#f15177":"#d0d0d8",fontSize:"13px",cursor:"pointer",background:value===opt?"rgba(139,26,26,0.10)":"transparent",transition:"background 0.12s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.04)"}
                  onMouseLeave={e=>e.currentTarget.style.background=value===opt?"rgba(139,26,26,0.10)":"transparent"}>
                  {opt}
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AnalysisPage({school, category, profile, onBack}) {
  const [data,setData]           = useState(null);
  const [busy,setBusy]           = useState(true);
  const [tab,setTab]             = useState("risk");
  const [forumBusy,setForumBusy] = useState(false);
  const [forumData,setForumData] = useState(null);
  const cfg = CAT[category];

  const hsYear     = profile.hsYear || "grade12";
  const isSenior   = hsYear === "grade12";
  const isJunior   = hsYear === "grade11";
  const isEarly    = hsYear === "grade9" || hsYear === "grade10";
  const yearsOut   = (HS_YEARS.find(y=>y.value===hsYear)||{}).yearsOut || 0;
  const isPostGrad = !!(profile.postGrad);
  const pgPath     = isPostGrad ? (POST_GRAD_PATHS.find(p=>p.key===profile.pgPathKey)||detectPostGradPath(profile.intendedMajor)) : null;

  useEffect(()=>{ runAnalysis(); },[]);

  async function runAnalysis() {
    const gs = GRADE_SYSTEMS[profile.province] || {};
    const isUSStudent = profile.studentOrigin === "us";
    const visaNote = isUSStudent ? "Domestic US student, no visa required." :
      profile.studentOrigin==="canada" ? "Canadian student, F-1 visa required, no English test needed." :
      profile.province==="United Kingdom" || profile.province==="Australia" || profile.province==="New Zealand" || profile.province==="Singapore" || profile.province==="Hong Kong"
        ? "English-speaking country, TOEFL/IELTS may be waived. F-1 visa required." :
      "IELTS 6.5+ or TOEFL 90+ required. F-1 visa required. Financial proof needed.";
    const ctx =
      "Current date: " + new Date().toLocaleDateString('en-US', {month:'long', year:'numeric'}) + ". " +
      (isUSStudent ? "Domestic US student" : "International student from " + profile.province) +
      ": location=" + profile.province + ", avg=" + profile.cumAvg + " (" + (gs.scale||"") + "), " +
      "SAT=" + (profile.satScore||"N/A") + ", ACT=" + (profile.actScore||"N/A") + ", " +
      "major=" + profile.intendedMajor + ", year=" + hsYear +
      (profile.programs&&profile.programs.ib ? ", IB predicted="+profile.ibScore+"/45" : "") +
      (profile.programs&&profile.programs.ap ? ", AP: "+profile.apCourses : "") +
      ", ECs=" + (profile.extras||"none") + ", awards=" + (profile.awards||"none") + ". " +
      visaNote + " " +
      "School: " + school.name + " (" + category + ", accept=" + school.acceptRate + "). " +
      "Program: " + ((school.targetProgram||{}).name||profile.intendedMajor) + " (" + ((school.targetProgram||{}).admRate||"?") + "). " +
      "Tailor ALL advice specifically for a student from " + profile.province + " including visa steps, English test requirements, financial aid eligibility, and credential evaluation if needed.";

    async function callAPI(promptText, maxTok) {
      for (let t = 1; t <= 2; t++) {
        try {
          const r = await fetch("/api/claude", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:maxTok,
              messages:[{role:"user",content:promptText}]})
          });
          const j = await r.json();
          if (j.error) throw new Error(j.error.message);
          const raw = (j.content||[]).map(b=>b.text||"").join("").split(String.fromCharCode(96,96,96)+"json").join("").split(String.fromCharCode(96,96,96)).join("").trim();
          let best2 = null; let d2=0, s2=-1;
          for (let i=0;i<raw.length;i++) {
            if(raw[i]==="{"){if(d2===0)s2=i;d2++;}
            else if(raw[i]==="}"){d2--;if(d2===0&&s2!==-1){try{best2=JSON.parse(raw.slice(s2,i+1));break;}catch(e3){s2=-1;}}}
          }
          if (!best2) throw new Error("no JSON");
          return best2;
        } catch(err) {
          if (t===2) throw err;
          await new Promise(r=>setTimeout(r,600));
        }
      }
    }

    const p1 = ctx +
      "Return ONLY JSON, no markdown: " +
      '{"riskAnalysis":{"admissionTrend":{"rateIn2019":"","rateIn2024":"","absoluteChange":"","direction":"","intlSpecificRate":"","commentary":""},' +
      '"gapAnalysis":{"studentGPA":"","median50thGPA":"","medianGapPoints":"","sat25th":"","sat75th":"","studentSATStatus":"","satGapPoints":"","commentary":""},' +
      '"volatilityScore":{"score":0,"label":"","yearOverYearSwing":"","mostVolatileYear":"","causeOfVolatility":"","implication":""},' +
      '"internationalPenalty":{"domesticRate":"","internationalRate":"","penaltyFactor":"","canadianSpecific":"","financialAidRisk":""},' +
      '"supplementalWeight":{"essayCount":0,"totalWordCount":0,"weightPercentage":"","recommendedHours":0,"hoursBreakdown":"","specificPrompts":["",""],"riskIfWeak":""}},' +
      '"weaknessIdentification":{"overallRisk":"","primaryWeakness":{"factor":"","severity":"","specificData":"","impact":""},' +
      '"secondaryWeakness":{"factor":"","severity":"","specificData":"","impact":""},' +
      '"hiddenRisk":{"factor":"","explanation":""},"strengths":["","",""]}}';

    const p2 = ctx +
      (isSenior ? "Grade 12: omit SAT retakes, only test-optional advice. " : "Year "+hsYear+": include SAT strategy. ") +
      "Return ONLY JSON, no markdown: " +
      '{"optimizationAdvice":{"highestROIAction":{"action":"","expectedImpact":"","timeRequired":"","howTo":""},' +
      '"satStrategy":{"currentSAT":"' + (profile.satScore||"N/A") + '","currentACT":"' + (profile.actScore||"N/A") + '","targetScore":"","pointsNeeded":"","weeklyHours":0,"weeksNeeded":0,"resources":["",""],"testOptionalAdvice":"","seniorNote":"' + (isSenior?"SENIOR: test-optional":"") + '"},' +
      '"essayStrategy":{"topicSuggestions":["",""],"wordsBySection":{"whyUs":250,"mainEssay":650},"differentiationAdvice":""},' +
      '"ecGapFill":{"missingElement":"","specificSuggestion":"","leadTime":"' + (isSenior?"immediate":"6-18 months") + '"}},' +
      '"timelinePlanning":{"applicationDeadline":"","earlyOptionAvailable":true,"earlyDeadline":"","earlyAdvantage":"","milestones":[{"date":"","task":"","hoursRequired":0,"priority":"Critical"},{"date":"","task":"","hoursRequired":0,"priority":"High"},{"date":"","task":"","hoursRequired":0,"priority":"High"},{"date":"","task":"","hoursRequired":0,"priority":"Critical"},{"date":"","task":"","hoursRequired":0,"priority":"Medium"}],"totalHoursEstimate":0,"criticalWarning":"","yearSpecificNote":""}}';

    const p3 = isPostGrad && pgPath
      ? ctx + "Student plans " + pgPath.label + " (" + pgPath.abbr + ") after this degree.\n" +
        "Expert post-grad admissions advisor. For " + school.name + " → " + pgPath.label + ": " +
        "List specific target employers/firms/programs this school feeds (e.g. Goldman Sachs, McKinsey, Harvard Med). " +
        "Give accept rate from this school vs national avg. List top 3 feeder destinations. " +
        "State GPA + " + pgPath.testLabel + " benchmarks. Note on-campus recruiting. " +
        "Return ONLY JSON: " +
        '{"postGradAnalysis":{' +
        '"pathLabel":"' + pgPath.label + '",' +
        '"feederStrength":"Strong|Moderate|Weak",' +
        '"feederGradPrograms":["list top grad schools that recruit here for this path — empty array if none"],' +
        '"feederEmployers":["list top employers that target-recruit from this undergrad for this path — empty array if none"],' +
        '"postGradAcceptRate":"X% from this school (vs Y% national avg)",' +
        '"gpaRequirement":"e.g. 3.7+ to be competitive",' +
        '"testScoreTarget":"e.g. 520+ MCAT or 170+ LSAT",' +
        '"oncampusRecruiting":"Specific recruiting programs, career fairs, or pipeline partnerships. Be specific or say None.",' +
        '"alumniNetworkStrength":"Specific alumni network strength for this path — name clubs, associations, or notable alumni if applicable.",' +
        '"undergradActions":["action 1","action 2","action 3"],' +
        '"timeline":"semester-by-semester prep timeline",' +
        '"keyRisk":"biggest risk factor for this specific student at this school",' +
        '"verdict":"2-sentence honest assessment of this school for reaching ' + pgPath.label + '"}}'
      : null;

    const p4 = !isPostGrad
      ? ctx + "For " + school.name + " undergrad (" + profile.intendedMajor + "): " +
        "Give: (1) top 6 employers that recruit from this school for this major (on-campus/target school), " +
        "(2) top 5 grad programs students here attend. Be specific, name real firms and programs. Return ONLY JSON: " +
        '{"targetAnalysis":{' +
        '"employerTargets":[{"name":"","type":"IB|Consulting|Tech|Finance|Law|Healthcare|Gov|Other","recruitingType":"On-Campus|Target|General","note":""}],' +
        '"gradSchoolTargets":[{"name":"","type":"MBA|Law|Med|PhD|MS|Other","placementRate":"","note":""}],' +
        '"targetSummary":""}}'
      : null;

    try {
      const calls = p3
        ? [callAPI(p1,2000), callAPI(p2,2000), callAPI(p3,2000)]
        : p4 ? [callAPI(p1,2000), callAPI(p2,2000), callAPI(p4,3000)] : [callAPI(p1,2000), callAPI(p2,2000)];

      const promises = calls.map((call, i) =>
        call.then(result => {
          setData(prev => Object.assign({}, prev||{}, result));
        })
      );
      await Promise.all(promises);
    } catch(e) {
      console.error("Analysis failed:", e);
      setData(prev => prev || null);
    } finally {
      setBusy(false);
    }
  }

  async function fetchForumQuestions() {
    if (forumData || forumBusy) return;
    setForumBusy(true);
    const schoolName = school.name;
    const program    = (school.targetProgram||{}).name || profile.intendedMajor;
    const prompt =
      "Based on your knowledge of college admissions, generate realistic applicant questions and insights about " + schoolName + " supplemental essays for " + program + ". " +
      "Look for Reddit (r/ApplyingToCollege, r/college), College Confidential, and other student forums. " +
      "Extract the 5 most commonly asked or discussed questions/concerns applicants have about writing " + schoolName + " supplemental essays. " +
      "Focus on specific questions like: what to write for the Why Us essay, how long, what topics to avoid, what worked, pitfalls. " +
      "Return ONLY valid JSON, no markdown: " +
      '{"schoolName":"' + schoolName + '","program":"' + program + '","forumQuestions":[{"question":"Exact question applicants ask","source":"Reddit r/ApplyingToCollege","insight":"1-2 sentence answer based on forum consensus","frequency":"Very Common"},{"question":"q2","source":"College Confidential","insight":"i2","frequency":"Common"},{"question":"q3","source":"Reddit","insight":"i3","frequency":"Common"},{"question":"q4","source":"Forum","insight":"i4","frequency":"Occasional"},{"question":"q5","source":"Forum","insight":"i5","frequency":"Occasional"}],"topTip":"The single most repeated piece of advice from successful applicants"}';

        body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:1500, messages:[{role:"user",content:prompt}]})

      let bestF=null;let dF=0,sF=-1;
      for(let i=0;i<txt.length;i++){
        if(txt[i]==="{"){if(dF===0)sF=i;dF++;}
        else if(txt[i]==="}"){dF--;if(dF===0&&sF!==-1){try{bestF=JSON.parse(txt.slice(sF,i+1));break;}catch(eF){sF=-1;}}}
      }
      setForumData(bestF || {error:true});
    } catch(e) { setForumData({error:true}); }
    finally { setForumBusy(false); }

    : [{id:"risk",label:"Risk Analysis"},{id:"weakness",label:"Weaknesses"},{id:"optimize",label:"Optimize"},{id:"timeline",label:"Timeline"},{id:"targets",label:"Career Prospects"}];

  const hsYearInfo = HS_YEARS.find(y=>y.value===hsYear) || HS_YEARS[3];
  const yearBadgeCol = isSenior ? "#c9a84c" : isJunior ? "#e8c96a" : "#5aba6a";

  return (
    <div style={{position:"fixed",top:0,right:0,bottom:0,left:0,zIndex:1000,background:"#080808",overflowY:"auto",fontFamily:"sans-serif",color:"#d0d0d8"}}>
      <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,900;1,6..96,400;1,6..96,900&family=DM+Serif+Display:ital@0;1&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
      <div style={{position:"sticky",top:0,zIndex:10,background:"rgba(8,8,8,0.97)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(107,159,228,0.18)",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"12px",minWidth:0}}>
          <button onClick={onBack} style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(107,159,228,0.22)",color:"#d0d0d8",borderRadius:"8px",padding:"7px 14px",cursor:"pointer",fontSize:"12px",fontFamily:"'Montserrat',sans-serif",flexShrink:0}}>Back</button>
          <div style={{minWidth:0}}>
            <div style={{color:"#f0f0f0",fontFamily:"'DM Serif Display',serif",fontSize:"15px",fontWeight:"700",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{school.name}</div>

              <span style={{background:"#101010",border:"1px solid "+cfg.border,color:cfg.color,fontSize:"9px",fontFamily:"'Montserrat',sans-serif",padding:"2px 7px",borderRadius:"4px"}}>{cfg.label}</span>
              <span style={{background:yearBadgeCol+"22",border:"1px solid "+yearBadgeCol+"55",color:yearBadgeCol,fontSize:"9px",fontFamily:"'Montserrat',sans-serif",padding:"2px 7px",borderRadius:"4px"}}>{hsYearInfo.label} - {hsYearInfo.tag}</span>
              {school.targetProgram && <span style={{color:"#c9a84c",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>{school.targetProgram.name} - {school.targetProgram.admRate}</span>}
            </div>
          </div>
        </div>
        <a href={getLink(school.name, school.applyUrl)} target="_blank" rel="noopener noreferrer" style={{background:cfg.color,color:"#080808",padding:"8px 16px",borderRadius:"8px",fontSize:"11px",fontWeight:"700",textDecoration:"none",fontFamily:"'Montserrat',sans-serif",flexShrink:0}}>APPLY</a>
      </div>

        <div style={{background:"rgba(255,159,67,0.10)",borderBottom:"1px solid rgba(255,159,67,0.25)",padding:"10px 24px",display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{color:"#c9a84c",fontSize:"13px"}}>&#9888;</span>

          <span style={{color:"#5aba6a",fontSize:"13px"}}>&#10024;</span>
          <span style={{color:"#5aba6a",fontSize:"12px",fontFamily:"'Montserrat',sans-serif"}}>{hsYearInfo.label.toUpperCase()} - You have {yearsOut} years. All long-term strategies and full prep timelines apply.</span>

              <DCard>

                  </div>
                  <div style={{flex:1}}>
                    <div style={{marginBottom:"8px"}}>
                      <Tag c="#705858">Avg swing: {data.riskAnalysis.volatilityScore.yearOverYearSwing}</Tag>
                      <Tag c="#c9a84c">Worst: {data.riskAnalysis.volatilityScore.mostVolatileYear}</Tag>
                    </div>
                    <p style={{color:"#9898a8",fontSize:"12px",margin:"4px 0"}}><strong style={{color:"#d0d0d8"}}>Cause: </strong>{data.riskAnalysis.volatilityScore.causeOfVolatility}</p>

              <DCard>
                {profile.studentOrigin==="us" ? (

                    </div>
                    <p style={{color:"#9898a8",fontSize:"12px",margin:0}}><strong style={{color:"#d0d0d8"}}>Financial Aid: </strong>{data.riskAnalysis.internationalPenalty.financialAidRisk}</p>

                ) : (
                  <>
                    <CLabel>INTERNATIONAL PENALTY<InfoTip text="Most US universities admit international students at a much lower rate than domestic students."/></CLabel>

                      <SBox label="Domestic" value={data.riskAnalysis.internationalPenalty.domesticRate} color="#5aba6a"/>
                      <SBox label="Intl Rate" value={data.riskAnalysis.internationalPenalty.internationalRate} color="#c0302a"/>

                    </div>
                    <div style={{background:"rgba(139,156,244,0.08)",border:"1px solid rgba(139,156,244,0.25)",borderRadius:"8px",padding:"10px 12px",marginBottom:"8px"}}>
                      <div style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"3px"}}>INTERNATIONAL NOTE</div>
                      <div style={{color:"#d0d0d8",fontSize:"12px"}}>{data.riskAnalysis.internationalPenalty.canadianSpecific}</div>
                    </div>
                    <p style={{color:"#9898a8",fontSize:"12px",margin:0}}><strong style={{color:"#d0d0d8"}}>Financial Aid: </strong>{data.riskAnalysis.internationalPenalty.financialAidRisk}</p>
                  </>
                )}
              </DCard>
              <DCard>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px"}}>

                  <button onClick={fetchForumQuestions} disabled={forumBusy||!!forumData} style={{background:forumData?"rgba(139,156,244,0.1)":"rgba(201,168,76,0.07)",border:"1px solid "+(forumData?"rgba(139,156,244,0.3)":"rgba(201,168,76,0.18)"),color:forumData?"#c9a84c":"#f15177",borderRadius:"7px",padding:"5px 11px",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",cursor:forumBusy||forumData?"default":"pointer",fontWeight:"700",display:"flex",alignItems:"center",gap:"5px",flexShrink:0}}>
                    {forumBusy ? (<><span style={{display:"inline-block",animation:"nbspin 0.8s linear infinite"}}>o</span> Searching...</>) : forumData ? (<>{forumData.error ? "Retry" : "&#x1F4AC; Loaded"}</>) : (<>&#x1F50D; Browse Forums</>)}
                  </button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"12px"}}>
                  <SBox label="Essays" value={data.riskAnalysis.supplementalWeight.essayCount} color={cfg.color}/>
                  <SBox label="Total Words" value={data.riskAnalysis.supplementalWeight.totalWordCount} color={cfg.color}/>
                  <SBox label="Review Weight" value={data.riskAnalysis.supplementalWeight.weightPercentage} color={cfg.color}/>
                </div>
                <div style={{background:"#101010",border:"1px solid "+cfg.border,borderRadius:"10px",padding:"12px",marginBottom:"10px"}}>
                  <div style={{color:cfg.color,fontSize:"12px",fontWeight:"700",fontFamily:"'Montserrat',sans-serif",marginBottom:"4px"}}>INVEST {data.riskAnalysis.supplementalWeight.recommendedHours} HOURS</div>
                  <div style={{color:"#705858",fontSize:"12px"}}>{data.riskAnalysis.supplementalWeight.hoursBreakdown}</div>
                </div>
                <p style={{color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",marginBottom:"8px",letterSpacing:"0.08em"}}>KNOWN PROMPTS</p>
                {(data.riskAnalysis.supplementalWeight.specificPrompts||[]).map((p,i)=>(
                  <div key={i} style={{display:"flex",gap:"8px",marginBottom:"6px"}}>
                    <span style={{color:cfg.color,flexShrink:0}}>&#9658;</span>
                    <span style={{color:"#705858",fontSize:"12px"}}>{p}</span>
                  </div>
                ))}
                <div style={{background:"rgba(139,26,26,0.12)",border:"1px solid rgba(255,107,107,0.28)",borderRadius:"8px",padding:"10px 12px",marginTop:"10px"}}>
                  <span style={{color:"#c0302a",fontSize:"11px"}}>Warning: {data.riskAnalysis.supplementalWeight.riskIfWeak}</span>
                </div>
                {forumBusy && (
                  <div style={{marginTop:"16px",background:"rgba(139,26,26,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"10px",padding:"16px",textAlign:"center"}}>
                    <div style={{width:"28px",height:"28px",border:"2px solid rgba(107,159,228,0.10)",borderTop:"2px solid #c0302a",borderRadius:"50%",animation:"nbspin 0.8s linear infinite",margin:"0 auto 8px"}}/>
                    <div style={{color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>Searching Reddit, College Confidential, and student forums...</div>
                  </div>
                )}
                {forumData && !forumData.error && (
                  <div style={{marginTop:"16px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
                      <div style={{flex:1,height:"1px",background:"rgba(201,168,76,0.10)"}}/>
                      <span style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",flexShrink:0}}>WHAT APPLICANTS ACTUALLY ASK</span>
                      <div style={{flex:1,height:"1px",background:"rgba(201,168,76,0.10)"}}/>
                    </div>
                    {(forumData.forumQuestions||[]).map((q,i)=>(
                      <div key={i} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(139,156,244,0.18)",borderRadius:"10px",padding:"13px 15px",marginBottom:"8px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px",marginBottom:"6px"}}>
                          <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"700",lineHeight:"1.4"}}>"{q.question}"</div>
                          <span style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(139,156,244,0.25)",color:"#c9a84c",borderRadius:"5px",padding:"2px 7px",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",whiteSpace:"nowrap",flexShrink:0}}>{q.frequency}</span>
                        </div>
                        <div style={{display:"flex",gap:"6px",alignItems:"flex-start"}}>
                          <span style={{color:"#c9a84c",fontSize:"11px",flexShrink:0,marginTop:"1px"}}>&#8594;</span>
                          <span style={{color:"#d0d0d8",fontSize:"12px",lineHeight:"1.5"}}>{q.insight}</span>
                        </div>
                        <div style={{color:"#705858",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginTop:"6px"}}>{q.source}</div>
                      </div>
                    ))}

                      <div style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(241,81,119,0.28)",borderRadius:"10px",padding:"13px 15px",marginTop:"4px"}}>
                        <div style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"5px"}}>TOP TIP FROM SUCCESSFUL APPLICANTS</div>
                        <div style={{color:"#f0f0f0",fontSize:"13px",lineHeight:"1.5",fontWeight:"600"}}>{forumData.topTip}</div>
                      </div>
                    )}
                  </div>
                )}
                {forumData && forumData.error && (
                  <div style={{marginTop:"12px",color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",textAlign:"center",padding:"10px"}}>Could not load forum data. Try again later.</div>
                )}
              </DCard>
            </div>
          )}

          {tab==="weakness" && data.weaknessIdentification && (
            <div>
              <h2 style={{fontFamily:"'Anton',sans-serif",fontSize:"28px",fontWeight:"400",letterSpacing:"0.05em",color:"#f0f0f0",margin:"0 0 4px"}}>Weakness Identification</h2>
              <p style={{color:"#9898a8",fontSize:"13px",margin:"0 0 16px"}}>Gaps vs {school.name} standards</p>
              <div style={{display:"inline-flex",alignItems:"center",gap:"12px",background:rCol(data.weaknessIdentification.overallRisk)+"15",border:"1px solid "+rCol(data.weaknessIdentification.overallRisk)+"40",borderRadius:"12px",padding:"12px 20px",marginBottom:"20px"}}>
                <div style={{width:"12px",height:"12px",borderRadius:"50%",background:rCol(data.weaknessIdentification.overallRisk),flexShrink:0}}/>
                <div>
                  <div style={{color:rCol(data.weaknessIdentification.overallRisk),fontWeight:"700",fontFamily:"'Montserrat',sans-serif",fontSize:"13px"}}>OVERALL RISK: {(data.weaknessIdentification.overallRisk||"").toUpperCase()}</div>
                  <div style={{color:"#9898a8",fontSize:"11px"}}>{(school.targetProgram||{}).name||profile.intendedMajor} at {school.name}</div>
                </div>
              </div>
              {[{d:data.weaknessIdentification.primaryWeakness,lbl:"PRIMARY WEAKNESS"},{d:data.weaknessIdentification.secondaryWeakness,lbl:"SECONDARY WEAKNESS"}].map((w,i)=>{
                const sc={High:"#c0302a",Medium:"#e8c96a",Low:"#5aba6a"}[(w.d||{}).severity]||"#705858";
                return (
                  <DCard key={i}>
                    <CLabel>{w.lbl}</CLabel>
                    <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
                      <div style={{background:sc+"18",border:"1px solid "+sc+"40",borderRadius:"8px",padding:"10px 12px",textAlign:"center",minWidth:"72px",flexShrink:0}}>
                        <div style={{color:sc,fontSize:"11px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700"}}>{(w.d||{}).severity}</div>
                        <div style={{color:"#9898a8",fontSize:"9px",marginTop:"2px"}}>SEVERITY</div>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{color:"#f0f0f0",fontSize:"14px",fontWeight:"600",marginBottom:"4px"}}>{(w.d||{}).factor}</div>
                        <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"700",marginBottom:"4px",fontFamily:"'Montserrat',sans-serif"}}>{(w.d||{}).specificData}</div>
                        <p style={{color:"#9898a8",fontSize:"12px",lineHeight:"1.7",margin:0}}>{(w.d||{}).impact}</p>
                      </div>
                    </div>
                  </DCard>
                );
              })}
              <DCard>
                <CLabel color="#c9a84c">HIDDEN RISK</CLabel>
                <div style={{color:"#f0f0f0",fontSize:"14px",fontWeight:"600",marginBottom:"4px"}}>{(data.weaknessIdentification.hiddenRisk||{}).factor}</div>
                <p style={{color:"#9898a8",fontSize:"12px",lineHeight:"1.7",margin:0}}>{(data.weaknessIdentification.hiddenRisk||{}).explanation}</p>
              </DCard>
              <DCard>
                <CLabel color="#5aba6a">YOUR COMPETITIVE STRENGTHS</CLabel>
                {(data.weaknessIdentification.strengths||[]).map((s,i)=>(
                  <div key={i} style={{display:"flex",gap:"8px",alignItems:"flex-start",marginBottom:"8px"}}>
                    <span style={{color:"#5aba6a",fontFamily:"'Montserrat',sans-serif",fontSize:"13px",flexShrink:0}}>&#10003;</span>
                    <span style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.5"}}>{s}</span>
                  </div>
                ))}
              </DCard>
            </div>
          )}

          {tab==="optimize" && data.optimizationAdvice && (
            <div>

                <div style={{color:"#f0f0f0",fontSize:"16px",fontWeight:"700",fontFamily:"'DM Serif Display',serif",marginBottom:"10px"}}>{(data.optimizationAdvice.highestROIAction||{}).action}</div>

                  <Tag c="#e8c96a">Impact: {(data.optimizationAdvice.highestROIAction||{}).expectedImpact}</Tag>

                </div>
                <p style={{color:"#9898a8",fontSize:"12px",lineHeight:"1.7",margin:0}}>{(data.optimizationAdvice.highestROIAction||{}).howTo}</p>
              </div>

                <CLabel>SAT STRATEGY<InfoTip text="SAT (0–1600) and ACT (1–36) standardized tests used by US universities."/></CLabel>
                {isSenior && (
                  <div style={{background:"rgba(255,159,67,0.10)",border:"1px solid rgba(255,159,67,0.28)",borderRadius:"8px",padding:"10px 14px",marginBottom:"12px",display:"flex",gap:"8px",alignItems:"center"}}>
                    <span style={{color:"#c9a84c",fontSize:"12px",flexShrink:0}}>&#9888;</span>
                    <span style={{color:"#c9a84c",fontSize:"12px"}}>Grade 12 - focus on test-optional strategy, not retakes.</span>
                  </div>
                )}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"12px"}}>
                  <SBox label="Current" value={(data.optimizationAdvice.satStrategy||{}).currentScore} color="#705858"/>
                  <SBox label="Target" value={(data.optimizationAdvice.satStrategy||{}).targetScore} color={isSenior?"#9898a8":cfg.color}/>
                  <SBox label="Gap" value={isSenior?"N/A":(data.optimizationAdvice.satStrategy||{}).pointsNeeded} color={isSenior?"#9898a8":"#c0302a"}/>
                </div>
                {!isSenior && ((data.optimizationAdvice.satStrategy||{}).resources||[]).map((r,i)=>(
                  <div key={i} style={{display:"flex",gap:"8px",marginBottom:"5px"}}>
                    <span style={{color:cfg.color,flexShrink:0}}>&#8594;</span>
                    <span style={{color:"#9898a8",fontSize:"12px"}}>{r}</span>
                  </div>
                ))}
                <div style={{background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"10px 12px",marginTop:"10px"}}>
                  <span style={{color:"#f0f0f0",fontSize:"12px",fontWeight:"600"}}>Test-Optional: </span>
                  <span style={{color:"#705858",fontSize:"12px"}}>{(data.optimizationAdvice.satStrategy||{}).testOptionalAdvice}</span>
                </div>
              </DCard>
              <DCard>
                <CLabel>ESSAY STRATEGY<InfoTip text="The 'Why Us' essay explains why you specifically want this school. The main Common App essay is your personal story."/></CLabel>

                  <div key={i} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(155,127,212,0.12)",borderRadius:"8px",padding:"10px 12px",marginBottom:"8px"}}>
                    <span style={{color:cfg.color,fontFamily:"'Montserrat',sans-serif",fontSize:"12px",marginRight:"8px"}}>#{i+1}</span>
                    <span style={{color:"#d0d0d8",fontSize:"13px"}}>{t}</span>
                  </div>

                  <Tag c="#705858">Why Us: ~{((data.optimizationAdvice.essayStrategy||{}).wordsBySection||{}).whyUs}w</Tag>
                  <Tag c="#705858">Main Essay: ~{((data.optimizationAdvice.essayStrategy||{}).wordsBySection||{}).mainEssay}w</Tag>

                <div style={{background:"rgba(139,26,26,0.08)",border:"1px solid rgba(139,156,244,0.22)",borderRadius:"8px",padding:"10px 12px"}}>

                  <div style={{color:"#d0d0d8",fontSize:"12px"}}>{(data.optimizationAdvice.essayStrategy||{}).differentiationAdvice}</div>
                </div>
              </DCard>
              <DCard>
                <CLabel>EXTRACURRICULAR GAP<InfoTip text="US admissions looks heavily at activities outside class."/></CLabel>
                <div style={{color:"#f0f0f0",fontSize:"14px",fontWeight:"600",marginBottom:"4px"}}>Missing: {(data.optimizationAdvice.ecGapFill||{}).missingElement}</div>
                <p style={{color:"#705858",fontSize:"13px",marginBottom:"10px"}}><strong style={{color:"#f0f0f0"}}>Action: </strong>{(data.optimizationAdvice.ecGapFill||{}).specificSuggestion}</p>
                <Tag c={isSenior?"#c9a84c":"#5aba6a"}>Start {(data.optimizationAdvice.ecGapFill||{}).leadTime} before application</Tag>
              </DCard>
            </div>
          )}

          {tab==="timeline" && data.timelinePlanning && (

              <div style={{background:yearBadgeCol+"12",border:"1px solid "+yearBadgeCol+"35",borderRadius:"10px",padding:"12px 16px",marginBottom:"16px",display:"flex",gap:"12px",alignItems:"flex-start"}}>
                <div style={{width:"8px",height:"8px",borderRadius:"50%",background:yearBadgeCol,flexShrink:0,marginTop:"4px"}}/>
                <div>
                  <div style={{color:yearBadgeCol,fontSize:"11px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700",marginBottom:"3px"}}>{hsYearInfo.label.toUpperCase()} - {hsYearInfo.tag.toUpperCase()}</div>
                  <div style={{color:yearBadgeCol+"cc",fontSize:"12px",lineHeight:"1.5"}}>
                    {isSenior && "You are applying this cycle. Milestones below focus on the next 3-6 months only."}

                    {hsYear==="grade9" && "You have ~4 years. Focus on exploration and passion now."}
                  </div>
                  {data.timelinePlanning.yearSpecificNote && <div style={{color:yearBadgeCol+"99",fontSize:"11px",marginTop:"6px",fontStyle:"italic"}}>{data.timelinePlanning.yearSpecificNote}</div>}

                  <div style={{color:"#f0f0f0",fontSize:"22px",fontFamily:"'DM Serif Display',serif",fontStyle:"italic"}}>{data.timelinePlanning.applicationDeadline}</div>

                {data.timelinePlanning.earlyOptionAvailable && (

                    <div style={{color:"#f0f0f0",fontSize:"22px",fontFamily:"'DM Serif Display',serif",fontStyle:"italic"}}>{data.timelinePlanning.earlyDeadline}</div>
                    <div style={{color:"#e8c96a",fontSize:"12px",marginTop:"4px"}}>{data.timelinePlanning.earlyAdvantage}</div>
                  </div>
                )}
              </div>
              <div style={{background:"#101010",border:"1px solid "+cfg.border,borderRadius:"12px",padding:"16px 20px",marginBottom:"16px",display:"flex",alignItems:"center",gap:"16px"}}>
                <div style={{color:cfg.color,fontSize:"38px",fontFamily:"'DM Serif Display',serif",fontStyle:"italic",flexShrink:0}}>{data.timelinePlanning.totalHoursEstimate}</div>
                <div>
                  <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"600"}}>Total hours for this application</div>
                  <div style={{color:"#9898a8",fontSize:"11px",marginTop:"2px"}}>Research, essays, forms, test prep</div>
                </div>
              </div>
              <DCard>
                <CLabel>MILESTONE ROADMAP<InfoTip text="Priority levels: Critical = must do, High = strongly recommended, Medium = nice to have."/></CLabel>
                <div style={{position:"relative",paddingLeft:"12px"}}>
                  <div style={{position:"absolute",left:"3px",top:"8px",bottom:"8px",width:"1px",background:"rgba(139,26,26,0.10)"}}/>
                  {(data.timelinePlanning.milestones||[]).map((m,i)=>(
                    <div key={i} style={{position:"relative",paddingLeft:"22px",marginBottom:"18px"}}>
                      <div style={{position:"absolute",left:"-5px",top:"5px",width:"9px",height:"9px",borderRadius:"50%",background:pCol(m.priority),boxShadow:"0 0 8px "+pCol(m.priority)+"60"}}/>
                      <div style={{display:"flex",justifyContent:"space-between",gap:"8px",flexWrap:"wrap"}}>
                        <div>
                          <div style={{color:"#705858",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"2px"}}>{m.date}</div>
                          <div style={{color:"#d0d0d8",fontSize:"13px",fontWeight:"500"}}>{m.task}</div>
                        </div>
                        <div style={{display:"flex",gap:"5px",flexShrink:0}}>
                          <Tag c="#9898a8">{m.hoursRequired}h</Tag>
                          <Tag c={pCol(m.priority)}>{m.priority}</Tag>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </DCard>
              <div style={{background:"rgba(139,26,26,0.12)",border:"1px solid rgba(255,107,107,0.30)",borderRadius:"12px",padding:"16px 20px"}}>
                <div style={{color:"#c0302a",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",letterSpacing:"0.1em",marginBottom:"8px"}}>CRITICAL WARNING</div>
                <div style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.65"}}>{data.timelinePlanning.criticalWarning}</div>
              </div>
            </div>
          )}

          {tab==="postgrad" && isPostGrad && data.postGradAnalysis && (()=>{
            const pg  = data.postGradAnalysis;
            const col = pgPath ? pgPath.color : "#f15177";
            const strengthCol = {Strong:"#5aba6a",Moderate:"#e8c96a",Weak:"#c0302a"}[pg.feederStrength]||"#705858";
            return (
              <div>
                <h2 style={{fontFamily:"'Anton',sans-serif",fontSize:"28px",fontWeight:"400",letterSpacing:"0.05em",color:"#f0f0f0",margin:"0 0 4px"}}>{pgPath?pgPath.label:"Post-Graduate"} Pathway</h2>
                <p style={{color:"#9898a8",fontSize:"13px",margin:"0 0 16px"}}>How <strong style={{color:"#c9a84c"}}>{school.name}</strong> positions you for <strong style={{color:pgPath?pgPath.color:"#c9a84c"}}>{pgPath?pgPath.abbr:"grad school"}</strong></p>
                <div style={{display:"flex",gap:"16px",alignItems:"flex-start",background:"linear-gradient(135deg,"+col+"14,"+col+"06)",border:"1px solid "+col+"40",borderRadius:"14px",padding:"16px 20px",marginBottom:"16px"}}>
                  <div style={{textAlign:"center",flexShrink:0}}>
                    <div style={{color:strengthCol,fontSize:"20px",fontWeight:"900",fontFamily:"'DM Serif Display',serif"}}>{pg.feederStrength||"?"}</div>
                    <div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginTop:"3px"}}>FEEDER STRENGTH</div>
                  </div>
                  <div style={{flex:1,minWidth:"180px"}}>
                    <div style={{color:col,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"4px"}}>{(pg.pathLabel||"POST-GRAD").toUpperCase()} PATHWAY</div>
                    <p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.6",margin:0}}>{pg.verdict}</p>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",marginBottom:"16px"}}>
                  <DCard><div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginBottom:"4px"}}>ADMIT RATE</div><div style={{color:"#f0f0f0",fontSize:"18px",fontWeight:"800",lineHeight:"1.2"}}>{pg.postGradAcceptRate||"N/A"}</div></DCard>
                  <DCard><div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginBottom:"4px"}}>GPA TARGET</div><div style={{color:col,fontSize:"22px",fontWeight:"800"}}>{pg.gpaRequirement||"N/A"}</div></DCard>
                  <DCard><div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif",marginBottom:"4px"}}>{pgPath?pgPath.testLabel:"TEST"} TARGET</div><div style={{color:col,fontSize:"16px",fontWeight:"800",lineHeight:"1.3"}}>{pg.testScoreTarget||"N/A"}</div></DCard>
                </div>
                <DCard>
                  <CLabel color={col}>ACTIONS TO STRENGTHEN YOUR {pgPath?pgPath.abbr:"POST-GRAD"} CANDIDACY</CLabel>
                  {(pg.undergradActions||[]).map((a,i)=>(
                    <div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",marginBottom:"10px",padding:"10px 12px",background:"rgba(255,255,255,0.03)",borderRadius:"8px"}}>
                      <div style={{background:col+"22",border:"1px solid "+col+"44",color:col,borderRadius:"50%",width:"22px",height:"22px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:"700",flexShrink:0}}>{i+1}</div>
                      <span style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.5"}}>{a}</span>
                    </div>
                  ))}
                </DCard>
                {pg.keyRisk && (
                  <div style={{background:"rgba(139,26,26,0.12)",border:"1px solid rgba(255,107,107,0.28)",borderRadius:"12px",padding:"14px 16px",marginTop:"16px"}}>
                    <div style={{color:"#c0302a",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"6px"}}>KEY RISK</div>
                    <p style={{color:"#f0f0f0",fontSize:"13px",lineHeight:"1.6",margin:0}}>{pg.keyRisk}</p>
                  </div>
                )}
              </div>
            );
          })()}

          {tab==="targets" && !isPostGrad && data.targetAnalysis && (()=>{
            const ta = data.targetAnalysis;
            return (
              <div>
                <h2 style={{fontFamily:"'Anton',sans-serif",fontSize:"28px",fontWeight:"400",letterSpacing:"0.05em",color:"#f0f0f0",margin:"0 0 4px"}}>Career &amp; Academic Targets</h2>
                <p style={{color:"#9898a8",fontSize:"13px",margin:"0 0 20px"}}>Where {school.name} students go — employers who recruit here and grad schools they attend.</p>
                {ta.targetSummary && (<div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(107,159,228,0.18)",borderRadius:"12px",padding:"14px 18px",marginBottom:"20px"}}><p style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.65",margin:0}}>{ta.targetSummary}</p></div>)}
                {(ta.employerTargets||[]).length > 0 && (
                  <div style={{background:"rgba(139,26,26,0.12)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"12px",padding:"16px 18px",marginBottom:"16px"}}>
                    <div style={{color:"#c9a84c",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700",letterSpacing:"0.10em",marginBottom:"14px"}}>EMPLOYER TARGETS</div>
                    <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                      {(ta.employerTargets||[]).map((e,i)=>(
                        <div key={i} style={{display:"flex",gap:"12px",alignItems:"flex-start",background:"rgba(139,26,26,0.12)",borderRadius:"8px",padding:"10px 12px"}}>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap",marginBottom:"3px"}}>
                              <span style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"700"}}>{e.name}</span>
                              <span style={{background:"rgba(192,48,42,0.35)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:"10px",padding:"2px 8px",color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>{e.type}</span>
                              <span style={{background:"rgba(255,255,255,0.04)",borderRadius:"10px",padding:"2px 8px",color:"#9898a8",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>{e.recruitingType}</span>
                            </div>
                            {e.note && <div style={{color:"#9898a8",fontSize:"12px",lineHeight:"1.5"}}>{e.note}</div>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {(ta.gradSchoolTargets||[]).length > 0 && (
                  <div style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(100,180,255,0.25)",borderRadius:"12px",padding:"16px 18px"}}>
                    <div style={{color:"#c9a84c",fontSize:"11px",fontFamily:"'Montserrat',sans-serif",fontWeight:"700",letterSpacing:"0.10em",marginBottom:"14px"}}>GRAD SCHOOL PIPELINE</div>
                    <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                      {(ta.gradSchoolTargets||[]).map((g,i)=>(
                        <div key={i} style={{display:"flex",gap:"12px",alignItems:"flex-start",background:"rgba(255,255,255,0.03)",borderRadius:"8px",padding:"10px 12px"}}>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap",marginBottom:"3px"}}>
                              <span style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"700"}}>{g.name}</span>
                              <span style={{background:"rgba(201,168,76,0.07)",border:"1px solid rgba(96,165,250,0.3)",borderRadius:"10px",padding:"2px 8px",color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif"}}>{g.type}</span>
                              {g.placementRate && <span style={{color:"#9898a8",fontSize:"11px",fontFamily:"'Montserrat',sans-serif"}}>{g.placementRate}</span>}
                            </div>
                            {g.note && <div style={{color:"#9898a8",fontSize:"12px",lineHeight:"1.5"}}>{g.note}</div>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      ) : (
        <div style={{textAlign:"center",padding:"80px 24px",color:"#9898a8",fontFamily:"'Montserrat',sans-serif"}}>Analysis failed. Please go back and try again.</div>
      )}
      <style dangerouslySetInnerHTML={{__html:"@keyframes nbspin{to{transform:rotate(360deg);}} @keyframes nbpulse{0%,100%{opacity:.5}50%{opacity:1}}"}}/>
    </div>
  );
}

// ========================================
// COMPARE PAGE
// ========================================
function ComparePage({schoolA, schoolB, catA, catB, profile, onBack}) {
  const [data,setData] = useState(null);
  const [busy,setBusy] = useState(true);
  const [tab,setTab]   = useState("roi");
  const cA="#c9a84c", cB="#c9a84c";

  useEffect(()=>{ run(); },[]);

  async function run() {
    const sA = schoolA.name, sB = schoolB.name;
    const progA = (schoolA.targetProgram||{}).name || profile.intendedMajor;
    const progB = (schoolB.targetProgram||{}).name || profile.intendedMajor;
    const ctx =
      (profile.studentOrigin==="us" ? "Domestic US student" : "International student from " + profile.province) +
      " (location=" + profile.province + ", avg=" + profile.grade +
      ", SAT=" + (profile.satScore||"none") + ", major=" + profile.intendedMajor + ") " +
      (profile.studentOrigin!=="us" ? "F-1 visa required. " + (["United Kingdom","Australia","New Zealand","Singapore","Hong Kong"].includes(profile.province) ? "English test likely waived. " : "IELTS/TOEFL required. ") + "No US federal aid eligibility. " : "Full financial aid eligible. ") +
      "comparing " + sA + " (" + progA + ") vs " + sB + " (" + progB + "). Return ONLY a single JSON object, no markdown:\n";

    const schema =
      '{"roiComparison":{"schoolA":{"annualTuition":"$X","employmentRate6mo":"X%","medianSalary6mo":"$X","roiScore":8,"roiNote":"note","breakEvenYears":"X yrs"},' +
      '"schoolB":{"annualTuition":"$X","employmentRate6mo":"X%","medianSalary6mo":"$X","roiScore":7,"roiNote":"note","breakEvenYears":"X yrs"},"verdict":"Which school offers better ROI and why in 2 sentences"},' +
      '"internshipComparison":{"schoolA":{"internshipRate":"X%","avgInternSalary":"$X/hr","medianInternSalary":"$X/hr","returnOfferRate":"X%","topInternEmployers":["E1","E2","E3"],"internStrength":"Strong|Moderate|Weak","intlEligibility":"note","typicalTimeline":"note","networkAdvantage":"1 sentence","competitiveEdge":"1 sentence","note":"note"},' +
      '"schoolB":{"internshipRate":"X%","avgInternSalary":"$X/hr","medianInternSalary":"$X/hr","returnOfferRate":"X%","topInternEmployers":["E1","E2","E3"],"internStrength":"Strong|Moderate|Weak","intlEligibility":"note","typicalTimeline":"note","networkAdvantage":"1 sentence","competitiveEdge":"1 sentence","note":"note"},"verdict":"2 sentence internship comparison"},' +
      '"salaryComparison":{"schoolA":{"median6mo":"$X","p25_6mo":"$X","p75_6mo":"$X","topEmployers":["E1","E2"],"employedInField6mo":"X%"},' +
      '"schoolB":{"median6mo":"$X","p25_6mo":"$X","p75_6mo":"$X","topEmployers":["E1","E2"],"employedInField6mo":"X%"}},' +
      '"competitivenessOutcome":{"schoolA":{"admitDifficulty":"Very High","expectedAdmitProb":"X%","rankingInMajor":"Top X","alumniNetwork":"Strong","outcomeScore":8},' +
      '"schoolB":{"admitDifficulty":"High","expectedAdmitProb":"X%","rankingInMajor":"Top X","alumniNetwork":"Moderate","outcomeScore":7},"recommendationForStudent":"Personalized 2-sentence recommendation"},' +
      '"overallVerdict":{"winner":"school name","winnerFor":"best scenario","summary":"3 sentence comparison","caveat":"important caveat"}}';

    for (let attempt = 1; attempt <= 2; attempt++) {
      try {
        const res = await fetch("/api/claude", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:3000,messages:[{role:"user",content:ctx+schema}]})});
        const json = await res.json();
        if (json.error) throw new Error(json.error.message||"API error");
        const raw = (json.content||[]).map(b=>b.text||"").join("").split(String.fromCharCode(96,96,96)+"json").join("").split(String.fromCharCode(96,96,96)).join("").trim();
        const first = raw.indexOf("{"), last = raw.lastIndexOf("}");
        if (first===-1||last===-1) throw new Error("No JSON");
        const result = JSON.parse(raw.slice(first,last+1));
        if (!result.roiComparison && !result.competitivenessOutcome) throw new Error("Missing fields");
        setData(result); setBusy(false); return;
      } catch(e) {
        console.warn("Compare attempt "+attempt+" failed:", e.message);
        if (attempt===2) { setData(null); setBusy(false); }
      }
    }
  }

  const isPostGradCompare = !!(profile && profile.postGrad);
  const pgPathCompare = isPostGradCompare ? (POST_GRAD_PATHS.find(p=>p.key===profile.pgPathKey)||detectPostGradPath(profile.intendedMajor)) : null;
  const tabs = [{id:"roi",label:"ROI"},{id:"coop",label:"Internships"},{id:"salary",label:"Salary"},{id:"outcome",label:"Competitiveness"}];

  return (
    <div style={{position:"fixed",top:0,right:0,bottom:0,left:0,zIndex:999,background:"#080808",overflowY:"auto",fontFamily:"sans-serif",color:"#d0d0d8"}}>
      <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,900;1,6..96,400;1,6..96,900&family=DM+Serif+Display:ital@0;1&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
      <div style={{position:"sticky",top:0,zIndex:10,background:"rgba(8,8,8,0.97)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(107,159,228,0.18)",padding:"14px 24px",display:"flex",alignItems:"center",gap:"12px"}}>
        <button onClick={onBack} style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(107,159,228,0.22)",color:"#d0d0d8",borderRadius:"8px",padding:"7px 14px",cursor:"pointer",fontSize:"12px",fontFamily:"'Montserrat',sans-serif",flexShrink:0}}>Back</button>
        <div style={{display:"flex",gap:"8px",flex:1,minWidth:0,alignItems:"center"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:cA,fontSize:"9px",fontFamily:"'Montserrat',sans-serif"}}>{schoolAbbr(schoolA.name)}</div>
            <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"600",fontFamily:"'DM Serif Display',serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{schoolA.name}</div>
          </div>
          <span style={{color:"#9898a8",fontSize:"18px",flexShrink:0}}>vs</span>
          <div style={{flex:1,minWidth:0,textAlign:"right"}}>
            <div style={{color:cB,fontSize:"9px",fontFamily:"'Montserrat',sans-serif"}}>{schoolAbbr(schoolB.name)}</div>
            <div style={{color:"#f0f0f0",fontSize:"13px",fontWeight:"600",fontFamily:"'DM Serif Display',serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{schoolB.name}</div>
          </div>
        </div>
      </div>

      {busy ? (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"70vh",gap:"20px"}}>
          <div style={{width:"48px",height:"48px",border:"3px solid rgba(107,159,228,0.10)",borderTop:"3px solid #c0302a",borderRadius:"50%",animation:"nbspin 0.8s linear infinite"}}/>
          <div style={{color:"#9898a8",fontFamily:"'Montserrat',sans-serif",fontSize:"12px"}}>RUNNING COMPARISON ANALYSIS...</div>
        </div>
      ) : data ? (
        <div style={{maxWidth:"880px",margin:"0 auto",padding:"28px 20px"}}>
          <div style={{display:"flex",gap:"10px",marginBottom:"20px"}}>
            {[{s:schoolA,cfg:CAT[catA],c:cA,lbl:schoolAbbr(schoolA.name)},{s:schoolB,cfg:CAT[catB],c:cB,lbl:schoolAbbr(schoolB.name)}].map(x=>(
              <div key={x.lbl} style={{background:x.cfg.bg,border:"1px solid "+x.cfg.border,borderRadius:"12px",padding:"14px 16px",flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
                  <span style={{color:x.cfg.color,fontSize:"14px"}}>{x.cfg.icon}</span>
                  <span style={{color:"#f0f0f0",fontFamily:"'DM Serif Display',serif",fontSize:"14px",fontWeight:"700",lineHeight:"1.2"}}>{x.s.name}</span>
                </div>
                {x.s.targetProgram && <div style={{color:x.c,fontSize:"11px",fontFamily:"'Montserrat',sans-serif",marginTop:"4px"}}>{x.s.targetProgram.name} - {x.s.targetProgram.admRate}</div>}
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:"6px",marginBottom:"8px",overflowX:"auto"}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"9px 18px",borderRadius:"10px",cursor:"pointer",border:"1px solid "+(tab===t.id?"#f15177":"rgba(201,168,76,0.07)"),background:tab===t.id?"rgba(139,26,26,0.10)":"transparent",color:tab===t.id?"#f15177":"#9898a8",fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"700",whiteSpace:"nowrap",transition:"all 0.18s"}}>
                {t.label}
              </button>
            ))}
          </div>

          {tab==="roi" && data.roiComparison && (
            <div>
              <h2 style={{color:"#f0f0f0",fontFamily:"'Great Vibes',cursive",fontSize:"28px",fontWeight:"400",margin:"0 0 16px"}}>ROI Comparison</h2>
              <CBar label="Annual Tuition (lower is better)" valA={data.roiComparison.schoolA.annualTuition} valB={data.roiComparison.schoolB.annualTuition} nameA={schoolAbbr(schoolA.name)} nameB={schoolAbbr(schoolB.name)} cA={cA} cB={cB} higher={false}/>
              <CBar label="Employment Rate at 6 Months" valA={data.roiComparison.schoolA.employmentRate6mo} valB={data.roiComparison.schoolB.employmentRate6mo} nameA={schoolAbbr(schoolA.name)} nameB={schoolAbbr(schoolB.name)} cA={cA} cB={cB} higher={true}/>
              <CBar label="Median Salary at 6 Months" valA={data.roiComparison.schoolA.medianSalary6mo} valB={data.roiComparison.schoolB.medianSalary6mo} nameA={schoolAbbr(schoolA.name)} nameB={schoolAbbr(schoolB.name)} cA={cA} cB={cB} higher={true}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",margin:"16px 0"}}>
                {[{s:schoolA,d:data.roiComparison.schoolA,c:cA,lbl:schoolAbbr(schoolA.name)},{s:schoolB,d:data.roiComparison.schoolB,c:cB,lbl:schoolAbbr(schoolB.name)}].map(x=>(
                  <div key={x.lbl} style={{background:"rgba(255,255,255,0.03)",border:"1px solid "+x.c+"30",borderRadius:"12px",padding:"16px"}}>
                    <div style={{color:x.c,fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"8px"}}>{x.lbl}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
                      <div style={{textAlign:"center"}}><div style={{color:x.c,fontSize:"20px",fontWeight:"800"}}>{x.d.roiScore}<span style={{fontSize:"11px"}}>/10</span></div><div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif"}}>ROI SCORE</div></div>
                      <div style={{textAlign:"center"}}><div style={{color:"#f0f0f0",fontSize:"14px",fontWeight:"700"}}>{x.d.breakEvenYears}</div><div style={{color:"#9898a8",fontSize:"9px",fontFamily:"'Montserrat',sans-serif"}}>BREAK-EVEN</div></div>
                    </div>
                    <p style={{color:"#9898a8",fontSize:"11px",lineHeight:"1.5",margin:0}}>{x.d.roiNote}</p>
                  </div>
                ))}
              </div>
              <div style={{background:"rgba(139,26,26,0.10)",border:"1px solid rgba(241,81,119,0.28)",borderRadius:"10px",padding:"14px 16px"}}><div style={{color:"#c9a84c",fontSize:"10px",fontFamily:"'Montserrat',sans-serif",marginBottom:"6px"}}>ROI VERDICT</div><div style={{color:"#d0d0d8",fontSize:"13px",lineHeight:"1.6"}}>{data.roiComparison.verdict}</div></div>
            </div>
          )}

          {tab==="coop" && data.internshipComparison && (()=>{
            const ic = data.internshipComparison;
            const sA = ic.schoolA, sB = ic.schoolB;

    setAwards(""); setHsYear(""); setSatScore(""); setIntendedMajor("");
    setExtras(""); setPgPathKey(null);
  }

  const profile = {province,cumAvg,actScore,satScore,programs,ibScore,apCourses,awards,hsYear,intendedMajor,extras,postGrad:pgPathKey!==null,pgPathKey,studentOrigin};

  function resetToForm() { setPage("landing"); setFormStep(0); setResults(null); setCompareList([]); setCompareTarget(null); setAnalysisTarget(null); }

  function toggleCompare(school, category) {
    setCompareList(prev => {
      const exists = prev.some(s=>s.school.name===school.name);
      if (exists) return prev.filter(s=>s.school.name!==school.name);
      if (prev.length >= 2) return [...prev.slice(1), {school,category}];
      return [...prev, {school,category}];
    });
  }

  async function generate() {
    if (!studentOrigin) { setError("Please select where you are from."); return; }
    if (!province || !cumAvg || !intendedMajor || !hsYear) { setError("Please fill in your location, cumulative average, school year, and intended major."); return; }
    const isUSStudent = studentOrigin === "us";
    setError(""); setLoading(true); setResults(null); setCompareList([]);
    const gs     = GRADE_SYSTEMS[province] || {};
    const hsInfo = HS_YEARS.find(y=>y.value===hsYear) || HS_YEARS[3];
    const isSr   = hsYear==="grade12";
    const hasIB  = programs.ib;
    const hasAP  = programs.ap;
    const pgPath = pgPathKey ? (POST_GRAD_PATHS.find(p=>p.key===pgPathKey)||null) : null;

    // Sanitize AI JSON strings: fix smart quotes, unescaped apostrophes in values
    function sanitizeJSON(str) {
      // Strip markdown fences
      str = str.split(String.fromCharCode(96,96,96)+"json").join("").split(String.fromCharCode(96,96,96)).join("").trim();
      // Smart quotes → standard quotes
      str = str.replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"');
      // Fix unescaped apostrophes inside JSON string values.
      // Strategy: scan char by char tracking whether we're inside a JSON string,
      // and escape any ' that appears inside a string value (they're harmless but
      // apostrophes in names like "St. John's" cause no issue; the real culprit is
      // when the AI writes a double-quote character unescaped inside a value).
      // This simple pass escapes unescaped interior double-quotes in values:
      let result = "";
      let inString = false;
      let escaped = false;
      for (let i = 0; i < str.length; i++) {
        const ch = str[i];
        if (escaped) { result += ch; escaped = false; continue; }
        if (ch === "\\") { result += ch; escaped = true; continue; }
        if (ch === '"') {
          // Check if this double-quote ends a key/value or is mid-value
          // Heuristic: if inString and next non-space char is not :, ,, }, ]
          // it's probably an unescaped interior quote — escape it
          if (inString) {
            let j = i + 1;
            while (j < str.length && str[j] === " ") j++;
            const next = str[j];
            if (next === ":" || next === "," || next === "}" || next === "]" || next === "\n" || next === "\r" || j >= str.length) {
              inString = false;
              result += ch;
            } else {
              result += '\\"';
            }
          } else {
            inString = true;
            result += ch;
          }
          continue;
        }
        result += ch;
      }
      return result;
    }

    async function fetchTier(tier) {
      const tierDef = tier==="reach"
        ? "REACH schools: highly selective, <15% admit chance for this student"
        : tier==="target"
        ? "TARGET schools: well-matched, 25-55% admit chance for this student"
        : "SAFETY schools: strong likelihood >70%, student is above average for these schools";

      const extras_pg = pgPath ? " Post-grad goal: " + pgPath.label + "." : "";
      const extras_ib = hasIB ? " IB predicted " + (ibScore||"?") + "/45." : "";
      const extras_ap = hasAP ? " AP courses: " + (apCourses||"various") + "." : "";
      const extras_tests = (satScore||actScore) ? " SAT=" + (satScore||"N/A") + " ACT=" + (actScore||"N/A") + "." : "";

      const regionContext = isUSStudent
        ? "DOMESTIC US student from " + province + ": treat as domestic applicant. Use domestic admission rates. Full FAFSA, merit scholarships, and need-based aid eligibility. No English proficiency test required."
        : studentOrigin==="canada"
        ? "CANADIAN international student from " + province + ": grading system is " + (gs.scale||"percentage") + ". No IELTS/TOEFL required for most schools. Eligible for limited merit aid but NOT federal US aid. F-1 visa required."
        : "INTERNATIONAL student from " + province + ": grading system is " + (gs.scale||"percentage") + ". IELTS 6.5+ or TOEFL 90+ typically required. F-1 visa required. NOT eligible for US federal financial aid. Full cost of attendance ~$55,000-$85,000/yr at private schools.";

      const prevSchools = results ? [...(results.reach||[]), ...(results.target||[]), ...(results.safety||[])].map(s=>s.name) : [];

      // EC strength signal for the prompt
      const hasStrongECs = (extras||"").length > 40 || (awards||"").length > 20;
      const ecStrength = hasStrongECs ? "STRONG" : (extras||"").length > 10 ? "MODERATE" : "WEAK/NONE";
      const ecContext =
        "EXTRACURRICULAR WEIGHTING RULES — apply these to tier selection: " +
        "For sub-10% admit rate schools (Ivies, MIT, Stanford, Caltech, Duke, etc.): ECs and essays carry ~40% of the decision — grades alone are NEVER sufficient. A student with weak ECs is NOT a reach, they are a LOW-REACH with very low odds regardless of GPA. " +
        "For 10-25% admit rate schools (top publics, Carnegie Mellon, Tufts, Georgetown, etc.): ECs carry ~25% weight. Strong ECs can lift a borderline GPA applicant into target range. " +
        "For 25-50% admit rate schools: ECs carry ~15% weight. Grades and test scores dominate. " +
        "For 50%+ admit rate schools: ECs carry ~5% weight. GPA and test scores are primary. " +
        "This student's EC strength is: " + ecStrength + ". " +
        "ECs provided: " + (extras||"none") + ". Awards: " + (awards||"none") + ". " +
        "IMPORTANT: If EC strength is WEAK or MODERATE, do NOT recommend any school under 10% acceptance rate as a target or safety. Adjust tier placement to reflect EC reality, not just grades.";

      const prompt =
        "You are a US university admissions expert. " +
        "STUDENT CONTEXT: " + regionContext + " " +
        "Academic profile: cumulative average " + cumAvg + " (" + (gs.scale||"percentage") + "), major: " + intendedMajor + "." +
        extras_tests + extras_ib + extras_ap + " " +
        ecContext + " " +
        (prevSchools.length > 0 ? "Do NOT recommend: " + prevSchools.join(", ") + ". " : "") +
        (isSr ? "Applying this cycle." : hsInfo.yearsOut + " years before applying.") +
        extras_pg + "\n\n" +
        "Recommend 4 " + tierDef + ". In the 'note' field (keep under 120 chars, no apostrophes or quotes) include region-specific visa/financial aid advice. " +
        "CRITICAL JSON RULES: All string values must use only plain ASCII. No apostrophes in any field. Write cannot instead of can't, does not instead of doesn't, etc. " +
        "For applyUrl, provide the DIRECT undergraduate admissions application URL. If truly unknown, use empty string.\n\n" +
        "Respond with ONLY a valid JSON object. No markdown, no explanation:\n" +
        (tier==="reach" ? '{"gpaEquivalent":"3.9/4.0 US GPA equivalent","profileSummary":"2 sentence profile assessment no apostrophes","' + tier + '":[' : '{"' + tier + '":[') +
        '{"name":"","location":"City ST","acceptRate":"","intlFriendly":"","tuition":"","applyUrl":"","note":"","targetProgram":{"name":"","admRate":"","degree":"","notes":""}},' +
        '{"name":"","location":"","acceptRate":"","intlFriendly":"","tuition":"","applyUrl":"","note":"","targetProgram":{"name":"","admRate":"","degree":"","notes":""}},' +
        '{"name":"","location":"","acceptRate":"","intlFriendly":"","tuition":"","applyUrl":"","note":"","targetProgram":{"name":"","admRate":"","degree":"","notes":""}},' +
        '{"name":"","location":"","acceptRate":"","intlFriendly":"","tuition":"","applyUrl":"","note":"","targetProgram":{"name":"","admRate":"","degree":"","notes":""}}' +
        ']}';

      const r = await fetch("/api/claude", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:3500, messages:[{role:"user",content:prompt}]})
      });
      const j = await r.json();
      if (j.error) throw new Error(j.error.message||"API error");
      const raw = (j.content||[]).map(b=>b.text||"").join("").trim();
      const cleaned = sanitizeJSON(raw);
      const first = cleaned.indexOf("{"), last = cleaned.lastIndexOf("}");
      if (first===-1 || last===-1) throw new Error("No JSON returned for "+tier);
      try {
        return JSON.parse(cleaned.slice(first,last+1));
      } catch(parseErr) {
        // Last resort: try to extract each school object individually
        const tierArr = [];
        const schoolRx = /\{[^{}]*"name"\s*:\s*"[^"]+[^{}]*\}/g;
        let m;
        while ((m = schoolRx.exec(cleaned)) !== null) {
          try { tierArr.push(JSON.parse(m[0])); } catch(e2) {}
        }
        if (tierArr.length > 0) return {[tier]: tierArr};
        throw new Error("JSON parse failed for "+tier+": "+parseErr.message);
      }

        }).catch(err => {

          </div>

          <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
            {["reach","target","safety"].map(t=>{
              const c = CAT[t];
              return (
                <button key={t} onClick={()=>setActiveTab(t)} style={{flex:1,padding:"11px 8px",border:"1px solid "+(activeTab===t?c.color:"rgba(201,168,76,0.07)"),borderRadius:"12px",background:activeTab===t?c.bg:"transparent",color:activeTab===t?c.color:"#9898a8",fontFamily:"'Montserrat',sans-serif",fontSize:"11px",fontWeight:"700",cursor:"pointer",transition:"all 0.2s"}}>

          </div>
          <div style={{color:"#9898a8",fontSize:"12px",fontStyle:"italic",marginBottom:"14px"}}>{CAT[activeTab].desc}</div>

                  <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
                    <div style={{width:"60px",height:"10px",background:"rgba(139,26,26,0.10)",borderRadius:"4px"}}/>

            ) : (
              <div style={{textAlign:"center",padding:"40px",color:"#c0302a",fontFamily:"'Montserrat',sans-serif",fontSize:"12px",lineHeight:"1.8"}}>
                <div style={{fontSize:"14px",marginBottom:"8px"}}>Could not load {activeTab} schools.</div>
                {results[activeTab+"Error"] && <div style={{color:"#8b1a1a",fontSize:"10px"}}>{results[activeTab+"Error"]}</div>}
              </div>
            )
          ) : (results[activeTab]||[]).map((school,i)=>(
            <SchoolCard key={i} school={school} category={activeTab} profile={profile}
              onAnalyze={(s,c)=>setAnalysisTarget({school:s,category:c})}
              compareNames={compareList.map(x=>x.school.name)}
              onToggleCompare={toggleCompare}/>
          ))}
          <div style={{marginTop:"20px",padding:"12px 16px",background:"rgba(255,255,255,0.03)",borderRadius:"10px",color:"#9898a8",fontSize:"11px",lineHeight:"1.6",fontFamily:"'Montserrat',sans-serif"}}>

          </div>

        <style dangerouslySetInnerHTML={{__html:globalStyles}}/>
      </div>
    );
  }

      {howItWorksOpen && (

          <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:"720px",background:"#0f0f0f",border:"1px solid rgba(201,168,76,0.25)",borderRadius:"20px",padding:"32px",position:"relative",maxHeight:"90vh",overflowY:"auto"}}>

              {[{step:"01",title:"Tell Us About You",desc:"Answer a few quick questions about your grades, major, and background. Takes under 60 seconds.",icon:"📋"},{step:"02",title:"Get Your List",desc:"Get 12 personalized schools across reach, target, and safety tiers instantly.",icon:"🎓"},{step:"03",title:"Deep Dive",desc:"Click Analyze for risk analysis and timeline. Use Compare for side-by-side breakdowns.",icon:"🔍"}].map(s=>(

            </div>

      )}

      {demoOpen && (
        <div onClick={()=>setDemoOpen(false)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
          <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:"860px",borderRadius:"16px",overflow:"hidden",border:"1px solid rgba(201,168,76,0.3)",position:"relative"}}>

            <video src="./demo_finals.mp4" controls autoPlay playsInline style={{width:"100%",display:"block",background:"#0a0a0a"}}/>
          </div>
